<title>Hologram OS — boot</title>
<desc>The Hologram OS boot splash recreated: a pulsing dot-mark over a teal and blue aurora, the line Booting HOLOGRAM OS, a filling progress bar, and Own your, with a braille code scramble resolving compute, data, intelligence and future.</desc>
