    @keyframes flip{ 0%{opacity:1} 1.272%{opacity:1} 1.282%{opacity:0} 100%{opacity:0} }
    @media (prefers-reduced-motion: reduce){
      .mark,.mark circle,.fill,.word{ animation:none }
      .fill{ transform:scaleX(1) } .word{ opacity:0 } .word:last-of-type{ opacity:1 }
    }
  </style>
</defs>

