    .mark circle{ fill:#fff; animation:puls 2.8s ease-in-out infinite; }
    @keyframes puls{ 0%{opacity:var(--b)} 30%{opacity:var(--p)} 60%{opacity:var(--b)} 100%{opacity:var(--b)} }
    .mark{ animation:breathe 4.6s ease-in-out infinite; transform-origin:640px 194px; }
    @keyframes breathe{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.012)} }
    .fill{ transform-box:fill-box; transform-origin:left center; animation:fill 9s linear infinite; }
    @keyframes fill{ 0%{transform:scaleX(0)} 88%{transform:scaleX(1)} 100%{transform:scaleX(1)} }
    .word{ font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,"Segoe UI Symbol","Apple Symbols","DejaVu Sans",sans-serif; font-weight:300; font-size:46px; letter-spacing:.04em; fill:#fff; opacity:0;
