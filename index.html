<style>
  /* ─────────────────────────────────────────────────────────────────────────────────────────
     The gateway face — the LibreChat landing UX (top bar · star pill · giant headline · sub-line ·
     two CTA pills), rebranded HOLOGRAM, rebuilt on a GOLDEN-RATIO system.

     • Golden ratio throughout — one fluid unit --u and powers of φ (1.618) govern every type size,
       gap, pad and control, so each relationship on the page is a golden one (links→brand = φ,
       sub→headline = φ³, inline pads = φ·block pads, …).
     • Resolution-independent & razor sharp — the page is 100% vector (the dot-mark + system text),
       so it is pixel-perfect at ANY density: HiDPI, Retina, 5K/8K. Rendering is tuned for crispness
       (grayscale smoothing, optical sizing, geometric SVG precision, no faux-bold synthesis).
     • Scales as ONE piece — --u tracks the viewport's SHORT side (vmin), so the whole composition
       grows grander on a large panel and stays compact on a phone, and NEVER forces a scrollbar.
     ───────────────────────────────────────────────────────────────────────────────────────── */
  :root{
    --bg:#000;
    --fg:#fff;
    --fg-soft:#e2e2e8;        /* star-pill label */
    --muted:#8b8b93;          /* nav links, sub-line */
    --muted-2:#6f6f78;        /* placeholders */
    --line:#262629;           /* hairline borders */
    --line-strong:#3a3a40;    /* hover borders */
    --panel:#0d0d0f;          /* search / badge / ghost-button fills */
    --panel-2:#1b1b1f;        /* keycaps, active toggle */
    --panel-hover:#1a1a1d;
    --shadow:0 16px 50px rgba(0,0,0,.55);                      /* search dropdown */
    --btn-p-bg:#fff; --btn-p-fg:#000; --btn-p-hover:#e6e6e6;   /* primary button */

    /* ── GOLDEN-RATIO SCALE ─────────────────────────────────────────────────────────────────
       --u is the fluid golden unit (tracks the viewport short side). Every size below is --u times
       a power of φ, so the page is one self-similar golden composition at any scale. The headline
       and sub get their own clamps (a far wider min↔max range than the UI) but stay φ-related. */
    --phi:1.618;
    /* The scale tracks the viewport's short side (vmin) BUT is capped at the largest comfortable
       laptop value, so the composition reaches a ceiling and then holds: every laptop renders exactly
       as before, while a big external monitor / 4K panel shows the SAME-sized composition (just more
       sky around it) instead of an inflated one. The caps (u→20px, display→132px) are the measured
       ~1440-short-side laptop register — the size that "looks great". */
    --u: clamp(13px, 2.05vmin, 18px);                          /* φ⁰ — UI rhythm unit (capped at the laptop ceiling) */
    --u-phi:  calc(var(--u) * var(--phi));                     /* φ¹  ≈ 1.618·u */
    --u-phi2: calc(var(--u) * 2.618);                          /* φ²  */
    --u-phi3: calc(var(--u) * 4.236);                          /* φ³  */
    --u-phi4: calc(var(--u) * 6.854);                          /* φ⁴  */
    --display: clamp(34px, min(13.7vmin, 12vw), 114px);        /* the headline register — capped at the laptop ceiling; vw term keeps long single words (Supercomputer) inside the narrowest phone */
    --sub: clamp(15px, calc(var(--display) / var(--phi) / var(--phi) / var(--phi)), 34px); /* headline ÷ φ³ */

    /* ── THE BEZEL ──────────────────────────────────────────────────────────────────────────────
       This page is a self-certified, isolated, serverless holospace — so it presents as a CONTAINED
       SCREEN floating in space, not an edge-to-edge web page. A small margin (--frame) rings the
       viewport, the inner surface is rounded (--frame-r), and the margin is filled with --bezel
       ("space"). Both track the viewport so the framing is identical on a phone and a 4K panel. */
    --ease:cubic-bezier(.4,0,.2,1);                            /* the one shared boot easing (gateway · splash · login · shell) */
    --frame: clamp(7px, 0.95vmin, 14px);                       /* the space margin around the screen */
    --frame-rad: clamp(16px, 1.9vmin, 28px);                   /* inner-screen corner radius */
    --bezel:#050507;                                           /* the "space" the screen floats in */
    /* ── SAFE AREA (notch · Dynamic Island · home indicator) ──────────────────────────────────
       The bezel margin grows to clear the device safe area, per-edge. env() resolves to 0 on every
       non-notched display and on desktop, so --frame-{t,r,b,l} === --frame there → the composition is
       byte-for-byte identical to before; on a notched phone the floating screen tucks inside the safe
       inset. (CSS Env Values · viewport-fit=cover, already set in <head>.) */
    --sa-t: env(safe-area-inset-top, 0px);
    --sa-r: env(safe-area-inset-right, 0px);
    --sa-b: env(safe-area-inset-bottom, 0px);
    --sa-l: env(safe-area-inset-left, 0px);
    --frame-t: max(var(--frame), var(--sa-t));
    --frame-r: max(var(--frame), var(--sa-r));
    --frame-b: max(var(--frame), var(--sa-b));
    --frame-l: max(var(--frame), var(--sa-l));
    /* MD3 minimum touch target (Accessibility → Touch target) — every primary control clears 48dp on
       a coarse pointer; this is the conformance floor the mobile media block below enforces. */
    --tap: 48px;
    color-scheme:dark;
  }
  /* light theme — flipped by the sun/moon switch (persisted); a LibreChat-style inverse palette */
  :root[data-theme="light"]{
    --bg:#fff;
    --fg:#09090b;
    --fg-soft:#27272a;
    --muted:#52525b;
    --muted-2:#71717a;
    --line:#e4e4e7;
    --line-strong:#d4d4d8;
    --panel:#f4f4f5;
    --panel-2:#e8e8ec;
    --panel-hover:#ececef;
    --shadow:0 16px 50px rgba(15,15,20,.18);
    --btn-p-bg:#09090b; --btn-p-fg:#fff; --btn-p-hover:#27272a;
    --bezel:#c7c7cd;                                           /* a soft light bezel in light mode */
    color-scheme:light;
  }
  html,:root{ transition:background-color .2s ease; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; width:100%; overflow:hidden; }
  html{ background:var(--bezel); }                              /* the space behind the screen (also paints any overscroll) */
  /* the inner SCREEN surface: the page's own background (--bg), inset by the bezel and rounded. It sits
     under everything (z-index:-1); the immersive field, bar, hero and signature all live on top of it. */
  body::before{ content:""; position:fixed; inset:var(--frame-t) var(--frame-r) var(--frame-b) var(--frame-l); border-radius:var(--frame-rad);
    background:var(--bg); z-index:-1; transition:background-color .2s ease; }
  body{ background:var(--bezel); color:var(--fg);
    font:400 var(--u)/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,Helvetica,Arial,sans-serif;
    /* HiDPI/Retina/5K-8K crispness: grayscale smoothing on dark, real weights only (no faux-bold
       blur), optical sizing, legibility kerning, and stable text scale on mobile. */
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    text-rendering:optimizeLegibility; font-synthesis:none; font-optical-sizing:auto;
    font-kerning:normal; -webkit-text-size-adjust:100%; text-size-adjust:100%; }
  a{ text-decoration:none; color:inherit; }
  /* vector marks/icons re-rasterise per-device at full precision — sharp at any pixel density */
  svg{ shape-rendering:geometricPrecision; }

  /* ── IMMERSIVE BACKGROUND ───────────────────────────────────────────────────────────────────
     A deep-space holo-field built ENTIRELY from inline CSS gradients (zero external assets) — so it
     is part of the page's own bytes and therefore 100% encoded in the content-addressed object the
     gateway re-derives (did:holo:sha256 of itself). Vector → razor-sharp at any density. Three
     intensities (Minimal · Ambient · Immersive) are toggled via :root[data-immersive]. */
  .bg{ position:fixed; inset:var(--frame-t) var(--frame-r) var(--frame-b) var(--frame-l); z-index:0; overflow:hidden; border-radius:var(--frame-rad);
    pointer-events:none; opacity:1; transition:opacity .45s ease; }
  .bg>div{ position:absolute; }
  .bg-neb{ inset:-12%;
    background:
      radial-gradient(42% 56% at 82% 6%,  rgba(139,92,246,.42), transparent 60%),
      radial-gradient(46% 56% at 10% 102%, rgba(45,212,191,.24), transparent 60%),
      radial-gradient(38% 44% at 50% 48%, rgba(99,102,241,.14), transparent 72%); }
  .bg-aurora{ inset:-30%; filter:blur(70px); opacity:.55; will-change:transform;
    background:
      radial-gradient(closest-side, rgba(251,113,133,.18), transparent),
      radial-gradient(closest-side, rgba(139,92,246,.20), transparent),
      radial-gradient(closest-side, rgba(45,212,191,.14), transparent);
    background-size:56% 56%, 50% 50%, 46% 46%;
    background-position:24% 26%, 78% 70%, 60% 16%; background-repeat:no-repeat;
    animation:bgdrift 30s ease-in-out infinite alternate; }
  @keyframes bgdrift{ from{ transform:translate3d(-2%,-1%,0) scale(1.04);} to{ transform:translate3d(3%,2%,0) scale(1.12);} }
  .bg-stars{ inset:0; opacity:.55;
    background-repeat:repeat; background-size:520px 520px;
    background-image:
      radial-gradient(1.2px 1.2px at 18% 22%, #fff, transparent),
      radial-gradient(1px 1px at 68% 14%, #d7e0ff, transparent),
      radial-gradient(1.4px 1.4px at 42% 72%, #fff, transparent),
      radial-gradient(1px 1px at 86% 56%, #bfe9ff, transparent),
      radial-gradient(1px 1px at 30% 90%, #e9d5ff, transparent),
      radial-gradient(1.2px 1.2px at 78% 88%, #fff, transparent),
      radial-gradient(1px 1px at 8% 64%, #cbd5ff, transparent); }
  /* the clouds layer — the genuine Vanta CLOUDS2 effect (vendored under system/vendor/vanta/), drawn only in
     Immersive mode. It is opaque when it runs, so it becomes the immersive sky; if WebGL/the libraries
     are unavailable it stays transparent and the CSS nebula/aurora/stars below show through as a
     graceful fallback. */
  .bg-gl{ position:absolute; inset:0; width:100%; height:100%; display:block; opacity:0; transition:opacity .7s ease; }
  :root[data-immersive="full"] .bg-gl{ opacity:1; }
  /* the cloudscape is bright toward the clouds, where the hero text sits — give the text a soft dark
     halo (only in immersive) so it stays readable WITHOUT veiling the sky itself. */
  :root[data-immersive="full"] h1{ text-shadow:0 0.035em 0.5em rgba(0,0,0,.55), 0 0.01em 0.1em rgba(0,0,0,.55); }
  :root[data-immersive="full"] .sub{ color:#fff; font-weight:600; text-shadow:0 1px 2px rgba(0,0,0,.92), 0 0 6px rgba(0,0,0,.55); }
  :root[data-immersive="full"] .pill-star,:root[data-immersive="full"] .sig span{ text-shadow:0 0.05em 0.4em rgba(0,0,0,.5); }
  .bg-scrim{ inset:0; background:radial-gradient(95% 75% at 50% 44%, transparent 42%, rgba(0,0,0,.42) 100%); }
  :root[data-theme="light"] .bg-neb{ opacity:.85;
    background:
      radial-gradient(46% 60% at 84% 4%,  rgba(139,92,246,.20), transparent 62%),
      radial-gradient(50% 60% at 8% 104%, rgba(20,184,166,.16), transparent 62%),
      radial-gradient(40% 46% at 50% 50%, rgba(99,102,241,.08), transparent 72%); }
  :root[data-theme="light"] .bg-stars{ opacity:0; }
  :root[data-theme="light"] .bg-scrim{ background:radial-gradient(95% 75% at 50% 44%, transparent 46%, rgba(255,255,255,.5) 100%); }
  /* Light & Dark are plain; only Immersive shows the holo-field (full + animated). */
  :root[data-immersive="off"] .bg{ opacity:0; }
  /* PERF: when the genuine WebGL cloud sky is live (vanta-on), the CSS fallback layers below it are fully
     occluded — so DROP them from the compositor entirely (especially .bg-aurora, a large 70px-blurred
     layer that animates every frame). This frees real GPU/CPU on every device; the fallback returns the
     instant WebGL is unavailable or the tab backgrounds (vanta-on is removed). */
  body.vanta-on .bg-neb, body.vanta-on .bg-aurora, body.vanta-on .bg-stars{ display:none; }

  /* ── TOP BAR ─────────────────────────────────────────────────────────────────────────────── */
  .bar{ position:fixed; inset:var(--frame-t) var(--frame-r) auto var(--frame-l); z-index:5;
    height:calc(var(--u) * 3.85);                              /* ≈ control-height · φ */
    display:flex; align-items:center; gap:var(--u);
    padding:0 var(--u-phi2); }
  .brand{ display:flex; align-items:center; gap:.5em; font-weight:700; color:var(--fg);
    font-size:var(--u-phi); letter-spacing:-.01em; }                          /* u·φ */
  .brand .mk{ width:1.2em; height:1.2em; display:block; color:var(--fg); }
  .links{ display:flex; align-items:center; gap:var(--u-phi); margin-left:var(--u-phi); }
  .links a{ color:var(--muted); font-size:calc(var(--u) * 1.08); font-weight:450; transition:color .15s; } /* ≈ reference 22px */
  .links a:hover{ color:var(--fg); }
  .grow{ flex:1; }
  .right{ display:flex; align-items:center; gap:calc(var(--u) * 1.05); }   /* roomier rhythm between search · toggle · github (scales with --u) */

  .search{ position:relative; display:flex; align-items:center; gap:.72em;
    background:var(--panel); border:1px solid var(--line); border-radius:calc(var(--u) * .73);
    height:calc(var(--u) * 2.72); padding:0 .8em; color:var(--muted-2); cursor:text;   /* matched to reference */
    width:clamp(190px, 19vw, 380px); font-size:var(--u); transition:border-color .15s; }
  .search:hover{ border-color:var(--line-strong); }
  .search:focus-within{ border-color:var(--line-strong); }
  .search svg{ width:1.05em; height:1.05em; flex:none; }
  .search input{ all:unset; flex:1; min-width:0; color:var(--fg); font:inherit; line-height:1.2; }
  .search input::placeholder{ color:var(--muted-2); }
  .kbd{ display:flex; gap:calc(var(--u) * .22); margin-left:calc(var(--u) * .15); }

  /* ── SEARCH RESULTS — instant, local, golden-spaced. Anchored under the box; a full-width sheet
     on phones. Each row launches a native app in its own holospace tab. ──────────────────────── */
  .results{ position:absolute; top:calc(100% + .5em); right:0; z-index:30;
    width:min(94vw, 27em); max-height:min(68vh, 30em); overflow-y:auto; overscroll-behavior:contain;
    background:var(--panel); border:1px solid var(--line); border-radius:calc(var(--u) * .7);
    box-shadow:var(--shadow); padding:calc(var(--u) * .28); display:flex; flex-direction:column; gap:2px;
    font-size:var(--u); cursor:default; }
  .results[hidden]{ display:none; }
  .r-head{ padding:.5em .7em .35em; font-size:.72em; letter-spacing:.08em; text-transform:uppercase; color:var(--muted-2); }
  .r-item{ display:flex; align-items:center; gap:.7em; padding:.5em .55em; border-radius:calc(var(--u) * .5);
    cursor:pointer; user-select:none; }
  .r-item[aria-selected="true"]{ background:var(--panel-hover); }
  .r-badge{ width:2.05em; height:2.05em; border-radius:.5em; flex:none; display:grid; place-items:center;
    font-weight:700; font-size:.92em; color:#fff; }
  .r-main{ min-width:0; flex:1; }
  .r-name{ font-weight:600; color:var(--fg); font-size:.92em; line-height:1.25;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .r-desc{ color:var(--muted); font-size:.76em; line-height:1.3;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .r-cat{ flex:none; color:var(--muted-2); font-size:.68em; padding:.2em .6em;
    border:1px solid var(--line); border-radius:999px; }
  .r-enter{ flex:none; color:var(--muted-2); font-size:.8em; opacity:0; }
  .r-item[aria-selected="true"] .r-enter{ opacity:1; }
  .r-empty{ padding:1.1em .8em; color:var(--muted); text-align:center; font-size:.85em; }
  .results mark{ background:none; color:var(--fg); font-weight:700; }
  .kbd kbd{ background:var(--panel-2); border:1px solid var(--line); border-radius:.38em;
    padding:.12em .5em; font:600 .82em/1.4 inherit; color:var(--muted); }

  .toggle{ display:flex; align-items:center; gap:calc(var(--u) * .26); background:var(--panel);
    border:1px solid var(--line); border-radius:999px; padding:calc(var(--u) * .28); }
  .toggle button{ -webkit-appearance:none; appearance:none; border:0; cursor:pointer; padding:0;
    width:calc(var(--u) * 2.05); height:calc(var(--u) * 2.05); border-radius:999px; display:grid; place-items:center;
    background:none; color:var(--muted); transition:background .14s ease, color .14s ease, transform .14s ease; }
  .toggle button svg{ width:calc(var(--u) * 1.18); height:calc(var(--u) * 1.18); }
  .toggle button:not([aria-pressed="true"]):hover{ background:var(--panel-hover); color:var(--fg); }   /* live feedback on the inactive modes */
  .toggle button:active{ transform:scale(.92); }                                                       /* crisp press */
  .toggle button[aria-pressed="true"]{ background:var(--panel-2); color:var(--fg); }

  .ghlink{ display:grid; place-items:center; width:calc(var(--u) * 2.05); height:calc(var(--u) * 2.05); border-radius:.5em;
    color:var(--muted); transition:color .15s,background .15s; }
  .ghlink{ transition:color .14s ease, background .14s ease, transform .14s ease; }
  .ghlink:hover{ color:var(--fg); background:var(--panel); }
  .ghlink:active{ transform:scale(.92); }
  .ghlink svg{ width:calc(var(--u) * 1.45); height:calc(var(--u) * 1.45); }

  /* ── HERO — vertically CENTRED, so the cluster (star pill → headline → sub → CTAs) sits at the same
     ~middle of the screen on every height: a short laptop and a tall 4K panel place it identically.
     (A bottom-weighted flex-end inset looked right on a laptop but stranded the cluster low on a tall
     monitor — the "hero shifted down" bug.) A tiny downward bias keeps the open sky above the pill. */
  .hero{ position:fixed; inset:var(--frame-t) var(--frame-r) var(--frame-b) var(--frame-l); z-index:2;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:calc(var(--u) * 2.3);
    padding:var(--u-phi3) 5vw calc(var(--u) * 2); }   /* centred; slight bottom-lighter padding leaves sky above the pill */

  .pill-star{ display:inline-flex; align-items:center; gap:.7em;
    background:var(--panel); border:1px solid var(--line); border-radius:999px;
    padding:.52em 1em; font-size:var(--u); color:var(--fg-soft);                /* matched to reference */
    transition:border-color .15s, background .15s; }
  .pill-star:hover{ border-color:var(--line-strong); background:var(--panel-hover); }
  .pill-star svg{ width:1.15em; height:1.15em; }
  .pill-star .sep{ width:1px; height:1.25em; background:var(--line-strong); }
  .pill-star .ct{ display:inline-flex; align-items:center; gap:.4em; color:var(--muted); }

  h1{ margin:0; color:var(--fg); font-weight:800; letter-spacing:-.022em; line-height:.95;
    font-size:var(--display); max-width:15ch; text-wrap:balance; }

  .sub{ margin:0; color:var(--muted); line-height:1.5; max-width:min(92vw, 40ch);
    font-size:var(--sub); text-wrap:balance; }

  /* equal-width CTAs: an inline grid of two 1fr tracks shrink-wrapped to content → BOTH columns take
     the widest button's width, so the pills are identical regardless of label or font. gap = u·φ. */
  .cta{ display:inline-grid; grid-auto-flow:column; grid-auto-columns:1fr; gap:var(--u-phi); max-width:100%; }
  .btn{ -webkit-appearance:none; appearance:none; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; gap:.55em; border:1px solid transparent;
    border-radius:999px; font:600 var(--u)/1 inherit; white-space:nowrap;
    padding:1.12em 2.3em; transition:background .15s, border-color .15s, transform .12s; }  /* matched to reference pill width */
  /* both CTAs share ONE golden width — u·φ⁵ — so they're identical pills, centred, on the φ¹ gap above */
  .cta .btn{ min-width:calc(var(--u-phi4) * var(--phi)); }                                  /* = u·φ⁵ ≈ 11.09u */
  .btn span{ line-height:1; }                              /* equal cap-height line box → equal pill height */
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--btn-p-bg); color:var(--btn-p-fg); }
  .btn-primary:hover{ background:var(--btn-p-hover); }
  /* power-button glyph: a crisp IEC power symbol, sized to the label's cap height and optically centred */
  .btn-primary .pwr{ width:1.16em; height:1.16em; flex:none; margin-top:-0.04em; }
  .btn-primary span{ line-height:1; }
  .btn-ghost{ background:var(--panel); color:var(--fg); border-color:var(--line); }
  .btn-ghost:hover{ background:var(--panel-hover); border-color:var(--line-strong); }

  /* ── Power-up in Immersive: a SOLID BLACK pill (the GitHub-pill ink, --panel) wearing the desktop
     omnibox's spectrum ring. The ring is a ::before carrying a full rotating conic spectrum, MASKED to just
     the border band (mask-composite:exclude). The old version painted the ring via a padding-box/border-box
     double background, whose 1px frame got subpixel-clipped at certain widths/zooms/DPRs — the "sometimes
     the ring isn't visible" bug. The mask paints the WHOLE perimeter every time, at any size. A soft
     two-hue drop-shadow gives the spectrum glow. (Light & Dark stay plain; only Immersive wears it.) ─── */
  @property --pwr-spin{ syntax:"<angle>"; inherits:false; initial-value:0deg; }
  @keyframes pwr-spin{ to{ --pwr-spin:360deg; } }
  :root[data-immersive="full"] .btn-primary{ position:relative; color:#fff; border:0;
    background:var(--panel); box-shadow:0 .35em 1.5em rgba(0,0,0,.45); }
  :root[data-immersive="full"] .btn-primary::before{ content:""; position:absolute; inset:0; z-index:1;
    border-radius:inherit; padding:1.6px; pointer-events:none;
    background:conic-gradient(from var(--pwr-spin), #ff3b6b,#ff9e2c,#ffe24a,#46e08a,#2bd4ff,#5b8cff,#c77bff,#ff3b6b);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite:xor;
            mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);         mask-composite:exclude;
    animation:pwr-spin 7s linear infinite;
    filter:drop-shadow(0 0 4px rgba(255,80,140,.42)) drop-shadow(0 0 7px rgba(90,140,255,.42)); }   /* spectrum glow */
  :root[data-immersive="full"] .btn-primary:hover{ background:var(--panel-hover);
    box-shadow:0 0 26px -6px rgba(120,140,255,.55), 0 .45em 1.8em rgba(0,0,0,.5); }
  @media (prefers-reduced-motion: reduce){ :root[data-immersive="full"] .btn-primary::before{ animation:none; } }

  /* the OS-detected download glyph sits like the power glyph — cap-height, optically centred */
  .btn .os-ic{ display:inline-flex; width:1.16em; height:1.16em; flex:none; margin-top:-0.04em; }
  .btn .os-ic svg{ width:100%; height:100%; }
  /* Free Download is frosted glass: a translucent pane that blurs the cloudscape behind it, with a
     soft inner highlight and hairline edge so it reads as a real pane of glass, not a flat panel. */
  #download{ background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.28);
    -webkit-backdrop-filter:blur(14px) saturate(1.3); backdrop-filter:blur(14px) saturate(1.3);
    box-shadow:0 .4em 1.4em rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.35); }
  #download:hover{ background:rgba(255,255,255,.2); border-color:rgba(255,255,255,.45); }
  /* Immersive sits on the bright cloudscape — black ink + a darker glass edge so the pill reads clearly */
  :root[data-immersive="full"] #download{ color:#000; border-color:rgba(0,0,0,.22);
    box-shadow:0 .4em 1.4em rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.5); }
  :root[data-immersive="full"] #download:hover{ background:rgba(255,255,255,.28); border-color:rgba(0,0,0,.34); }
  :root[data-theme="light"] #download{ background:rgba(20,20,28,.06); border-color:rgba(20,20,28,.14);
    box-shadow:0 .4em 1.4em rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.6); }
  :root[data-theme="light"] #download:hover{ background:rgba(20,20,28,.1); border-color:rgba(20,20,28,.22); }

  /* boot status — empty until the user acts, then carries the boot progress text */
  .status{ min-height:0; color:var(--muted-2); font-weight:500;
    font-size:calc(var(--u) * .78); line-height:1.6; max-width:min(92vw,52ch); }
  .status:empty{ display:none; }
  .status b{ color:#e6e6ea; font-weight:600; }
  .status code{ color:#e6e6ea; font-weight:600; }

  /* the self-address signature: this gateway IS a content-addressed object; it re-derives its own
     κ and shows it — a quiet proof you are already inside the substrate, not on a normal website. */
  .sig{ position:fixed; left:var(--frame-l); right:var(--frame-r); bottom:calc(var(--frame-b) + var(--u) * .9); z-index:4; text-align:center;
    padding:0 6vw; pointer-events:none; line-height:1.55; }
  .sig #kappa{ font-size:calc(var(--u) * 1.18); font-weight:600; letter-spacing:.01em; color:var(--fg); opacity:1; }
  .sig .dot{ display:inline-block; width:.55em; height:.55em; border-radius:50%; background:var(--fg);
    vertical-align:middle; margin-right:.55em; position:relative; top:-0.06em; }
  .sig .kx{ font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:.95em; opacity:1; margin-left:.5em; white-space:nowrap;
    pointer-events:auto; color:#000; --holo-accent:#000; }   /* braille is BLACK in EVERY theme — HoloFX paints it with --holo-accent (the colon below matches) */
  .sig .kx, .sig .kx.holo-k-rev{ border-bottom:0; }       /* drop HoloFX's dotted κ underline in the gateway signature */
  /* the revealed full hash AND its copy icon take the SAME black ink as the braille (HoloFX would otherwise
     fall back to its accent purple / a green "copied" flash) — so reveal-on-hover stays on-brand here. */
  .sig .kx.holo-k-rev{ color:#000; }
  .sig .holo-k-copy, .sig .holo-k-copy.copied{ color:#000; opacity:.75; }
  .sig .holo-k-copy:hover{ opacity:1; }
  .sig .khint{ display:none; font-size:.78em; opacity:.5; letter-spacing:.02em; margin-left:.45em; white-space:nowrap; }
  .sig #kx[data-holo-k-upgraded] ~ .khint{ display:inline; }   /* the hint appears only once the live braille κ is mounted */
  /* "UOR" + its trailing colon and the braille all share ONE fixed ink (#000) in light, dark AND immersive
     — no theme override touches them, so the colour is identical across all three modes. */
  .sig .uor{ color:#000; text-decoration:none; pointer-events:auto; border-bottom:0; }
  .sig .uor-colon{ color:#000; }
  body.leaving .sig{ opacity:0; transition:opacity .16s ease; }

  /* boot handoff — ONE continuous power-on, no intermediate beat: a solid #000 veil rises FAST (no
     separate chrome/sky fade competing with it). The gateway and the enclosed splash share the exact
     same black (#000), so the splash's reveal seams straight out of this veil — the only motion the
     user sees is darken → boot animation, with nothing flashing in between. */
  body.leaving .bar, body.leaving .hero, body.leaving #vanta{ pointer-events:none; }
  body.leaving::after{ content:""; position:fixed; inset:0; background:#000; z-index:60; pointer-events:none; animation:bootToBlack .18s linear forwards; }  /* shared boot-veil timing (== splash) */
  @keyframes bootToBlack{ from{ opacity:0; } to{ opacity:1; } }

  /* ── THE POWER-UP ─────────────────────────────────────────────────────────────────────────────
     A cinematic power-on that GROWS OUT of the button and draws the whole gateway into a single
     core, then hands off to the boot splash on the shared #000. Purely additive over the fail-closed
     boot(): the self-cert + constitution gates still run FIRST — this is only the veil they wear.
     Compositor-only (transform · opacity · filter) so it holds 60fps beside the live cloud sky.
     Two beats: CHARGE (the core ignites under the button, the spectrum ring spins up, identity
     flares) → IMPLODE (every element streams into the core, the sky recedes, the core collapses to
     a hot point) → the existing #000 veil rises. Reduced-motion skips straight to the veil. */
  .core{ position:fixed; left:50%; top:50%; z-index:55; width:3px; height:3px; border-radius:50%;
    pointer-events:none; opacity:0; transform:translate(-50%,-50%) scale(1); mix-blend-mode:screen;
    background:radial-gradient(circle, #fff 0%, #e8fff7 16%, rgba(125,239,201,.92) 34%, rgba(91,140,255,.55) 60%, transparent 74%); }
  body.charging .core{ opacity:1; animation:coreCharge .56s var(--ease) forwards; }
  body.imploding .core{ opacity:1; animation:coreCollapse .52s cubic-bezier(.72,0,.84,0) forwards; }
  @keyframes coreCharge{ from{ transform:translate(-50%,-50%) scale(1); filter:blur(2px); }
                         to{   transform:translate(-50%,-50%) scale(90);  filter:blur(20px); } }
  @keyframes coreCollapse{ 0%{ transform:translate(-50%,-50%) scale(150); filter:blur(26px); }
                          62%{ transform:translate(-50%,-50%) scale(34);  filter:blur(7px); }
                          82%{ transform:translate(-50%,-50%) scale(9);   filter:blur(2px); }
                          100%{ transform:translate(-50%,-50%) scale(0);  filter:blur(0); } }
  /* CHARGE — the power button steadies and brightens; its spectrum ring spins up; identity flares */
  body.charging .btn-primary{ transform:scale(1.05); transition:transform .5s var(--ease);
    box-shadow:0 0 30px -2px rgba(125,239,201,.55), 0 0 60px -6px rgba(91,140,255,.5), 0 .35em 1.5em rgba(0,0,0,.45) !important; }
  :root[data-immersive="full"] body.charging .btn-primary::before{ animation-duration:.7s !important; }
  /* identity confirmed — the self-cert signature flares a calm teal halo as the page commits to boot */
  body.charging .sig{ animation:sigFlare 1s var(--ease) forwards; }
  @keyframes sigFlare{ 0%{ filter:none; } 30%{ filter:drop-shadow(0 0 10px rgba(125,239,201,.85)) drop-shadow(0 0 22px rgba(125,239,201,.45)); } 100%{ filter:drop-shadow(0 0 6px rgba(125,239,201,.4)); } }
  /* IMPLODE — every element streams toward the core (per-element vector set in JS as --dx/--dy) */
  body.imploding .bar, body.imploding .pill-star, body.imploding h1, body.imploding .sub,
  body.imploding #download, body.imploding .sig{
    transform:translate(var(--dx,0), var(--dy,0)) scale(.16); opacity:0; filter:blur(7px);
    transition:transform .6s cubic-bezier(.6,0,.85,.2), opacity .52s ease, filter .6s ease; }
  /* the primary button IS the core — it collapses to the point last */
  body.imploding .btn-primary{ transform:scale(.08); opacity:0; filter:blur(3px);
    transition:transform .5s cubic-bezier(.72,0,.84,0) .06s, opacity .42s ease .1s, filter .5s ease; }
  /* the cloud sky recedes into the core (origin pinned to the button in JS) */
  body.imploding .bg{ transform:scale(.5); opacity:0;
    transition:transform .7s cubic-bezier(.6,0,.85,.2), opacity .6s ease; }
  @media (prefers-reduced-motion: reduce){
    .core{ display:none; }
    body.charging .btn-primary, body.charging .sig,
    body.imploding .bar, body.imploding .pill-star, body.imploding h1, body.imploding .sub,
    body.imploding #download, body.imploding .sig, body.imploding .btn-primary, body.imploding .bg{
      animation:none !important; transition:none !important; }
  }

  /* ── RESPONSIVE: the golden tokens already fluidly resize everything; these only collapse the
     secondary bar items on small widths and re-center / gently shrink the unit on tight heights so
     the composition still never scrolls. ──────────────────────────────────────────────────────── */
  @media (max-width: 820px){
    .links{ display:none; }
    .search{ width:clamp(150px, 30vw, 220px); }
  }
  @media (max-width: 560px){
    /* tighten the bar so brand-mark + search + appearance toggle fit one phone row (no clipping):
       collapse the wordmark to its mark, drop the GitHub icon (still in the hero star pill). */
    .bar{ padding:0 var(--u); gap:calc(var(--u) * .6); }
    .brand-name{ display:none; }
    .ghlink{ display:none; }
    /* let the search+toggle group own the row and the search shrink: drop the flex spacer so .right
       takes the remaining width, and let search flex inside it (the 48dp toggle no longer overflows). */
    .grow{ display:none; }
    .right{ flex:1; min-width:0; }
    /* keep search reachable on phones: a compact pill in the bar, results as a full-width sheet */
    .search{ width:auto; flex:1 1 auto; min-width:0; }
    .search .kbd{ display:none; }
    .results{ position:fixed; left:var(--frame-l); right:var(--frame-r); width:auto; top:calc(var(--frame-t) + var(--u) * 3.85 + .4em); }
    .hero{ justify-content:center; padding-bottom:var(--u-phi); }
    .cta{ width:100%; }
    .btn{ flex:1; justify-content:center; }
  }
  /* narrow phones: stack the two CTAs as full-width pills — big, thumb-friendly targets, and the
     desktop min-width floor (≈11·u) can no longer push them past a 320–430px edge. */
  @media (max-width: 430px){
    .cta{ grid-auto-flow:row; }
    .cta .btn{ min-width:0; width:100%; }
  }
  @media (max-height: 640px){
    /* short viewports (landscape phones, split panes): height drives the headline — but keep the 12vw
       width guard so a narrow-AND-short screen never lets a long word (Supercomputer) overflow. */
    :root{ --u: clamp(12px, 1.7vmin, 20px); --display: clamp(28px, min(9.4vh, 12vw), 120px); }
    .hero{ justify-content:center; padding-top:var(--u-phi2); padding-bottom:var(--u-phi); }
  }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; animation:none !important; } }

  /* ── TOUCH CONFORMANCE (coarse pointer) ───────────────────────────────────────────────────────
     MD3 Accessibility → Touch target: every interactive control clears 48×48dp. WCAG 2.2 §2.5.8
     (Target Size, Minimum) is the AA floor; MD3's 48dp is stricter, so we meet both. The block keys on
     `pointer:coarse`, so a mouse desktop is untouched — the existing desktop experience is preserved
     exactly. iOS Safari zooms when a focused input's font-size < 16px, so inputs are pinned to 16px to
     prevent the zoom-and-pan jump on focus. We trigger on EITHER the MD3 Compact window-size class
     (≤600dp — Foundations → Layout → Window size classes) OR a coarse pointer, so a phone, a tablet in
     a narrow split, and a desktop window dragged below 600px all get the touch floor; a full-width
     mouse desktop (>600px, fine pointer) is never matched. */
  @media (max-width: 600px), (pointer: coarse){
    /* inputs ≥16px → no focus-zoom on iOS */
    .search input, #lq{ font-size:max(16px, var(--u)); }
    /* the appearance toggle: each mode button reaches 48dp */
    .toggle button{ width:var(--tap); height:var(--tap); }
    .toggle button svg{ width:calc(var(--u) * 1.18); height:calc(var(--u) * 1.18); }
    /* search pill + hero pill + CTAs + github reach the 48dp tap floor */
    .search{ min-height:var(--tap); }
    .pill-star{ min-height:var(--tap); }
    .btn{ min-height:var(--tap); }
    .ghlink{ width:var(--tap); height:var(--tap); }
    /* launcher: list rows, find field, controls all reach 48dp */
    .lx-item{ min-height:var(--tap); }
    .lx-find{ min-height:var(--tap); }
    .lx-esc{ min-height:var(--tap); padding:0 .4em; }
    .lx-ext{ width:var(--tap); height:var(--tap); }
    .lx-btn{ min-height:var(--tap); }
    .lx-kappa{ min-height:var(--tap); }
    .lx-bar .lights i.c{ position:relative; }                       /* the back ⌫ light — enlarge its hit area without resizing the dot */
    .lx-bar .lights i.c::after{ content:""; position:absolute; inset:-14px; border-radius:50%; }
  }

  /* ════════════════════════════════════════════════════════════════════════════════════════════
     THE LAUNCHER — a full-screen, Spotlight-grade search over the native app catalogue, with a LIVE
     preview of the highlighted app running in its OWN self-verifying sealed holospace. Inherits the
     gateway tokens + the bezel framing; frames the preview as a real computer window. ═════════════ */
  .lx{ position:fixed; inset:var(--frame-t) var(--frame-r) var(--frame-b) var(--frame-l); z-index:40; border-radius:var(--frame-rad); overflow:hidden;
    display:flex; flex-direction:column; color:var(--fg);
    background:color-mix(in srgb, var(--bg) 60%, transparent);
    -webkit-backdrop-filter:blur(28px) saturate(1.2); backdrop-filter:blur(28px) saturate(1.2);
    opacity:0; transform:scale(1.014); pointer-events:none;
    transition:opacity .3s var(--ease), transform .36s var(--ease); }
  .lx.open{ opacity:1; transform:none; pointer-events:auto; }
  .lx[hidden]{ display:none; }
  .lx-top{ flex:none; display:flex; align-items:center; gap:var(--u); padding:calc(var(--u)*1.05) var(--u-phi2); border-bottom:1px solid var(--line); }
  .lx-find{ flex:1; display:flex; align-items:center; gap:.7em; background:var(--panel); border:1px solid var(--line);
    border-radius:calc(var(--u)*.8); height:calc(var(--u)*3); padding:0 1em; transition:border-color .15s, box-shadow .25s; }
  .lx-find:focus-within{ border-color:var(--line-strong); box-shadow:0 0 0 3px rgba(91,140,255,.18); }
  .lx-find svg{ width:1.15em; height:1.15em; color:var(--muted); flex:none; }
  .lx-find input{ all:unset; flex:1; min-width:0; color:var(--fg); font:500 calc(var(--u)*1.2)/1.3 inherit; }
  .lx-find input::placeholder{ color:var(--muted-2); }
  .lx-count{ flex:none; color:var(--muted-2); font-size:calc(var(--u)*.82); white-space:nowrap; }
  .lx-esc{ flex:none; color:var(--muted); font-size:calc(var(--u)*.82); display:inline-flex; align-items:center; gap:.5em; cursor:pointer; transition:color .15s; }
  .lx-esc:hover{ color:var(--fg); }
  .lx-esc kbd{ background:var(--panel-2); border:1px solid var(--line); border-radius:.4em; padding:.16em .55em; font:600 .85em/1.4 inherit; color:var(--muted); }
  .lx-fs{ -webkit-appearance:none; appearance:none; border:1px solid var(--line); background:var(--panel); border-radius:999px; padding:.42em .9em; }
  .lx-fs svg{ width:1.05em; height:1.05em; flex:none; }
  .lx-fs:hover{ border-color:var(--line-strong); color:var(--fg); background:var(--panel-hover); }
  .lx-body{ flex:1; min-height:0; display:flex; }
  /* media LEFT (the live preview) · browse rail RIGHT — a clean, watch-page rhythm */
  .lx-col{ flex:none; width:clamp(326px, 34%, 482px); display:flex; flex-direction:column; min-height:0; border-left:1px solid var(--line); }
  /* category chips — one tap filters the rail; horizontally scrollable, no scrollbar */
  .lx-cats{ flex:none; display:flex; align-items:center; gap:.5em; padding:calc(var(--u)*.8) calc(var(--u)*.95); overflow-x:auto; scrollbar-width:none; border-bottom:1px solid var(--line);
    -webkit-mask:linear-gradient(90deg, #000 calc(100% - 2.2em), transparent); mask:linear-gradient(90deg, #000 calc(100% - 2.2em), transparent); }
  .lx-cats::-webkit-scrollbar{ display:none; }
  .lx-chip{ -webkit-appearance:none; appearance:none; cursor:pointer; flex:none; white-space:nowrap; border:1px solid var(--line); background:var(--panel); color:var(--fg-soft);
    border-radius:999px; padding:.52em 1.05em; font:600 calc(var(--u)*.86)/1 inherit; transition:background .14s, color .14s, border-color .14s; }
  .lx-chip:hover{ background:var(--panel-hover); color:var(--fg); }
  .lx-chip.on{ background:var(--fg); color:var(--bg); border-color:var(--fg); }
  .lx-list{ flex:1; min-height:0; overflow-y:auto; overscroll-behavior:contain; padding:calc(var(--u)*.7) calc(var(--u)*.7) calc(var(--u)*1.4); display:flex; flex-direction:column; gap:calc(var(--u)*.32); }
  .lx-list::-webkit-scrollbar{ width:10px; } .lx-list::-webkit-scrollbar-thumb{ background:var(--line-strong); border:3px solid transparent; background-clip:padding-box; border-radius:999px; }
  /* a rich card: a 16:9 thumbnail · title · verified source · one concise line */
  .lx-item{ display:flex; gap:.85em; align-items:flex-start; padding:calc(var(--u)*.5); border-radius:calc(var(--u)*.85); cursor:pointer; user-select:none; transition:background .12s ease; }
  .lx-item:hover{ background:color-mix(in srgb, var(--panel-hover) 55%, transparent); }
  .lx-item[aria-selected="true"]{ background:var(--panel-hover); box-shadow:inset 0 0 0 1px var(--line-strong); }
  /* 16:9 category-hued thumbnail with a crisp white line glyph — pure vector, razor-sharp at 8K/retina */
  .lx-thumb{ position:relative; flex:none; width:42%; aspect-ratio:16/9; border-radius:calc(var(--u)*.7); overflow:hidden; display:grid; place-items:center; color:#fff;
    background:radial-gradient(125% 140% at 26% 10%, hsl(var(--h,220) 72% 61%), hsl(calc(var(--h,220) + 30) 64% 25%) 72%, #07070b);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.16), inset 0 0 0 1px rgba(255,255,255,.07), 0 6px 18px -10px rgba(0,0,0,.6); }
  .lx-thumb svg{ width:42%; height:42%; display:block; filter:drop-shadow(0 2px 6px rgba(0,0,0,.4)); }
  /* a REAL still: the live sealed-holospace, rendered at 1280×720 then scaled to fit, fading over the glyph */
  .lx-thumb .lx-live{ position:absolute; top:0; left:0; width:1280px; height:720px; border:0; transform-origin:top left; pointer-events:none; background:transparent; opacity:0; transition:opacity .5s ease; z-index:1; }

      k = (lock && (lock.root || lock.kappa)) || null;
    } catch (e) {}
    lKappa[folder] = k; return k;
  }
  function openLauncher(seed) {
    if (lIsOpen) { try { LQ.focus(); } catch {} return; }
    lIsOpen = true; lFull = false; lCat = "Featured"; LX.classList.remove("full"); LOPEN.textContent = "Open"; LX.hidden = false;
    document.documentElement.style.overflow = "hidden";
    if (typeof seed === "string") LQ.value = seed; else if (Q.value) LQ.value = Q.value;
    ensureRoot().then(r => { lRoot = r; }).catch(() => {});
    requestAnimationFrame(() => requestAnimationFrame(() => { if (lIsOpen) LX.classList.add("open"); }));
    setTimeout(() => { if (lIsOpen) LX.classList.add("open"); }, 60);   // rAF can be throttled — ensure reveal
    lrender();
    setTimeout(() => { try { LQ.focus(); LQ.select(); } catch {} }, 50);
  }
  function closeLauncher() {
    if (!lIsOpen) return; lIsOpen = false; lFull = false; LX.classList.remove("open", "full");
    clearTimeout(lTimer); clearTimeout(lLoadTO); lLiveReset();
    setTimeout(() => { if (!lIsOpen) { LX.hidden = true; try { LFRAME.removeAttribute("src"); } catch {} LFRAME.classList.remove("in"); lFolder = null; document.documentElement.style.overflow = ""; } }, 360);
    try { Q.blur(); } catch {}
  }
  // the launcher browses the WHOLE catalogue (not just the featured few): no query → every app in the
  // chosen category, sorted; a query → ranked matches, still scoped to the category.
  function lcompute(q) {
    if (q) { const r = compute(q); return (lCat === "All" || lCat === "Featured") ? r : r.filter(a => a.c === lCat); }
    if (lCat === "Featured") return FEATURED.map(f => APPS.find(a => a.f === f)).filter(Boolean);
    if (lCat === "All") return APPS.slice().sort((a, b) => a.n.localeCompare(b.n));
    return APPS.filter(a => a.c === lCat).sort((a, b) => a.n.localeCompare(b.n));
  }
  function lcatsRender() {
    LCATSEL.innerHTML = LCATS.map(c => '<button class="lx-chip' + (c === lCat ? " on" : "") + '" type="button" role="tab" data-c="' + esc(c) + '" aria-selected="' + (c === lCat) + '">' + esc(c) + "</button>").join("");
  }
  // ── live sealed-holospace stills: each card scrolled into view lazily mounts the REAL app as a tiny
  //    live preview (capped concurrency), fading over the glyph tile. Off-http or on failure the glyph
  //    stays — never a broken frame. Mounts are debounced and torn down on close / re-render. ──
  const LIVE_CAP = 4; let lLiveObs = null, lLiveT = 0, lLiveActive = 0, lLiveOk = null; const lLiveQueue = [];
  // probe ONCE whether the live OS image is actually servable here (holospace.html + apps). On a static
  // marketing host it isn't → live stills stay off and the glyph tiles remain (never a wall of 404s).
  async function lLiveAvailable() {
    if (lLiveOk !== null) return lLiveOk;
    if (!location.protocol.startsWith("http")) return (lLiveOk = false);
    try { const root = lRoot || await ensureRoot(); lRoot = root; const r = await fetch(root + "holospace.html", { cache: "force-cache" }); lLiveOk = r.ok; } catch (e) { lLiveOk = false; }
    return lLiveOk;
  }
  function lLivePump() {
    while (lLiveActive < LIVE_CAP && lLiveQueue.length) {
      const card = lLiveQueue.shift(); if (!card || !card.isConnected) continue;
      const thumb = card.querySelector(".lx-thumb"); if (!thumb || thumb.dataset.live) continue;
      thumb.dataset.live = "1"; lLiveActive++; lMountThumb(thumb, card.getAttribute("data-f"));
    }
  }
  async function lMountThumb(thumb, folder) {
    const dec = () => { lLiveActive = Math.max(0, lLiveActive - 1); lLivePump(); };
    try {
      if (!location.protocol.startsWith("http")) return dec();
      const root = lRoot || await ensureRoot(); lRoot = root;
      if (!thumb.isConnected || !lIsOpen) return dec();
      const fr = document.createElement("iframe");
      fr.className = "lx-live"; fr.tabIndex = -1; fr.setAttribute("aria-hidden", "true"); fr.setAttribute("scrolling", "no");
      fr.setAttribute("sandbox", "allow-scripts allow-same-origin");
      fr.style.transform = "scale(" + ((thumb.clientWidth || 200) / 1280) + ")";
      let settled = false; const fin = (ok) => { if (settled) return; settled = true; if (ok) fr.classList.add("in"); else { try { fr.remove(); } catch (e) {} } dec(); };
      fr.addEventListener("load", () => fin(true)); fr.addEventListener("error", () => fin(false));
      setTimeout(() => fin(false), 11000);   // never let a slow app hold a slot — keep the glyph
      fr.src = root + "holospace.html?app=" + encodeURIComponent(folder) + "&bare=1";
      thumb.appendChild(fr);
    } catch (e) { dec(); }
  }
  function lLiveReset() { try { if (lLiveObs) lLiveObs.disconnect(); } catch (e) {} lLiveObs = null; lLiveQueue.length = 0; lLiveActive = 0; clearTimeout(lLiveT); try { LRES.querySelectorAll(".lx-live").forEach(f => f.remove()); } catch (e) {} }
  function lLiveObserve() {
    if (!("IntersectionObserver" in window)) return;
    lLiveObs = new IntersectionObserver((ents) => { for (const e of ents) if (e.isIntersecting) { lLiveQueue.push(e.target); lLiveObs.unobserve(e.target); } lLivePump(); }, { root: LRES, rootMargin: "150px 0px" });
    LRES.querySelectorAll(".lx-item").forEach(c => lLiveObs.observe(c));
  }
  function lScheduleLive() { lLiveReset(); lLiveT = setTimeout(() => { lLiveAvailable().then(ok => { if (ok && lIsOpen) lLiveObserve(); }); }, 320); }   // debounce + gate on availability
  function lrender() {
    const q = LQ.value.trim(), ql = q.toLowerCase();
    lcatsRender();
    lItems = lcompute(q); lSel = lItems.length ? 0 : -1;
    LCOUNT.textContent = lItems.length ? (lItems.length + (q ? " result" : " app") + (lItems.length > 1 ? "s" : "")) : "";
    if (!lItems.length) { lLiveReset(); LRES.innerHTML = '<div class="lx-empty">No app matches “' + esc(q) + '”</div>'; return; }
    LRES.innerHTML = lItems.map((a, i) => '<div class="lx-item" role="option" id="li' + i + '" data-f="' + a.f + '" aria-selected="' + (i === lSel) + '">'
      + '<span class="lx-thumb" style="--h:' + hueFor(a.c) + '">' + appIcon(a) + '<span class="lx-play" aria-hidden="true">▶</span></span>'
      + '<span class="lx-main"><span class="lx-name">' + hi(a.n, ql) + '</span>'
      + '<span class="lx-src">Hologram' + VFCHK + '<span>· ' + esc(a.c) + '</span></span>'
      + '<span class="lx-desc">' + esc(concise(a.d)) + '</span></span></div>').join("");
    lmark(true); lScheduleLive();
  }
  function lmark(reschedule) {
    [...LRES.querySelectorAll(".lx-item")].forEach((el, i) => { el.setAttribute("aria-selected", String(i === lSel)); if (i === lSel) el.scrollIntoView({ block: "nearest" }); });
    LQ.setAttribute("aria-activedescendant", lSel >= 0 ? ("li" + lSel) : "");
    const app = lItems[lSel]; if (app) { setMeta(app); if (reschedule) schedulePreview(app); }
  }
  function lmove(d) { if (!lItems.length) return; lSel = (lSel + d + lItems.length) % lItems.length; lmark(true); }
  function setMeta(app) {
    LWTITLE.textContent = app.n; LMNAME.textContent = app.n; LMCAT.textContent = app.c; LMDESC.textContent = app.d;
    var ic = appIcon(app); LWIC.innerHTML = ic; LMTILE.innerHTML = ic; LMTILE.style.setProperty("--h", hueFor(app.c));
  }
  function showKappa(folder) {
    LKAPPA.classList.remove("copied"); const k = lKappa[folder];
    if (k) { lFullKappa = k; LKLBL.textContent = "Sealed"; LKX.textContent = shortDid(k); LKAPPA.title = k + " — content address (click to copy)"; LKAPPA.classList.add("ok"); }
    else { lFullKappa = null; LKX.textContent = ""; LKAPPA.classList.remove("ok"); LKLBL.textContent = "Self-verifying holospace"; LKAPPA.title = "Runs in its own self-verifying, content-addressed holospace (Law L5)"; }
  }
  function schedulePreview(app) { clearTimeout(lTimer); lTimer = setTimeout(() => mountPreview(app), 175); }   // debounce: don't thrash while arrowing
  async function mountPreview(app) {
    if (!app || !lIsOpen) return;
    if (lFolder === app.f && LFRAME.getAttribute("src")) return;   // already showing this app
    lFolder = app.f;
    LFRAME.classList.remove("in"); LLOAD.style.display = "grid"; LLOADTXT.textContent = "Mounting " + app.n + "…";
    LKAPPA.classList.remove("ok", "copied"); LKLBL.textContent = "Sealing…"; LKX.textContent = ""; appKappa(app.f).then(() => { if (lFolder === app.f) showKappa(app.f); });
    if (!location.protocol.startsWith("http")) { LLOADTXT.innerHTML = "Live previews boot over <b>http</b>.<br>Run <code>node tools/serve-pages.mjs</code> in <b>system</b>."; return; }
    const root = lRoot || await ensureRoot(); lRoot = root;
    if (lFolder !== app.f) return;   // selection moved on while awaiting the SW
    const url = root + "holospace.html?app=" + encodeURIComponent(app.f) + "&bare=1";
    clearTimeout(lLoadTO);
    lLoadTO = setTimeout(() => { if (lFolder === app.f && !LFRAME.classList.contains("in")) LLOADTXT.innerHTML = "Still mounting… open it in its own tab with <b>↗</b>"; }, 9000);
    LFRAME.onload = function () { if (lFolder === app.f) { LFRAME.classList.add("in"); LLOAD.style.display = "none"; clearTimeout(lLoadTO); LWIN.classList.remove("swept"); void LWIN.offsetWidth; LWIN.classList.add("swept"); } };
    LFRAME.src = url;
  }
  function enterFull(app) { if (!app) return; if (lFolder !== app.f) { lFolder = null; mountPreview(app); } lFull = true; LX.classList.add("full"); LOPEN.textContent = "← Back to apps"; }
  function exitFull() { lFull = false; LX.classList.remove("full"); LOPEN.textContent = "Open"; try { LQ.focus(); } catch {} }
  // wiring
  LQ.addEventListener("input", lrender);
  LQ.addEventListener("keydown", function (e) {
    if (e.key === "ArrowDown") { e.preventDefault(); lmove(1); }
    else if (e.key === "ArrowUp") { e.preventDefault(); lmove(-1); }
    else if (e.key === "Enter") { e.preventDefault(); if (lItems[lSel]) enterFull(lItems[lSel]); }
    else if (e.key === "Escape") { e.preventDefault(); e.stopPropagation(); if (lFull) exitFull(); else if (LQ.value) { LQ.value = ""; lrender(); } else closeLauncher(); }
  });
  LRES.addEventListener("mousedown", function (e) {
    const it = e.target.closest(".lx-item"); if (!it) return; e.preventDefault();
    const i = [...LRES.querySelectorAll(".lx-item")].indexOf(it); if (i < 0) return;
    if (i === lSel) enterFull(lItems[i]); else { lSel = i; lmark(true); }   // click selects+previews; click again opens
  });
  LRES.addEventListener("dblclick", function (e) { if (e.target.closest(".lx-item") && lItems[lSel]) enterFull(lItems[lSel]); });
  LCATSEL.addEventListener("click", function (e) { const c = e.target.closest(".lx-chip"); if (!c) return; lCat = c.getAttribute("data-c"); lrender(); LRES.scrollTop = 0; });
  LOPEN.addEventListener("click", function () { if (lFull) exitFull(); else if (lItems[lSel]) enterFull(lItems[lSel]); });
  LEXT.addEventListener("click", function (e) { e.preventDefault(); const app = lItems[lSel]; if (app) launchApp(app.f); });
  LBACK.addEventListener("click", function () { if (lFull) exitFull(); else closeLauncher(); });
  LCLOSE.addEventListener("click", function () { closeLauncher(); });
  // true OS-level fullscreen for the most immersive browse — the whole launcher fills the display.
  const LFS = $("lfs");
  LFS.addEventListener("click", function () { try { document.fullscreenElement ? document.exitFullscreen() : LX.requestFullscreen(); } catch (e) {} });
  document.addEventListener("fullscreenchange", function () { const lbl = LFS.querySelector(".lx-fslbl"); if (lbl) lbl.textContent = document.fullscreenElement ? "Exit" : "Fullscreen"; });
  LKAPPA.addEventListener("click", function () {
    if (!lFullKappa) return; const old = LKLBL.textContent;
    const fin = () => { LKAPPA.classList.add("copied"); LKLBL.textContent = "Copied"; setTimeout(() => { LKAPPA.classList.remove("copied"); LKLBL.textContent = old; }, 1400); };
    try { navigator.clipboard.writeText(lFullKappa).then(fin, fin); } catch (e) { fin(); }
  });
</script>
