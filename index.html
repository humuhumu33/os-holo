  /* ─────────────────────────────────────────────────────────────────────────────────────────
     The gateway face — a clean welcome on pure black. The ENTIRE layout is built from ONE fluid
     golden unit (--u) and powers of φ (1.618), so every size and gap is a golden relationship and
     the composition holds its proportions from a phone to an 8K wall. Everything on screen is
     vector (the SVG mark + system text), so it stays razor-sharp at any pixel density.
     ───────────────────────────────────────────────────────────────────────────────────────── */
  :root{
    --phi:1.618;
    --u: clamp(15px, 1.3vmin, 54px);            /* the golden unit — scales with the viewport's short side */
    --u1: calc(var(--u) * 1.618);               /* φ¹ */
    --u2: calc(var(--u) * 2.618);               /* φ² */
    --u3: calc(var(--u) * 4.236);               /* φ³ */
    --word: clamp(24px, 8vw, calc(var(--u) * 6)); /* wordmark cap — golden, fluid; grander on big screens, the vw term keeps the whole lockup inside the frame on the narrowest phone */
    --mark: calc(var(--word) * var(--phi));     /* the dot-mark is φ× the wordmark cap — a golden pair */
    --ink:#f5f5f7;
    color-scheme:dark;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{ background:#000; color:var(--ink); overflow:hidden;
    font:500 var(--u)/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;

  /* two quiet doors, top-right (golden-spaced) */

  .nav a{ display:inline-flex; align-items:center; gap:.5em; text-decoration:none; color:#c7c7cd;

  .nav a:hover{ color:#fff; }
  .nav svg{ width:1.25em; height:1.25em; }

  /* the composition, balanced in the centre of the frame — the nav above and the signature below
     frame it with even breathing room. Golden still governs every SIZE and GAP; only the vertical
     anchor is centred (rather than on the 38.2% line) so the whole experience feels balanced. */
  .cluster{ position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
    max-width:92vw; display:flex; flex-direction:column; align-items:center; gap:var(--u2); }
  /* hero wordmark — a custom VECTOR logotype in the Caslon's Egyptian style (the first sans, 1816),
     built by tools/gen-wordmark.mjs. GOLDEN sizing: svg height = --word·1.2 so its cap height ≈ --word,
     making the dot-mark button (height --word·φ) and the wordmark cap a clean φ:1 pair. White. */
  .word{ height:calc(var(--word) * 1.2); width:auto; display:block; color:#fff; }

  /* the BOOT CONTROL + its label — the Hologram dot-mark IS the entry button (press the brand to
     enter). Floats a golden gap below the hero, out of flow so the hero holds the golden line. */
  .act{ display:flex; flex-direction:column; align-items:center; gap:calc(var(--u) * .85); }
  .enter{ -webkit-appearance:none; appearance:none; border:0; background:none; margin:0; cursor:pointer;
    padding:calc(var(--u) * .5); display:grid; place-items:center; border-radius:50%; transition:transform .2s ease; }
  .enter .ico{ width:var(--mark); height:var(--mark); display:block; color:#fff; transition:filter .25s ease; }
  .enter:hover{ transform:scale(1.045); }
  .enter:active{ transform:scale(.975); }
  .enter:hover .ico, .enter:focus-visible .ico{ filter:drop-shadow(0 0 calc(var(--u) * .95) rgba(255,255,255,.38)); }
  .enter:focus-visible{ outline:none; }

  /* the label beneath the button — the call to action, later the boot progress. One readable size,
     the SAME typeface as everything else (no small text, no second font). */
  .status{ max-width:min(92vw, 46ch); color:#aeaeb6; font-weight:500; line-height:1.6;
    font-size:clamp(16px, calc(var(--u) * 1.08), calc(var(--u) * 1.3)); text-align:center; letter-spacing:.01em; }
  .status b{ color:#e6e6ea; font-weight:600; }
  .status code{ color:#e6e6ea; font-weight:600; }

     typeface as the rest (the κ is no longer monospace) and a readable size — just dimmer. */
  .foot{ position:fixed; left:0; right:0; bottom:calc(var(--u) * 1.5); z-index:2;
    display:flex; flex-direction:column; align-items:center; gap:calc(var(--u) * .6);
    color:#6f6f77; text-align:center; padding:0 6vw; }
  .kappa{ font-size:clamp(15px, calc(var(--u) * .92), calc(var(--u) * 1.05)); letter-spacing:.02em; opacity:.9; max-width:90vw; }
  .ag{ font-size:clamp(15px, calc(var(--u) * .92), calc(var(--u) * 1.05)); opacity:.95; }
  .ag a{ color:#9fd2cb; text-decoration:none; }

  /* boot handoff: dissolve the gateway content into the splash. The black bg is shared, so the page

      .hh h1{margin:0;font-size:clamp(34px,5.4vw,48px);font-weight:600;letter-spacing:-.015em;line-height:1.08;}
      .hh-lead{margin:0;max-width:26ch;font-size:clamp(16px,2.3vw,19px);line-height:1.5;color:#c9c3ea;}
      .hh-act{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center;margin-top:.5rem;}
      .hh-btn{display:inline-flex;align-items:center;gap:.5rem;border-radius:999px;padding:.82rem 1.55rem;font:500 15.5px/1 inherit;cursor:pointer;text-decoration:none;border:1px solid transparent;transition:filter .15s,background .15s;}
      .hh-p{color:#fff;background:linear-gradient(135deg,#8b5cf6,#6d4bd0);box-shadow:0 12px 32px rgba(109,75,208,.45);}
      .hh-p:hover{filter:brightness(1.12);}
      .hh-g{color:#cdd6ff;border-color:rgba(139,92,246,.4);}
      .hh-g:hover{background:rgba(139,92,246,.12);}`;
    const html = `<div class="hh"><div class="hh-sky"></div><div class="hh-aur"></div><div class="hh-stage"><main class="hh-card">
      ${cube}
      <h1>Boot refused</h1>
      <p class="hh-lead">Hologram OS couldn't verify its Constitution, so it didn't start. Nothing ran.</p>
      <div class="hh-act"><button class="hh-btn hh-p" onclick="location.reload()">↻ Re-verify</button><a class="hh-btn hh-g" href="${constitutionHref}">Read the Constitution</a></div>
    </main></div></div>`;
    const s = document.createElement("style"); s.textContent = css; document.head.appendChild(s);
    document.body.style.cssText = "margin:0"; document.body.innerHTML = html;
  }

  // Live self-address: the gateway resolves ITS OWN bytes to a κ — booting is resolve-by-content (Law L5).
  (async () => {
    try {
      const buf = await (await fetch(location.href, { cache: "no-store" })).arrayBuffer();
      const hex = [...new Uint8Array(await crypto.subtle.digest("SHA-256", buf))].map((b) => b.toString(16).padStart(2, "0")).join("");
      const short = hex.slice(0, 8) + "…" + hex.slice(-6);   // a tidy one-line κ — readable, not a tiny 64-char wrap
      $("kappa").textContent = "this gateway is  did:holo:sha256:" + short;
    } catch { $("kappa").textContent = "did:holo — content-addressed"; }
  })();

  // Boot: bring up the κ / FHS Service Worker (the substrate gateway — maps the flat URL space onto
  // the FHS tree + supplies cross-origin isolation), then enter the bootloader. Relative paths, so
  // this works at a root site, a /<repo>/ project site, or `node tools/holo-serve-fhs.mjs`.
  let booting = false;
  async function boot() {
    if (booting) return; booting = true;
    // Hologram OS needs http(s): the κ Service Worker — which maps the flat URL space onto the FHS
    // tree AND re-derives every byte to its κ (Law L5) — cannot run from file://. So guide the user
    // instead of forwarding to a path that can't boot.
    if (!location.protocol.startsWith("http")) {
      booting = false;
      $("status").innerHTML = 'Hologram OS boots over <b>http</b>. From this folder run<br><code>cd system &amp;&amp; node tools/serve-pages.mjs</code><br>then open <b>http://127.0.0.1:8080/</b>';
      return;
    }
    $("status").textContent = "resolving Hologram OS…";
    // Find where the OS image is served — its real repo path (system/os/), or a remapped root (os/)
    // if the host aliases it. So the gateway boots whether the repo is served literally by ANY static
    // host or through the remapping dev server. (HEAD-probe the SW; first hit wins.)
    let root = "system/os/";
    for (const r of ["system/os/", "os/"]) { try { if ((await fetch(r + "holo-fhs-sw.js", { method: "HEAD", cache: "no-store" })).ok) { root = r; break; } } catch {} }

    // ── Constitutional boot gate (ADR-033): the FIRST act of boot is to verify the conscience ──
    // A sovereign computer does not boot under a constitution it cannot re-derive for itself. Load
    // the fail-closed, self-verifying conscience gate and re-derive the eight principles against
    // their pinned κ (Law L5). Sealed ⇒ boot. Tampered or absent ⇒ FAIL CLOSED — refuse to boot.
    const CONSTITUTION_K = "did:holo:sha256:3ff288d0c06a0fd22da898301cb6c8c11fc62e3b2b7ab58a53c7cb0cb385f00c";
    $("status").textContent = "verifying the Constitution…";
    let constitutionSealed = false;
    try {
      const C = await import(new URL(root + "usr/lib/holo/holo-conscience.js", location.href).href);
      constitutionSealed = (await C.verifyConstitution()) === true && C.PINNED.root === CONSTITUTION_K;
    } catch (e) { constitutionSealed = false; }
    if (!constitutionSealed) {
      booting = false;
      holoBootRefused("CONSTITUTION.md");
      return;
    }
    $("status").innerHTML = '✓ Constitution sealed (ADR-033) — booting a governed computer…';

    try {
      if ("serviceWorker" in navigator) {
        const reg = await navigator.serviceWorker.register(root + "holo-fhs-sw.js", { type: "module", scope: root }).catch(() => null);
        if (reg && !navigator.serviceWorker.controller) {
          await new Promise((res) => { if (reg.active) return res(); const w = reg.installing || reg.waiting; if (!w) return res(); w.addEventListener("statechange", function () { if (this.state === "activated") res(); }); setTimeout(res, 4000); });
          // wait until the worker actually CONTROLS this client (clients.claim propagated) so the
          // streamlined redirect resolves every byte through the κ route — no race, no unmapped 404.
          if (!navigator.serviceWorker.controller) await Promise.race([new Promise((r) => navigator.serviceWorker.addEventListener("controllerchange", r, { once: true })), new Promise((r) => setTimeout(r, 2000))]);
        }
      }
    } catch {}
    // Frictionless by DEFAULT (the viral path): straight into the ONE desktop shell (apps/sdk —
    // ENCLOSED in the image, so it boots standalone), which signs in as a non-persistent GUEST so a
    // shared holospace link (?app=… / ?open=…) runs INSTANTLY, zero context needed. Sign-in (device
    // biometric) is one tap IN the shell. Opt-in: ?signin → the full SDDM greeter; the rEFInd boot
    // MENU stays reachable (boot.html). Every byte is still κ-verified by the worker (L5).
    try {
      const TK = "holo.theme.v1", s = JSON.parse(localStorage.getItem(TK) || "{}");
      s.palette = "dark"; localStorage.setItem(TK, JSON.stringify(s));       // pin the OS palette DARK so the desktop matches the black gateway
    } catch {}
    document.body.classList.add("leaving");   // dissolve the gateway content; the shared black bg crossfades into the shell
    const params = new URLSearchParams(location.search);
    const dest = params.has("signin")
      ? root + "login.html?" + new URLSearchParams({ next: "apps/sdk/index.html", label: "Hologram OS", logo: "boot/icons/os_hologram.svg" })
      : root + "apps/sdk/index.html" + location.search + location.hash;
    setTimeout(() => location.replace(dest), 240);
  }
  $("enter").addEventListener("click", boot);
  // No auto-boot — the gateway stays a STATIC splash until the user acts. Boot is an explicit
  // choice: click the button or press Enter. (A sovereign computer powers on by will, not a timer.)
  addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); boot(); } });
  try { $("enter").focus({ preventScroll: true }); } catch {}
</script>
