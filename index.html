<style>
  /* ─────────────────────────────────────────────────────────────────────────────────────────
     The gateway face — the LibreChat landing UX (top bar · star pill · giant headline · sub-line ·
     two CTA pills), rebranded HOLOGRAM, rebuilt on a GOLDEN-RATIO system.

     • Golden ratio throughout — one fluid unit --u and powers of φ (1.618) govern every type size,
       gap, pad and control, so each relationship on the page is a golden one (links→brand = φ,
       sub→headline = φ³, inline pads = φ·block pads, …).
     • Resolution-independent & razor sharp — the page is 100% vector (the dot-mark + system text),
       so it is pixel-perfect at ANY density: HiDPI, Retina, 5K/8K. Rendering is tuned for crispness
       (grayscale smoothing, optical sizing, geometric SVG precision, no faux-bold synthesis).
     • Scales as ONE piece — --u tracks the viewport's SHORT side (vmin), so the whole composition
       grows grander on a large panel and stays compact on a phone, and NEVER forces a scrollbar.
     ───────────────────────────────────────────────────────────────────────────────────────── */
  :root{
    --bg:#000;
    --fg:#fff;
    --fg-soft:#e2e2e8;        /* star-pill label */
    --muted:#8b8b93;          /* nav links, sub-line */
    --muted-2:#6f6f78;        /* placeholders */
    --line:#262629;           /* hairline borders */
    --line-strong:#3a3a40;    /* hover borders */
    --panel:#0d0d0f;          /* search / badge / ghost-button fills */
    --panel-2:#1b1b1f;        /* keycaps, active toggle */
    --panel-hover:#1a1a1d;
    --shadow:0 16px 50px rgba(0,0,0,.55);                      /* search dropdown */
    --btn-p-bg:#fff; --btn-p-fg:#000; --btn-p-hover:#e6e6e6;   /* primary button */

    /* ── GOLDEN-RATIO SCALE ─────────────────────────────────────────────────────────────────
       --u is the fluid golden unit (tracks the viewport short side). Every size below is --u times
       a power of φ, so the page is one self-similar golden composition at any scale. The headline
       and sub get their own clamps (a far wider min↔max range than the UI) but stay φ-related. */
    --phi:1.618;
    --u: clamp(13px, 2.15vmin, 30px);                          /* φ⁰ — UI rhythm unit */
    --u-phi:  calc(var(--u) * var(--phi));                     /* φ¹  ≈ 1.618·u */
    --u-phi2: calc(var(--u) * 2.618);                          /* φ²  */
    --u-phi3: calc(var(--u) * 4.236);                          /* φ³  */
    --u-phi4: calc(var(--u) * 6.854);                          /* φ⁴  */
    --display: clamp(34px, min(13.7vmin, 12vw), 232px);        /* the headline register — matched to the reference; vw term keeps long single words (Supercomputer) inside the narrowest phone */
    --sub: clamp(15px, calc(var(--display) / var(--phi) / var(--phi) / var(--phi)), 34px); /* headline ÷ φ³ */
    color-scheme:dark;
  }
  /* light theme — flipped by the sun/moon switch (persisted); a LibreChat-style inverse palette */
  :root[data-theme="light"]{
    --bg:#fff;
    --fg:#09090b;
    --fg-soft:#27272a;
    --muted:#52525b;
    --muted-2:#71717a;
    --line:#e4e4e7;
    --line-strong:#d4d4d8;
    --panel:#f4f4f5;
    --panel-2:#e8e8ec;
    --panel-hover:#ececef;
    --shadow:0 16px 50px rgba(15,15,20,.18);
    --btn-p-bg:#09090b; --btn-p-fg:#fff; --btn-p-hover:#27272a;
    color-scheme:light;
  }
  html,:root{ transition:background-color .2s ease; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; width:100%; overflow:hidden; }
  body{ background:var(--bg); color:var(--fg);
    font:400 var(--u)/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,Helvetica,Arial,sans-serif;
    /* HiDPI/Retina/5K-8K crispness: grayscale smoothing on dark, real weights only (no faux-bold
       blur), optical sizing, legibility kerning, and stable text scale on mobile. */
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    text-rendering:optimizeLegibility; font-synthesis:none; font-optical-sizing:auto;
    font-kerning:normal; -webkit-text-size-adjust:100%; text-size-adjust:100%; }
  a{ text-decoration:none; color:inherit; }
  /* vector marks/icons re-rasterise per-device at full precision — sharp at any pixel density */
  svg{ shape-rendering:geometricPrecision; }

  /* ── IMMERSIVE BACKGROUND ───────────────────────────────────────────────────────────────────
     A deep-space holo-field built ENTIRELY from inline CSS gradients (zero external assets) — so it
     is part of the page's own bytes and therefore 100% encoded in the content-addressed object the
     gateway re-derives (did:holo:sha256 of itself). Vector → razor-sharp at any density. Three
     intensities (Minimal · Ambient · Immersive) are toggled via :root[data-immersive]. */
  .bg{ position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; opacity:1; transition:opacity .45s ease; }
  .bg>div{ position:absolute; }
  .bg-neb{ inset:-12%;
    background:
      radial-gradient(42% 56% at 82% 6%,  rgba(139,92,246,.42), transparent 60%),
      radial-gradient(46% 56% at 10% 102%, rgba(45,212,191,.24), transparent 60%),
      radial-gradient(38% 44% at 50% 48%, rgba(99,102,241,.14), transparent 72%); }
  .bg-aurora{ inset:-30%; filter:blur(70px); opacity:.55; will-change:transform;
    background:
      radial-gradient(closest-side, rgba(251,113,133,.18), transparent),
      radial-gradient(closest-side, rgba(139,92,246,.20), transparent),
      radial-gradient(closest-side, rgba(45,212,191,.14), transparent);
    background-size:56% 56%, 50% 50%, 46% 46%;
    background-position:24% 26%, 78% 70%, 60% 16%; background-repeat:no-repeat;
    animation:bgdrift 30s ease-in-out infinite alternate; }
  @keyframes bgdrift{ from{ transform:translate3d(-2%,-1%,0) scale(1.04);} to{ transform:translate3d(3%,2%,0) scale(1.12);} }
  .bg-stars{ inset:0; opacity:.55;
    background-repeat:repeat; background-size:520px 520px;
    background-image:
      radial-gradient(1.2px 1.2px at 18% 22%, #fff, transparent),
      radial-gradient(1px 1px at 68% 14%, #d7e0ff, transparent),
      radial-gradient(1.4px 1.4px at 42% 72%, #fff, transparent),
      radial-gradient(1px 1px at 86% 56%, #bfe9ff, transparent),
      radial-gradient(1px 1px at 30% 90%, #e9d5ff, transparent),
      radial-gradient(1.2px 1.2px at 78% 88%, #fff, transparent),
      radial-gradient(1px 1px at 8% 64%, #cbd5ff, transparent); }
  /* the clouds layer — the genuine Vanta CLOUDS2 effect (vendored under system/vendor/vanta/), drawn only in
     Immersive mode. It is opaque when it runs, so it becomes the immersive sky; if WebGL/the libraries
     are unavailable it stays transparent and the CSS nebula/aurora/stars below show through as a
     graceful fallback. */
  .bg-gl{ position:absolute; inset:0; width:100%; height:100%; display:block; opacity:0; transition:opacity .7s ease; }
  :root[data-immersive="full"] .bg-gl{ opacity:1; }
  /* the cloudscape is bright toward the clouds, where the hero text sits — give the text a soft dark
     halo (only in immersive) so it stays readable WITHOUT veiling the sky itself. */
  :root[data-immersive="full"] h1{ text-shadow:0 0.035em 0.5em rgba(0,0,0,.55), 0 0.01em 0.1em rgba(0,0,0,.55); }
  :root[data-immersive="full"] .sub{ color:#fff; font-weight:600; text-shadow:0 1px 2px rgba(0,0,0,.92), 0 0 6px rgba(0,0,0,.55); }
  :root[data-immersive="full"] .pill-star,:root[data-immersive="full"] .sig span{ text-shadow:0 0.05em 0.4em rgba(0,0,0,.5); }
  .bg-scrim{ inset:0; background:radial-gradient(95% 75% at 50% 44%, transparent 42%, rgba(0,0,0,.42) 100%); }
  :root[data-theme="light"] .bg-neb{ opacity:.85;
    background:
      radial-gradient(46% 60% at 84% 4%,  rgba(139,92,246,.20), transparent 62%),
      radial-gradient(50% 60% at 8% 104%, rgba(20,184,166,.16), transparent 62%),
      radial-gradient(40% 46% at 50% 50%, rgba(99,102,241,.08), transparent 72%); }
  :root[data-theme="light"] .bg-stars{ opacity:0; }
  :root[data-theme="light"] .bg-scrim{ background:radial-gradient(95% 75% at 50% 44%, transparent 46%, rgba(255,255,255,.5) 100%); }
  /* Light & Dark are plain; only Immersive shows the holo-field (full + animated). */
  :root[data-immersive="off"] .bg{ opacity:0; }

  /* ── TOP BAR ─────────────────────────────────────────────────────────────────────────────── */
  .bar{ position:fixed; inset:0 0 auto 0; z-index:5;
    height:calc(var(--u) * 3.85);                              /* ≈ control-height · φ */
    display:flex; align-items:center; gap:var(--u);
    padding:0 var(--u-phi2); }
  .brand{ display:flex; align-items:center; gap:.5em; font-weight:700; color:var(--fg);
    font-size:var(--u-phi); letter-spacing:-.01em; }                          /* u·φ */
  .brand .mk{ width:1.2em; height:1.2em; display:block; color:var(--fg); }
  .links{ display:flex; align-items:center; gap:var(--u-phi); margin-left:var(--u-phi); }
  .links a{ color:var(--muted); font-size:calc(var(--u) * 1.08); font-weight:450; transition:color .15s; } /* ≈ reference 22px */
  .links a:hover{ color:var(--fg); }
  .grow{ flex:1; }
  .right{ display:flex; align-items:center; gap:calc(var(--u) * .65); }

  .search{ position:relative; display:flex; align-items:center; gap:.6em;
    background:var(--panel); border:1px solid var(--line); border-radius:calc(var(--u) * .73);
    height:calc(var(--u) * 2.72); padding:0 .8em; color:var(--muted-2); cursor:text;   /* matched to reference */
    width:clamp(190px, 19vw, 380px); font-size:var(--u); transition:border-color .15s; }
  .search:hover{ border-color:var(--line-strong); }
  .search:focus-within{ border-color:var(--line-strong); }
  .search svg{ width:1.05em; height:1.05em; flex:none; }
  .search input{ all:unset; flex:1; min-width:0; color:var(--fg); font:inherit; line-height:1.2; }
  .search input::placeholder{ color:var(--muted-2); }
  .kbd{ display:flex; gap:3px; }

  /* ── SEARCH RESULTS — instant, local, golden-spaced. Anchored under the box; a full-width sheet
     on phones. Each row launches a native app in its own holospace tab. ──────────────────────── */
  .results{ position:absolute; top:calc(100% + .5em); right:0; z-index:30;
    width:min(94vw, 27em); max-height:min(68vh, 30em); overflow-y:auto; overscroll-behavior:contain;
    background:var(--panel); border:1px solid var(--line); border-radius:calc(var(--u) * .7);
    box-shadow:var(--shadow); padding:calc(var(--u) * .28); display:flex; flex-direction:column; gap:2px;
    font-size:var(--u); cursor:default; }
  .results[hidden]{ display:none; }
  .r-head{ padding:.5em .7em .35em; font-size:.72em; letter-spacing:.08em; text-transform:uppercase; color:var(--muted-2); }
  .r-item{ display:flex; align-items:center; gap:.7em; padding:.5em .55em; border-radius:calc(var(--u) * .5);
    cursor:pointer; user-select:none; }
  .r-item[aria-selected="true"]{ background:var(--panel-hover); }
  .r-badge{ width:2.05em; height:2.05em; border-radius:.5em; flex:none; display:grid; place-items:center;
    font-weight:700; font-size:.92em; color:#fff; }
  .r-main{ min-width:0; flex:1; }
  .r-name{ font-weight:600; color:var(--fg); font-size:.92em; line-height:1.25;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .r-desc{ color:var(--muted); font-size:.76em; line-height:1.3;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .r-cat{ flex:none; color:var(--muted-2); font-size:.68em; padding:.2em .6em;
    border:1px solid var(--line); border-radius:999px; }
  .r-enter{ flex:none; color:var(--muted-2); font-size:.8em; opacity:0; }
  .r-item[aria-selected="true"] .r-enter{ opacity:1; }
  .r-empty{ padding:1.1em .8em; color:var(--muted); text-align:center; font-size:.85em; }
  .results mark{ background:none; color:var(--fg); font-weight:700; }
  .kbd kbd{ background:var(--panel-2); border:1px solid var(--line); border-radius:.38em;
    padding:.12em .5em; font:600 .82em/1.4 inherit; color:var(--muted); }

  .toggle{ display:flex; align-items:center; gap:2px; background:var(--panel);
    border:1px solid var(--line); border-radius:999px; padding:calc(var(--u) * .2); }
  .toggle button{ -webkit-appearance:none; appearance:none; border:0; cursor:pointer; padding:0;
    width:calc(var(--u) * 2.05); height:calc(var(--u) * 2.05); border-radius:999px; display:grid; place-items:center;
    background:none; color:var(--muted); transition:background .15s,color .15s; }
  .toggle button svg{ width:calc(var(--u) * 1.18); height:calc(var(--u) * 1.18); }
  .toggle button[aria-pressed="true"]{ background:var(--panel-2); color:var(--fg); }

  .ghlink{ display:grid; place-items:center; width:calc(var(--u) * 2.05); height:calc(var(--u) * 2.05); border-radius:.5em;
    color:var(--muted); transition:color .15s,background .15s; }
  .ghlink:hover{ color:var(--fg); background:var(--panel); }
  .ghlink svg{ width:calc(var(--u) * 1.45); height:calc(var(--u) * 1.45); }

  /* ── HERO — bottom-weighted, exactly like the reference: a large gap above the star pill, a tight
     gap below the buttons. flex-end pins the cluster to a small bottom inset; the rest is open. ── */
  /* HERO — bottom-weighted (big open gap above the pill, tight gap below the buttons). The vertical
     rhythm is golden: section gap = u·φ², bottom inset = u·φ², top guard = u·φ³. */
  .hero{ position:fixed; inset:0; z-index:2;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    text-align:center; gap:calc(var(--u) * 2.3);
    padding:var(--u-phi3) 5vw calc(var(--u) * 5.6); }   /* bottom-weighted, lifted a little higher */

  .pill-star{ display:inline-flex; align-items:center; gap:.7em;
    background:var(--panel); border:1px solid var(--line); border-radius:999px;
    padding:.52em 1em; font-size:var(--u); color:var(--fg-soft);                /* matched to reference */
    transition:border-color .15s, background .15s; }
  .pill-star:hover{ border-color:var(--line-strong); background:var(--panel-hover); }
  .pill-star svg{ width:1.15em; height:1.15em; }
  .pill-star .sep{ width:1px; height:1.25em; background:var(--line-strong); }
  .pill-star .ct{ display:inline-flex; align-items:center; gap:.4em; color:var(--muted); }

  h1{ margin:0; color:var(--fg); font-weight:800; letter-spacing:-.022em; line-height:.95;
    font-size:var(--display); max-width:15ch; text-wrap:balance; }

  .sub{ margin:0; color:var(--muted); line-height:1.5; max-width:min(92vw, 40ch);
    font-size:var(--sub); text-wrap:balance; }

  .cta{ display:flex; flex-wrap:wrap; gap:var(--u-phi); justify-content:center; }     /* gap = u·φ */
  .btn{ -webkit-appearance:none; appearance:none; cursor:pointer;
    display:inline-flex; align-items:center; gap:.55em; border:1px solid transparent;
    border-radius:999px; font:600 var(--u)/1 inherit;
    padding:1.12em 2.3em; transition:background .15s, border-color .15s, transform .12s; }  /* matched to reference pill width */
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--btn-p-bg); color:var(--btn-p-fg); }
  .btn-primary:hover{ background:var(--btn-p-hover); }
  /* power-button glyph: a crisp IEC power symbol, sized to the label's cap height and optically centred */
  .btn-primary .pwr{ width:1.16em; height:1.16em; flex:none; margin-top:-0.04em; }
  .btn-primary span{ line-height:1; }
  /* in Immersive the hero sits on the bright cloudscape — a solid black pill reads best there, lifted
     off the clouds with a soft shadow and a hairline edge so it feels like a real power button */
  :root[data-immersive="full"] .btn-primary{ background:#0a0a0f; color:#fff; border-color:rgba(255,255,255,.16);
    box-shadow:0 .35em 1.5em rgba(0,0,0,.42), inset 0 0 0 .5px rgba(255,255,255,.04); }
  :root[data-immersive="full"] .btn-primary:hover{ background:#17171f; border-color:rgba(255,255,255,.3);
    box-shadow:0 .45em 1.8em rgba(0,0,0,.5); }
  .btn-ghost{ background:var(--panel); color:var(--fg); border-color:var(--line); }
  .btn-ghost:hover{ background:var(--panel-hover); border-color:var(--line-strong); }

  /* boot status — empty until the user acts, then carries the boot progress text */
  .status{ min-height:0; color:var(--muted-2); font-weight:500;
    font-size:calc(var(--u) * .78); line-height:1.6; max-width:min(92vw,52ch); }
  .status:empty{ display:none; }
  .status b{ color:#e6e6ea; font-weight:600; }
  .status code{ color:#e6e6ea; font-weight:600; }

  /* the self-address signature: this gateway IS a content-addressed object; it re-derives its own
     κ and shows it — a quiet proof you are already inside the substrate, not on a normal website. */
  .sig{ position:fixed; left:0; right:0; bottom:calc(var(--u) * .9); z-index:4; text-align:center;
    padding:0 6vw; pointer-events:none; line-height:1.55; }
  .sig #kappa{ font-size:calc(var(--u) * 1.18); font-weight:600; letter-spacing:.01em; color:var(--fg); opacity:1; }
  .sig .dot{ display:inline-block; width:.55em; height:.55em; border-radius:50%; background:var(--fg);
    vertical-align:middle; margin-right:.55em; position:relative; top:-0.06em; }
  .sig .kx{ font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:.95em; opacity:1; margin-left:.5em; white-space:nowrap;

  // [data-immersive] (the inline cosmic holo-field, part of this object's own bytes). Light/Dark are
  // plain; Immersive is dark + the full animated field. Persisted; applied before first paint by the
  // inline <head> script above so there is no flash.
  const MODE_KEY = "holo.gateway.mode";
  const modeBtns = [...document.querySelectorAll(".toggle [data-mode]")];
  function setMode(m) {
    if (!["light", "dark", "immersive"].includes(m)) m = "immersive";
    const de = document.documentElement;
    de.setAttribute("data-theme", m === "light" ? "light" : "dark");
    de.setAttribute("data-immersive", m === "immersive" ? "full" : "off");
    modeBtns.forEach(b => b.setAttribute("aria-pressed", String(b.dataset.mode === m)));
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute("content", m === "light" ? "#ffffff" : "#000000");
    try { localStorage.setItem(MODE_KEY, m); } catch {}
  }
  setMode("immersive");   // ALWAYS start in Immersive (the gateway's signature look), regardless of any saved choice
  modeBtns.forEach(b => b.addEventListener("click", () => setMode(b.dataset.mode)));

  // ── Immersive background — the genuine Vanta CLOUDS2 effect (Vanta.js + three.js r134), VENDORED
  // locally under system/vendor/vanta/ and served same-origin (no runtime CDN). The effect itself is verbatim
  // from vantajs.com. Mounted ONLY in Immersive mode and destroyed when you leave it / hide the tab;
  // under reduced-motion it runs at speed 0 (a still sky). If the libraries didn't load, the CSS nebula
  // below remains as a graceful fallback.
  //
  // IDENTICAL ON EVERY SCREEN: Vanta composes its clouds relative to the canvas's LOGICAL size, so on a
  // bigger window the horizon drifts and the framing changes. We pin it: Vanta renders into a fixed
  // REFW×REFH stage (its logical size never changes ⇒ the exact same cloudscape every time), and we
  // COVER-scale that stage to fill the viewport — centred, cropping the overflow, exactly like
  // background-size:cover. Phone, laptop or 8K panel show the same clouds in the same place; only how much
  // of the edges is visible differs. Backing pixels track the on-screen size, so it stays razor sharp
  // (native, true 8K), and a live frame-rate probe lightens it (fewer pixels) only if a GPU can't keep up.
  (function () {
    const el = document.getElementById("vanta");
    if (!el || !window.VANTA || !window.VANTA.CLOUDS2) return;
    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    const REFW = 1920, REFH = 1320;                       // the fixed design frame the clouds are composed in
    el.style.overflow = "hidden";
    const stage = document.createElement("div");
    stage.style.cssText = "position:absolute;top:50%;left:50%;width:" + REFW + "px;height:" + REFH + "px;transform-origin:center center;will-change:transform;";
    el.appendChild(stage);

    const STEPS = [1, 1.5, 2, 3];                         // adaptive load: 1 = sharp (backing = on-screen pixels) → higher = lighter
    let si = 0, inst = null, fpsRAF = 0, cover = 1;
    const coverOf = () => Math.max(window.innerWidth / REFW, window.innerHeight / REFH);
    const scaleNow = () => STEPS[si] / cover;             // pixelRatio = dpr/scale ⇒ backing ≈ displayed px (sharp); logical stays REFW×REFH
    const on = () => document.documentElement.getAttribute("data-immersive") === "full" && !document.hidden;
    function place() { cover = coverOf(); stage.style.transform = "translate(-50%,-50%) scale(" + cover + ")"; }
    function apply() { if (!inst) return; const ns = scaleNow(); try { inst.setOptions({ scale: ns, scaleMobile: ns }); inst.scale = ns; inst.resize(); } catch {} }
    function fit() { place(); apply(); }
    function start() {
      if (inst) return;
      place();
      try {
        inst = window.VANTA.CLOUDS2({
          el: stage, THREE: window.THREE,
          mouseControls: false, touchControls: false, gyroControls: false,
          scale: scaleNow(), scaleMobile: scaleNow(),
          texturePath: "system/vendor/vanta/noise.png",
          speed: reduce ? 0.0 : 1.0,
        });
        if (!reduce) watchFps();
      } catch (e) { inst = null; }
    }
    function lighten() { if (!inst || si >= STEPS.length - 1) return; si++; apply(); }   // fewer pixels, LIVE (no destroy → no flicker)
    function watchFps() {
      cancelAnimationFrame(fpsRAF);
      let frames = 0, t0 = 0;
      const tick = (now) => {
        if (!inst) return;
        if (!t0) { t0 = now; frames = 0; fpsRAF = requestAnimationFrame(tick); return; }
        frames++;
        if (now - t0 < 1400) { fpsRAF = requestAnimationFrame(tick); return; }
        if ((frames * 1000) / (now - t0) < 45) lighten();   // too heavy → fewer pixels; keep measuring (monotonic)
        t0 = 0; fpsRAF = requestAnimationFrame(tick);
      };
      // warm up first so one-off texture-load hitches don't trigger a needless downscale
      setTimeout(() => { if (inst && on()) fpsRAF = requestAnimationFrame(tick); }, 800);
    }
    function stop() { cancelAnimationFrame(fpsRAF); if (inst) { try { inst.destroy(); } catch {} inst = null; } }
    function sync() { if (on()) start(); else stop(); }
    new MutationObserver(sync).observe(document.documentElement, { attributes: true, attributeFilter: ["data-immersive"] });
    document.addEventListener("visibilitychange", sync);
    addEventListener("resize", () => { if (inst) fit(); else place(); }, { passive: true });
    sync();
  })();

  // Live self-address: the gateway resolves ITS OWN bytes to a κ — booting is resolve-by-content (Law L5).
  (async () => {
    try {
      const buf = await (await fetch(location.href, { cache: "no-store" })).arrayBuffer();
      const hex = [...new Uint8Array(await crypto.subtle.digest("SHA-256", buf))].map((b) => b.toString(16).padStart(2, "0")).join("");
      const kx = $("kx"); if (kx) { const k = "did:holo:sha256:" + hex; kx.textContent = k;   // the canonical hash of THIS page's exact bytes
        try { window.HoloFX && window.HoloFX.kappa(kx, k, { width: 10 }); } catch {} }   // …shown as a short streaming-braille window DERIVED from those bytes (hover reveals the full hash)
    } catch { const kx = $("kx"); if (kx) kx.textContent = "(hash needs http — serve this page over http to verify)"; }
  })();

  // Boot: bring up the κ / FHS Service Worker (the substrate gateway — maps the flat URL space onto
  // the FHS tree + supplies cross-origin isolation), then enter the bootloader. Relative paths, so
  // this works at a root site, a /<repo>/ project site, or `node tools/holo-serve-fhs.mjs`.
  let booting = false;
  async function boot() {
    if (booting) return; booting = true;
    // Hologram OS needs http(s): the κ Service Worker — which maps the flat URL space onto the FHS
    // tree AND re-derives every byte to its κ (Law L5) — cannot run from file://. So guide the user
    // instead of forwarding to a path that can't boot.
    if (!location.protocol.startsWith("http")) {
      booting = false;
      $("status").innerHTML = 'Hologram OS boots over <b>http</b>. From this folder run<br><code>cd system &amp;&amp; node tools/serve-pages.mjs</code><br>then open <b>http://127.0.0.1:8080/</b>';
      return;
    }
    // Find where the OS image is served — its real repo path (system/os/), or a remapped root (os/)
    // if the host aliases it. So the gateway boots whether the repo is served literally by ANY static
    // host or through the remapping dev server. (HEAD-probe the SW; first hit wins.)
    let root = "system/os/";
    for (const r of ["system/os/", "os/"]) { try { if ((await fetch(r + "holo-fhs-sw.js", { method: "HEAD", cache: "no-store" })).ok) { root = r; break; } } catch {} }

    // ── Constitutional boot gate (ADR-033): the FIRST act of boot is to verify the conscience ──
    // A sovereign computer does not boot under a constitution it cannot re-derive for itself. Load
    // the fail-closed, self-verifying conscience gate and re-derive the eight principles against
    // their pinned κ (Law L5). Sealed ⇒ boot. Tampered or absent ⇒ FAIL CLOSED — refuse to boot.
    const CONSTITUTION_K = "did:holo:sha256:3ff288d0c06a0fd22da898301cb6c8c11fc62e3b2b7ab58a53c7cb0cb385f00c";
    let constitutionSealed = false;
    try {
      const C = await import(new URL(root + "usr/lib/holo/holo-conscience.js", location.href).href);
      constitutionSealed = (await C.verifyConstitution()) === true && C.PINNED.root === CONSTITUTION_K;
    } catch (e) { constitutionSealed = false; }
    if (!constitutionSealed) {
      booting = false;
      holoBootRefused("CONSTITUTION.md");
      return;
    }
    // Sealed ⇒ commit to boot. NO status text under the button (it would shift the layout) — instead,
    // immediately fade the whole gateway to black (a clean power-on) and do the rest behind the veil.
    document.body.classList.add("leaving");
    const faded = Date.now();
    try {
      const TK = "holo.theme.v1", s = JSON.parse(localStorage.getItem(TK) || "{}");
      s.palette = "dark"; localStorage.setItem(TK, JSON.stringify(s));       // pin the OS palette DARK so the boot screens match the black gateway
    } catch {}

    // Bring up the κ / FHS Service Worker behind the black veil, so every byte the boot chain loads is
    // resolved + re-derived to its κ (Law L5).
    try {
      if ("serviceWorker" in navigator) {
        const reg = await navigator.serviceWorker.register(root + "holo-fhs-sw.js", { type: "module", scope: root }).catch(() => null);
        if (reg && !navigator.serviceWorker.controller) {
          await new Promise((res) => { if (reg.active) return res(); const w = reg.installing || reg.waiting; if (!w) return res(); w.addEventListener("statechange", function () { if (this.state === "activated") res(); }); setTimeout(res, 4000); });
          if (!navigator.serviceWorker.controller) await Promise.race([new Promise((r) => navigator.serviceWorker.addEventListener("controllerchange", r, { once: true })), new Promise((r) => setTimeout(r, 2000))]);
        }
      }
    } catch {}

    // Power on like a real computer: Plymouth boot-splash animation (usr/share/frame/splash.html, served
    // flat as splash.html by the κ worker) → the LOGIN screen (the SDDM greeter) → and only AFTER sign-in,
    // the desktop. The user always passes login; we never drop them straight onto the desktop. The rEFInd
    // boot MENU stays one keypress away (F2) during the splash, like real firmware.
    const loginURL = new URL(root + "login.html", location.href).href + "?" + new URLSearchParams({
      next: "apps/sdk/index.html", label: "Hologram OS", logo: "boot/icons/os_hologram.svg",
    }).toString();
    const splash = root + "splash.html?" + new URLSearchParams({
      next: loginURL,
      menu: new URL(root + "boot/index.html", location.href).href,
      label: "Hologram OS", logo: "boot/icons/os_hologram.svg", theme: "holo-pulse", duration: "5",
    }).toString();
    // navigate the instant the black veil has settled (≈160ms), regardless of how long the SW took — the
    // splash's first paint is the same #000, so this hands off with no flash and no extra animation beat
    setTimeout(() => location.replace(splash), Math.max(0, 200 - (Date.now() - faded)));
  }
  $("enter").addEventListener("click", boot);   // "Power up" → the Plymouth boot splash → the OS
  // No auto-boot — the gateway stays a STATIC splash until the user acts. Boot is an explicit
  // choice: click a button or press Enter. (A sovereign computer powers on by will, not a timer.)
  // Enter boots ONLY when not typing in the search box (which has its own Enter → launch app).
  addEventListener("keydown", (e) => { if (e.key === "Enter" && !(e.target.closest && e.target.closest(".search"))) { e.preventDefault(); boot(); } });
  try { $("enter").focus({ preventScroll: true }); } catch {}

  // ── App search — index every native holospace, launch it in its own holospace tab ────────────
  // The catalog is EMBEDDED (generated from Hologram Apps/apps/index.jsonld), so search is instant
  // and works before the substrate is even up — Google-fast, zero network. Selecting an app brings
  // up the κ Service Worker and opens the holospace launcher (holospace.html?app=…&bare=1) in a new
  // tab: the app mounts in its OWN isolated, capability-bounded, self-contained shell (Law L1/L5).
  const APPS = [
    {n:"Holo Amp",f:"amp",c:"Multimedia",d:"A classic skinnable audio player, content-addressed."},
    {n:"Holo Atlas",f:"atlas",c:"Developer",d:"A live map of every holospace — discover, verify and monitor the whole OS by content address."},
    {n:"Holo Atlas 96",f:"atlas96",c:"Educational",d:"The Φ-Atlas-12288 structure, encoded as a self-verifying UOR object."},
    {n:"Holo Guide",f:"book",c:"Social",d:"The Hitchhiker's Guide for AI agents — a content-addressable social hypergraph. Don't Panic."},
    {n:"Holo BRC Miner",f:"brcminer",c:"Communication",d:"Mine, send and explore real BrowserCoin — wallet, miner and explorer in one."},
    {n:"Holo Browser",f:"browser",c:"Communication",d:"A web browser that treats every page — web, local or holo://κ — as verifiable content."},
    {n:"BTC Miner",f:"btc",c:"Communication",d:"A real self-custodial Bitcoin wallet and live network view, entirely in your browser."},
    {n:"Holo Capture",f:"capture",c:"Multimedia",d:"Capture, annotate and share your screen — every capture content-addressed."},
    {n:"Holo Cloud",f:"cloud",c:"Communication",d:"Your files — end-to-end encrypted, content-addressed, and shared without a server."},
    {n:"Holo Code",f:"code",c:"Developer",d:"An agentic coding partner that runs entirely on your machine — local verifiable inference."},
    {n:"Holo Docs",f:"docs",c:"Business",d:"A serverless office suite — documents, spreadsheets and slides with live co-editing."},
    {n:"Holo Scan",f:"etherscan",c:"Communication",d:"One universal block explorer for 27 networks — verifiable, in the browser."},
    {n:"Holo EVM",f:"evm",c:"Developer",d:"A spec-faithful Ethereum Virtual Machine that runs in your browser."},
    {n:"Holo Files",f:"files",c:"Utilities",d:"The native file explorer for Hologram OS — one window onto the whole object universe."},
    {n:"Holo Forge",f:"forge",c:"Developer",d:"Compile in your browser. Verify by re-derivation. Trust no server."},
    {n:"Holo Git",f:"git",c:"Developer",d:"A self-hosted git forge — issues, pull requests and merges, serverless."},
    {n:"Holo IPFS",f:"ipfs",c:"Communication",d:"Browse the entire IPFS space as easily as the web — every block verified."},
    {n:"On Liberty",f:"liberty",c:"Reference",d:"On Liberty by John Stuart Mill, published as a self-verifying object."},
    {n:"Hologram Meet",f:"meet",c:"Communication",d:"Serverless, end-to-end-encrypted video conferencing."},
    {n:"Holo Music",f:"music",c:"Multimedia",d:"A content-addressed music library — and the whole internet as one."},
    {n:"Holo Notepad",f:"notepad",c:"Business",d:"Your second brain — a networked, private outliner and always-on memory bank."},
    {n:"Hologram OS",f:"os",c:"Utilities",d:"A real Debian GNU/Linux system, booted in a browser tab."},
    {n:"Plasma Desktop",f:"plasma",c:"System",d:"Your real KDE Plasma desktop, mounted live in a holospace over VNC."},
    {n:"Holo Player",f:"player",c:"Multimedia",d:"A content-addressed media library for your movies and shows."},
    {n:"Holo Privacy",f:"privacy",c:"Security",d:"Control what an AI agent may learn about you — minimum disclosure, for a stated purpose."},
    {n:"Holo Q",f:"q",c:"Productivity",d:"A real AI that thinks entirely in your browser — no server, no cloud, no API key."},
    {n:"QEMU",f:"qemu",c:"Utilities",d:"A full machine emulator — boot other architectures in your browser."},
    {n:"Holo SDK",f:"sdk",c:"Developer",d:"A spatial, self-authoring desktop where every window, component and world is a verifiable object."},
    {n:"Holo Search",f:"search",c:"Utilities",d:"One search bar over the whole OS and the open web — every result verifiable."},
    {n:"Holo Stream",f:"stream",c:"Multimedia",d:"Live streaming, recording and a creator coin — composited in the browser."},
    {n:"Holo Terms",f:"terms",c:"Security",d:"Your machine-readable personal terms (MyTerms / IEEE 7012): you propose, each app agrees."},
    {n:"Holo Video",f:"video",c:"Multimedia",d:"A content-addressed video player with adaptive streaming."},
    {n:"Holo Wallet",f:"wallet",c:"Finance",d:"A self-custodial, multi-chain wallet — one seed, every chain, for humans and AI agents."},
    {n:"Holo Workspace",f:"workspace",c:"Developer",d:"A code editor with language servers and a real filesystem, in the browser."},
  ];
  const CAT_HUE = { Multimedia:349, Developer:222, Communication:170, Educational:42, Social:288,
    Business:158, Utilities:225, Reference:28, Productivity:265, Finance:145, Security:18, System:205 };
  const FEATURED = ["q","wallet","browser","code","files","music"];
  const Q = $("q"), RES = $("results");
  const badgeColor = c => `hsl(${CAT_HUE[c] ?? 220} 55% 47%)`;
  const initial = n => (n.replace(/^(Holo|Hologram)\s+/, "").trim()[0] || n[0]).toUpperCase();
  const esc = s => s.replace(/[&<>"]/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[m]));
  const hi = (t, q) => { if (!q) return esc(t); const i = t.toLowerCase().indexOf(q); return i < 0 ? esc(t)
    : esc(t.slice(0,i)) + "<mark>" + esc(t.slice(i,i+q.length)) + "</mark>" + esc(t.slice(i+q.length)); };
  function score(a, q) {
    const n = a.n.toLowerCase(), f = a.f.toLowerCase(), c = a.c.toLowerCase(), d = a.d.toLowerCase();
    if (n === q || f === q) return 100;
    if (n.startsWith(q) || f.startsWith(q)) return 80;
    if (n.split(/\s+/).some(w => w.startsWith(q))) return 65;
    if (n.includes(q) || f.includes(q)) return 50;
    if (c.startsWith(q)) return 40;
    if (c.includes(q) || d.includes(q)) return 25;
    return 0;
  }
  let items = [], sel = -1;
  function compute(q) {
    q = q.trim().toLowerCase();
    if (!q) return FEATURED.map(f => APPS.find(a => a.f === f)).filter(Boolean);
    return APPS.map(a => ({ a, s: score(a, q) })).filter(x => x.s > 0)
      .sort((x, y) => y.s - x.s || x.a.n.localeCompare(y.a.n)).slice(0, 8).map(x => x.a);
  }
  function render() {
    const q = Q.value.trim(), ql = q.toLowerCase();
    items = compute(q); sel = items.length ? 0 : -1;
    if (!items.length) { RES.innerHTML = `<div class="r-empty">No app matches “${esc(q)}”</div>`; setOpen(true); return; }
    const head = q ? "" : `<div class="r-head">Apps</div>`;
    RES.innerHTML = head + items.map((a, i) => `<div class="r-item" role="option" id="r${i}" data-f="${a.f}" aria-selected="${i===sel}">`
      + `<span class="r-badge" style="background:${badgeColor(a.c)}">${initial(a.n)}</span>`
      + `<span class="r-main"><span class="r-name">${hi(a.n, ql)}</span><span class="r-desc">${esc(a.d)}</span></span>`
      + `<span class="r-cat">${a.c}</span><span class="r-enter">↵</span></div>`).join("");
    setOpen(true); mark();
  }
  function setOpen(o) { RES.hidden = !o; Q.setAttribute("aria-expanded", String(o)); }
  function closeRes() { RES.hidden = true; Q.setAttribute("aria-expanded", "false"); sel = -1; }
  function mark() {
    [...RES.querySelectorAll(".r-item")].forEach((el, i) => {
      el.setAttribute("aria-selected", String(i === sel)); if (i === sel) el.scrollIntoView({ block: "nearest" });
    });
    Q.setAttribute("aria-activedescendant", sel >= 0 ? `r${sel}` : "");
  }
  function move(d) { if (RES.hidden) return render(); sel = (sel + d + items.length) % items.length; mark(); }
  Q.addEventListener("input", render);
  Q.addEventListener("focus", render);
  Q.addEventListener("blur", () => setTimeout(closeRes, 140));
  Q.addEventListener("keydown", (e) => {
    if (e.key === "ArrowDown") { e.preventDefault(); move(1); }
    else if (e.key === "ArrowUp") { e.preventDefault(); move(-1); }
    else if (e.key === "Enter") { e.preventDefault(); if (items[sel]) launchApp(items[sel].f); }
    else if (e.key === "Escape") { if (Q.value) { Q.value = ""; render(); } else { closeRes(); Q.blur(); } }
  });
  // mousedown (not click) so the result fires before the input blur hides the list
  RES.addEventListener("mousedown", (e) => { const it = e.target.closest(".r-item"); if (it) { e.preventDefault(); launchApp(it.dataset.f); } });
  // ⌘/Ctrl+K or "/" focuses search from anywhere
  addEventListener("keydown", (e) => {
    if ((e.key === "k" || e.key === "K") && (e.metaKey || e.ctrlKey)) { e.preventDefault(); Q.focus(); Q.select(); }
    else if (e.key === "/" && document.activeElement !== Q && !/^(INPUT|TEXTAREA|SELECT)$/.test((document.activeElement || {}).tagName || "")) { e.preventDefault(); Q.focus(); }
  });

  // Resolve the OS image root + bring up the κ Service Worker once, so launched tabs resolve through
  // the content-addressed route. Memoised: the first launch pays for it, the rest are instant.
  let _rootPromise;
  function ensureRoot() {
    return _rootPromise || (_rootPromise = (async () => {
      let root = "system/os/";
      for (const r of ["system/os/", "os/"]) { try { if ((await fetch(r + "holo-fhs-sw.js", { method: "HEAD", cache: "no-store" })).ok) { root = r; break; } } catch {} }
      if ("serviceWorker" in navigator) {
        try {
          const reg = await navigator.serviceWorker.register(root + "holo-fhs-sw.js", { type: "module", scope: root }).catch(() => null);
          if (reg && !navigator.serviceWorker.controller) {
            await new Promise((res) => { if (reg.active) return res(); const w = reg.installing || reg.waiting; if (!w) return res(); w.addEventListener("statechange", function () { if (this.state === "activated") res(); }); setTimeout(res, 4000); });
          }
        } catch {}
      }
      return root;
    })());
  }
  async function launchApp(folder) {
    closeRes();
    if (!location.protocol.startsWith("http")) {
      $("status").innerHTML = 'Apps boot over <b>http</b>. From this folder run<br><code>cd system &amp;&amp; node tools/serve-pages.mjs</code><br>then open <b>http://127.0.0.1:8080/</b>';
      return;
    }
    const tab = window.open("about:blank", "_blank");   // open synchronously to dodge popup blockers
    const root = await ensureRoot();
    const url = root + "holospace.html?app=" + encodeURIComponent(folder) + "&bare=1";
    if (tab) { try { tab.opener = null; } catch {} tab.location.replace(url); } else { location.href = url; }
  }
</script>
