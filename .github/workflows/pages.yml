name: Deploy Hologram OS to GitHub Pages

# Publishes the OS as-is: the site root IS the FHS image (os/). No build step — the in-browser
# Service Worker (os/holo-fhs-sw.js, the twin of tools/holo-serve-fhs.mjs, sharing
# os/lib/holo-fhs-map.mjs) maps the flat URL space onto the FHS tree and supplies cross-origin
# isolation at runtime. Proven by tools/pages-deploy-witness.mjs against a dumb static host.
#
# Serve at a ROOT site (a <user>.github.io user/org site, or a custom domain) so the app's
# absolute references (/_shared/…, /usr/…) resolve. Under a project subpath (/<repo>/) those
# absolute paths escape the SW scope — that conversion is the one remaining follow-up.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write   # commit the regenerated CHANGELOG.md / feed.xml back to the repo
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags, so git-cliff can build the whole changelog
      # ── Live, self-updating changelog ────────────────────────────────────────────────────────
      # Regenerate CHANGELOG.md from the repo history (Conventional Commits → Keep a Changelog),
      # build the Atom feed, prove conformance (fail-closed), and commit the refreshed source of
      # truth back. Folding this into the deploy keeps the live page current with no manual step,
      # and sidesteps the GITHUB_TOKEN "no re-trigger" rule a separate commit-then-deploy would hit.
      - name: Regenerate changelog (git-cliff)
        continue-on-error: true   # if git-cliff hiccups, fall back to the committed CHANGELOG.md — never break the site deploy
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
      - name: Build Atom feed and witness conformance
        run: |
          node system/tools/changelog-feed.mjs CHANGELOG.md feed.xml
          node system/tools/changelog-witness.mjs CHANGELOG.md   # fail-closed: bad changelog blocks the deploy
      - name: Commit refreshed changelog
        continue-on-error: true
        run: |
          if ! git diff --quiet -- CHANGELOG.md feed.xml; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md feed.xml
            git commit -m "chore(changelog): regenerate from history [skip ci]"
            git push
          fi
      # ── Documentation: build from source, so the published docs always match the code ──────────
      # The docs are authored in system/docs/site (Astro Starlight). The build first regenerates the
      # machine-readable reference FROM source — conformance.jsonld → the gate's rows, docs/adr/*.md →
      # the ADR index, plus llms.txt — then emits static HTML into the repo-root docs/ that the stage
      # step below publishes. Rebuilding here means a push that changes the OS auto-updates the docs
      # with no manual step. A drift gate runs first and fails closed if a doc names something the
      # code no longer has.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: system/docs/site/package-lock.json
      - name: Docs reference drift gate (fail-closed)
        run: node system/tools/docs-reference-witness.mjs   # a stale documented name/path blocks the deploy
      - name: Build docs site (Astro Starlight)
        run: |
          cd system/docs/site
          npm ci
          npm run build   # prebuild regenerates the reference; Astro emits into ../../../docs
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # self-enable Pages (GitHub Actions source) on a fresh repo, so the first push deploys with no manual settings toggle
      # Stage a lean site from the new layout (everything lives under system/, except the gateway
      # + agent/governance docs which sit at the repo root). Published: the gateway, the agent map,
      # the AGENTS + CONSTITUTION docs, the FHS image as the os/ subtree, and a root mirror of
      # /.well-known. No source dirs (crates/docs/tools) are published. No build — the Service
      # Worker maps flat→FHS + supplies cross-origin isolation at runtime.
      - name: Stage site (gateway + OS subtree)
        run: |
          mkdir -p _site
          cp index.html README.md AGENTS.md CONSTITUTION.md _site/
          # The built docs site (Astro output: pages + _astro assets + pagefind search). The gateway's
          # Docs / Manifesto nav and the Free Download door (docs/download.html) all live under here, so
          # it must be published or those links 404. NOTE: the docs assets are absolute (/docs/_astro/…),
          # so they resolve only at a ROOT site — under a /<repo>/ project path the docs render unstyled.
          cp -r docs _site/docs
          # The live changelog: the styled reader page, its Keep a Changelog source, and the Atom feed.
          cp CHANGELOG.md changelog.html feed.xml _site/
          cp system/llms.txt _site/
          cp -r system/os _site/os
          cp -r system/os/.well-known _site/.well-known
          # The gateway (index.html) is served RAW by the host — NOT through the Service Worker — so its own
          # classic-script assets must sit at the dev-layout paths it references: the vendored Vanta
          # cloudscape (immersive background) and the standalone Holo FX braille animator, plus the llms.txt
          # discovery copy. Without these the gateway silently falls back to the CSS nebula and a static κ.
          mkdir -p _site/system/vendor _site/system/os/usr/lib/holo
          cp -r system/vendor/* _site/system/vendor/
          cp system/os/usr/lib/holo/holo-fx.js _site/system/os/usr/lib/holo/holo-fx.js
          cp system/llms.txt _site/system/llms.txt
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
