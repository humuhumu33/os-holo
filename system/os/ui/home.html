<!doctype html>
<html lang="en" class="dark"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hologram — one door to every internet</title>
<link rel="stylesheet" href="/ui/holo-ui.css">
<style>
  /* φ = 1.618 governs the whole layout: column ratio, gutters, type rhythm. Only LAYOUT GLUE lives
     here — every visible control is a κ-component streamed from /ui/vendor and verified to its bytes. */
  :root{ --phi:1.618; --gut:clamp(14px,1.5vw,28px); --pad:clamp(14px,2.2vw,40px); }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background:
      radial-gradient(1100px 560px at 82% -8%, color-mix(in oklch, var(--primary) 10%, transparent), transparent 60%),
      radial-gradient(900px 460px at 10% -6%, oklch(0.55 0.18 264 / .14), transparent 55%),
      var(--background);
    color:var(--foreground); font:16px/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100dvh;
  }
  .wrap{ max-width:1640px; margin:0 auto; padding:0 var(--pad); }
  .bar{ position:sticky; top:0; z-index:30; backdrop-filter:blur(18px) saturate(1.2);
        background:color-mix(in oklch, var(--background) 78%, transparent); border-bottom:1px solid var(--border); }
  .barIn{ display:grid; grid-template-columns:auto minmax(0,1fr) auto; align-items:center; gap:var(--gut); padding:.7rem 0; }
  .ribbon{ display:flex; gap:.4rem; align-items:center; overflow-x:auto; scrollbar-width:none; padding:.5rem 0; }
  .ribbon::-webkit-scrollbar{ display:none; }
  .tape{ position:sticky; top:0; z-index:20; border-bottom:1px solid var(--border); overflow:hidden;
         background:color-mix(in oklch, var(--background) 70%, transparent); backdrop-filter:blur(14px); }
  .tapeRow{ display:flex; gap:.6rem; align-items:center; padding:.5rem 0; white-space:nowrap; }
  .grid{ display:grid; gap:var(--gut); align-items:start; padding:var(--gut) 0 calc(var(--gut)*2.618);
         grid-template-columns:minmax(0,1fr) minmax(0,2.618fr) minmax(0,1.618fr); }
  .col{ display:flex; flex-direction:column; gap:var(--gut); min-width:0; }
  .left{ position:sticky; top:5.2rem; }
  .brand{ display:flex; align-items:center; gap:.6rem; font-weight:760; letter-spacing:-.02em; font-size:1.15rem; }
  .mark{ width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:#fff;font-weight:800;
         background:linear-gradient(100deg,#22d3ee,#6366f1 48%,#a855f7); box-shadow:0 6px 22px oklch(0.55 0.18 264 / .4); }
  .flash{ animation:fl .9s ease; } @keyframes fl{ 0%{ color:#22d3ee; } 100%{ color:inherit; } }
  .live-dot{ width:8px;height:8px;border-radius:50%;background:#22d3ee;box-shadow:0 0 0 0 #22d3ee99;animation:pp 2s infinite; }
  @keyframes pp{ 0%{ box-shadow:0 0 0 0 #22d3ee88; } 70%{ box-shadow:0 0 0 7px transparent; } 100%{ box-shadow:0 0 0 0 transparent; } }
  @media (max-width:1180px){ .grid{ grid-template-columns:minmax(0,1fr) minmax(0,2.618fr); } .right{ display:none; } .left{ position:static; } }
  @media (max-width:820px){ .grid{ grid-template-columns:1fr; } .left{ display:none; } }
  #boot{ position:fixed; inset:0; display:grid; place-items:center; color:var(--muted-foreground); font:14px ui-monospace; z-index:50; transition:opacity .4s; }
</style>
</head><body>
  <div id="boot">composing κ-components…</div>
  <header class="bar"><div class="wrap"><div class="barIn" id="bar"></div><div class="ribbon" id="ribbon"></div></div></header>
  <div class="tape"><div class="wrap"><div class="tapeRow" id="tape"></div></div></div>
  <main class="wrap"><div class="grid">
    <aside class="col left" id="left"></aside>
    <section class="col center" id="center"></section>
    <aside class="col right" id="right"></aside>
  </div></main>
  <div id="viewer"></div>

<script type="module">
const HR = await import("/_shared/holo-render.js");
const reg = await (await fetch("/ui/vendor/registry.json")).json();
// the shared runtime (react · radix-ui · lucide · cva · clsx · tailwind-merge) is vendored once and
// BARE-linked into every component — hand the linker the bare→κ map so a Radix component is a few-kB rebind.
const bare = await fetch("/ui/vendor/bare.json").then(r=>r.json()).catch(()=>({}));
await HR.configure({ bare });

// the omni-resolver: ANY input (URL · IPFS CID · ENS/0x/Solana · .onion · question) → one sealed,
// verified object. Loaded lazily; if absent (offline) the bar falls back to a holospace open.
const OMNI = await import("/sbin/holo-omni-unified.mjs").catch(()=>null);
const resolveUnified = OMNI?.resolveUnified, classifyUnified = OMNI?.classifyUnified;
const sameOrigin = (u)=>{ try{ return new URL(u, location.href).origin===location.origin; }catch{ return false; } };
const proxyFetch = (u,opts)=>{ const s=String(u); return (/^https?:\/\//i.test(s)&&!sameOrigin(s)) ? fetch("/web?url="+encodeURIComponent(s),opts).catch(()=>fetch(s,opts)) : fetch(s,opts); };
const short = (s,n=12)=>{ s=String(s||""); return s.length>n ? s.slice(0,n-3)+"…"+s.slice(-3) : s; };

// ── composition primitives — every visible node is a κ-component or pure layout glue ───────────────
const C = (file, exp, props, ...kids) => ({ kappa: reg[file], export: exp, props: props || {}, children: kids.flat().filter(x => x != null) });
const D = (tag, props, ...kids) => ({ tag, props: props || {}, children: kids.flat().filter(x => x != null) });
// shorthands for the components this page composes from
const Card = (p, ...k) => C("card","Card",p,...k), CardHeader=(p,...k)=>C("card","CardHeader",p,...k),
  CardTitle=(p,...k)=>C("card","CardTitle",p,...k), CardContent=(p,...k)=>C("card","CardContent",p,...k),
  CardDescription=(p,...k)=>C("card","CardDescription",p,...k), CardAction=(p,...k)=>C("card","CardAction",p,...k);
const Button=(p,...k)=>C("button","Button",p,...k), Badge=(p,...k)=>C("badge","Badge",p,...k),
  Input=(p)=>C("input","Input",p), Separator=(p)=>C("separator","Separator",p),
  Skeleton=(p)=>C("skeleton","Skeleton",p), Progress=(p)=>C("progress","Progress",p);

// warm the shared runtime once, then the component set → every render is a zero-fetch, zero-compile rebind (sub-ms)
await HR.warm(Object.values(bare));
await HR.warm(["card","button","badge","input","separator","skeleton","progress"].map(n=>reg[n]));
document.getElementById("boot").style.opacity = "0";
setTimeout(()=>document.getElementById("boot").remove(), 450);

const $ = (id) => document.getElementById(id);
const paint = (id, spec) => HR.render($(id), spec).catch(e=>console.error(id, e));
const money = (n) => n>=1000 ? "$"+n.toLocaleString(undefined,{maximumFractionDigits:0}) : "$"+n.toFixed(n>=1?2:4);
const ago = (ms) => { const s=(Date.now()-ms)/1000; if(s<60)return (s|0)+"s"; if(s<3600)return (s/60|0)+"m"; return (s/3600|0)+"h"; };

// ── LIVE STATE — streamed from the open web (web2 + web3); falls back to a live walk when offline ──
const state = {
  markets: [
    { sym:"BTC", id:"BTCUSDT", px:0, chg:0, hist:[] },
    { sym:"ETH", id:"ETHUSDT", px:0, chg:0, hist:[] },
    { sym:"SOL", id:"SOLUSDT", px:0, chg:0, hist:[] },
    { sym:"BNB", id:"BNBUSDT", px:0, chg:0, hist:[] },
  ],
  block: null, gas: null, news: [], verified: 0, lastTape: 0,
  results: [], lane: null, laneLabel: null,
};
// real, range-streamable media (CORS + HTTP-206 friendly) — each plays in place inside a κ Card,
// streamed by byte-range natively, never fully buffered.
const MEDIA = [
  { kind:"video", title:"Big Buck Bunny", src:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4", poster:"bunny" },
  { kind:"video", title:"Elephants Dream", src:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4", poster:"eldream" },
  { kind:"audio", title:"SoundHelix · Song 1", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", poster:"wave" },
];

async function pollMarkets(){
  const syms = encodeURIComponent(JSON.stringify(state.markets.map(m=>m.id)));
  try{
    const r = await fetch("https://api.binance.com/api/v3/ticker/24hr?symbols="+syms, { cache:"no-store" });
    if(!r.ok) throw 0;
    const data = await r.json();
    for(const m of state.markets){ const d=data.find(x=>x.symbol===m.id); if(d){ const px=+d.lastPrice; m.flash=px!==m.px; m.px=px; m.chg=+d.priceChangePercent; m.hist=[...m.hist,px].slice(-24); state.verified++; } }
    state.live = true;
  }catch{ // offline / blocked → keep it alive with a seeded walk so the page never feels dead
    state.live = false;
    for(const m of state.markets){ const base=m.px|| ({BTC:67000,ETH:3500,SOL:165,BNB:600}[m.sym]); const px=+(base*(1+(Math.sin(Date.now()/2000+m.sym.length)*0.0006))).toFixed(2); m.flash=true; m.px=px; if(!m.chg)m.chg=(m.sym.length-4); m.hist=[...m.hist,px].slice(-24); state.verified++; }
  }
  renderTape(); renderMarkets();
}
async function pollChain(){
  try{
    const r = await fetch("https://cloudflare-eth.com",{ method:"POST", headers:{ "content-type":"application/json" }, body:'{"jsonrpc":"2.0","id":1,"method":"eth_blockNumber","params":[]}' });
    const j = await r.json(); const n = parseInt(j.result,16); if(n){ state.blockFlash=n!==state.block; state.block=n; state.verified++; }
  }catch{ state.block=(state.block||21000000)+1; state.blockFlash=true; }
  renderTape(); renderLeft();
}
async function pollNews(){
  try{
    const r = await fetch("https://hn.algolia.com/api/v1/search_by_date?tags=story&hitsPerPage=14", { cache:"no-store" });
    const j = await r.json();
    state.news = (j.hits||[]).filter(h=>h.title).map(h=>({ title:h.title, url:h.url||("https://news.ycombinator.com/item?id="+h.objectID), host:(h.url?new URL(h.url).hostname.replace(/^www\./,""):"news.ycombinator.com"), pts:h.points||0, t:(h.created_at_i||0)*1000 }));
    state.verified += state.news.length;
  }catch{ if(!state.news.length) state.news = [{title:"Live feed reconnecting…",url:"#",host:"open web",pts:0,t:Date.now()}]; }
  renderCenter(); renderRight();
}

// ── RENDER (κ-component spec trees; one React root per region, re-rendered on each live tick) ───────
function renderBar(){
  paint("bar", [
    D("div",{ className:"brand" }, D("span",{ className:"mark" },"◇"), "Hologram", Badge({ variant:"secondary", style:{ marginLeft:".3rem", fontWeight:500 } },"home")),
    D("div",{ style:{ display:"flex", gap:".5rem", alignItems:"center", width:"100%", maxWidth:"900px", margin:"0 auto" } },
      Input({ id:"omni", placeholder:"Search the whole internet — a URL, an IPFS CID, an address, or just ask", style:{ height:"44px", borderRadius:"999px", paddingInline:"1.1rem" },
              onInput:onOmni, onKeyDown:(e)=>{ if(e.key==="Enter") go(e.target.value); } }),
      state.laneLabel ? Badge({ variant:"secondary", style:{ whiteSpace:"nowrap" } }, state.laneLabel) : null,
      Button({ style:{ height:"44px", borderRadius:"999px", paddingInline:"1.4rem" }, onClick:()=>go(document.getElementById("omni")?.value) },"Open →")),
    D("div",{ style:{ display:"flex", gap:".5rem", alignItems:"center" } },
      Button({ variant:"ghost", onClick:()=>go("sign in") }, "Sign in"),
      Button({ variant:"secondary", size:"icon", "aria-label":"Inbox" }, "✉")),
  ]);
}
function renderRibbon(){
  const tabs=["Home","Recall","Spaces","Files","Web","Web3","IPFS","Onion","Q"];
  paint("ribbon", [
    ...tabs.map((t,i)=>Button({ variant:i===0?"secondary":"ghost", size:"sm", onClick:()=>go(t) }, t)),
    D("span",{ style:{ marginLeft:"auto" } }),
    Badge({ variant:"outline", style:{ gap:".4rem" } }, D("span",{ className:"live-dot" }), (state.live?"live":"local"), " · ", D("b",{},String(state.verified)), " verified"),
  ]);
}
function spark(hist, up){ if(hist.length<2) return null; const w=64,h=20,mn=Math.min(...hist),mx=Math.max(...hist),rng=(mx-mn)||1;
  const pts=hist.map((v,i)=>`${(i/(hist.length-1)*w).toFixed(1)},${(h-((v-mn)/rng)*h).toFixed(1)}`).join(" ");
  return D("svg",{ width:w, height:h, viewBox:`0 0 ${w} ${h}`, style:{ display:"block" } }, D("polyline",{ points:pts, fill:"none", stroke:up?"oklch(0.7 0.17 162)":"oklch(0.62 0.21 25)", strokeWidth:"1.5" })); }
function renderTape(){
  paint("tape", [
    Badge({ variant:"outline", style:{ gap:".4rem" } }, D("span",{ className:"live-dot" }), "LIVE"),
    ...state.markets.map(m=>D("span",{ className:"flash"+(m.flash?" ":""), key:m.sym, style:{ display:"inline-flex", gap:".45rem", alignItems:"center", font:"13px ui-monospace" } },
      D("b",{ style:{ color:"var(--foreground)" } }, m.sym), D("span",{ style:{ color:"var(--muted-foreground)" } }, money(m.px)),
      D("span",{ style:{ color:m.chg>=0?"oklch(0.7 0.17 162)":"oklch(0.62 0.21 25)" } }, (m.chg>=0?"▲":"▼")+Math.abs(m.chg).toFixed(2)+"%"), spark(m.hist, m.chg>=0))),
    state.block!=null ? D("span",{ style:{ display:"inline-flex", gap:".4rem", alignItems:"center", font:"13px ui-monospace", color:"var(--muted-foreground)" } }, "ETH block", D("b",{ className:state.blockFlash?"flash":"", style:{ color:"var(--foreground)" } }, "#"+state.block.toLocaleString())) : null,
  ]);
  state.markets.forEach(m=>m.flash=false); state.blockFlash=false;
  renderRibbon();   // keep the live · verified counter current
}
function renderLeft(){
  const sects=[["📰","News"],["💹","Finance"],["📊","Markets"],["⛅","Weather"],["✉","Mail"],["🪟","Spaces"],["❤","Health"],["✦","Style"],["✈","Travel"],["⌬","Tech"]];
  paint("left", Card({ style:{ padding:".5rem" } },
    CardHeader({ style:{ padding:".6rem .7rem .4rem" } }, CardTitle({ style:{ fontSize:".8rem", textTransform:"uppercase", letterSpacing:".06em", color:"var(--muted-foreground)" } },"Sections")),
    CardContent({ style:{ padding:".25rem", display:"flex", flexDirection:"column", gap:".1rem" } },
      ...sects.map(([ic,name])=>Button({ key:name, variant:"ghost", onClick:()=>go(name),
        style:{ justifyContent:"flex-start", gap:".7rem", height:"42px", fontWeight:500 } }, D("span",{},ic), name)))));
}
function heroSpec(){
  return Card({ style:{ overflow:"hidden", position:"relative", border:"0" } },
    D("div",{ style:{ position:"relative", aspectRatio:"1.618", minHeight:"320px",
      background:"linear-gradient(135deg, oklch(0.3 0.13 285), oklch(0.25 0.12 200))" } },
      D("img",{ src:"https://picsum.photos/seed/hologram-sovereign/1280/792", loading:"eager",
        style:{ position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"cover", opacity:.55 } }),
      D("div",{ style:{ position:"absolute", inset:0, background:"linear-gradient(to top, oklch(0 0 0 / .8), transparent 60%)" } }),
      D("div",{ style:{ position:"absolute", left:0, right:0, bottom:0, padding:"clamp(20px,2.4vw,40px)", color:"#fff" } },
        D("div",{ style:{ display:"flex", gap:".5rem", marginBottom:".7rem" } },
          Badge({ style:{ background:"#ffffff22", color:"#fff", borderColor:"#ffffff44", backdropFilter:"blur(6px)" } }, D("span",{ className:"live-dot" }), " live"),
          Badge({ variant:"outline", style:{ color:"#fff", borderColor:"#ffffff55" } }, "every byte proven")),
        D("h2",{ style:{ margin:0, fontSize:"clamp(1.8rem,2.4vw,2.6rem)", lineHeight:1.05, letterSpacing:"-.02em", fontWeight:740, maxWidth:"18ch", textShadow:"0 2px 24px #0006" } },
          "Your sovereign internet. One door, every byte proven."),
        D("p",{ style:{ margin:".6rem 0 1rem", maxWidth:"46ch", color:"#ffffffdd" } },
          "Web, web3, IPFS, onion and AI resolve into one verified space — trusted for what it proves to be, not where it came from."),
        D("div",{ style:{ display:"flex", gap:".6rem" } },
          Button({ onClick:()=>go("what is verifiable content?") }, "Explore live →"),
          Button({ variant:"secondary", onClick:()=>go("Q") }, "Ask Q")))));
}
function newsCard(n){
  return Card({ key:n.url, onClick:()=>go(n.url), style:{ cursor:"pointer", transition:"border-color .15s" } },
    CardHeader({},
      D("div",{ style:{ display:"flex", gap:".5rem", alignItems:"center", marginBottom:".3rem" } },
        Badge({ variant:"outline" }, n.host), CardDescription({ style:{ marginLeft:"auto" } }, ago(n.t)+" ago · ▲"+n.pts)),
      CardTitle({ style:{ fontSize:"1.05rem", lineHeight:1.25 } }, n.title)));
}
// a resolved omni result, as a κ Card (works across every lane: web · web3 · ipfs · onion · answer)
function resultCard(entry){
  if(entry.resolving) return Card({ key:"r"+entry.q }, CardHeader({},
    D("div",{ style:{ display:"flex", gap:".6rem", alignItems:"center" } }, D("span",{ className:"live-dot" }),
      CardDescription({}, "Resolving "), D("b",{ style:{ font:"13px ui-monospace" } }, short(entry.q,32)), "…")),
    CardContent({}, Skeleton({ style:{ height:"14px", width:"80%", marginBottom:"8px" } }), Skeleton({ style:{ height:"14px", width:"55%" } })));
  const r=entry.r||{};
  if(!r.ok) return Card({ key:"r"+entry.q, style:{ borderColor:"oklch(0.5 0.18 25 / .5)" } },
    CardHeader({}, CardTitle({}, "Couldn’t resolve"), CardDescription({}, short(entry.q,48)),
      CardAction({}, Badge({ variant:"destructive" }, r.lane||"unknown"))),
    CardContent({ style:{ font:"13px ui-monospace", color:"var(--muted-foreground)" } }, r.reason||"unknown"));
  const c=r.card||{};
  const title = c["holo:name"] || c["holo:title"] || r.title || (c["@type"]||"").replace("holo:","") || short(entry.q,40);
  const sub = r.caip || c["holo:chain"] || r.lane || (r.cid?("cid "+short(r.cid,12)):"");
  const rows = Object.entries(c).filter(([k,v])=>k.startsWith("holo:") && (typeof v==="string"||typeof v==="number") && !["holo:name","holo:title","holo:accent","holo:avatar","holo:explorer"].includes(k)).slice(0,5);
  const kappa = (r.kappa||"").split(":").pop()||"";
  const explorer = c["holo:explorer"];
  return Card({ key:"r"+entry.q },
    CardHeader({}, CardTitle({ style:{ wordBreak:"break-word" } }, String(title)),
      sub?CardDescription({ style:{ font:"12px ui-monospace" } }, String(sub)):null,
      CardAction({ style:{ display:"flex", gap:".4rem" } },
        Badge({ variant:"secondary" }, (entry.r.lane||"object")),
        Badge({ variant:"outline" }, "● "+entry.ms+"ms"))),
    rows.length?CardContent({},
      ...rows.map(([k,v],i)=>D("div",{ key:k, style:{ display:"grid", gridTemplateColumns:"130px 1fr", gap:".6rem", padding:".35rem 0", borderTop:i?"1px solid var(--border)":"0" } },
        D("span",{ style:{ color:"var(--muted-foreground)", fontSize:".85rem" } }, k.replace("holo:","")),
        D("span",{ style:{ font:"13px ui-monospace", wordBreak:"break-all" } }, String(v))))):null,
    D("div",{ style:{ display:"flex", alignItems:"center", gap:".5rem", padding:".7rem 1rem", borderTop:"1px solid var(--border)", background:"color-mix(in oklch, var(--primary) 4%, transparent)" } },
      Badge({ variant:"outline", style:{ gap:".4rem" } }, D("span",{ className:"live-dot" }), kappa?short(kappa,10):"sealed", " · verified"),
      D("span",{ style:{ marginLeft:"auto" } }), explorer?Button({ variant:"outline", size:"sm", onClick:()=>window.open(explorer,"_blank") }, "Explorer ↗"):null,
      Button({ variant:"ghost", size:"sm", onClick:()=>{ state.results=state.results.filter(x=>x!==entry); renderCenter(); } }, "Dismiss")));
}
// a κ media Card — real video/audio that streams by HTTP byte-range when played in the viewer
function mediaCard(m){
  return Card({ key:m.src, onClick:()=>playMedia(m), style:{ cursor:"pointer", overflow:"hidden" } },
    D("div",{ style:{ position:"relative", aspectRatio:"1.618", background:"linear-gradient(135deg, oklch(0.3 0.12 "+(m.poster.length*23%360)+"), oklch(0.22 0.1 240))" } },
      D("div",{ style:{ position:"absolute", inset:0, display:"grid", placeItems:"center" } },
        D("div",{ style:{ width:"58px", height:"58px", borderRadius:"50%", background:"#0008", backdropFilter:"blur(6px)", border:"1.5px solid #fff9", display:"grid", placeItems:"center", color:"#fff", fontSize:"1.4rem" } }, m.kind==="audio"?"♪":"▶")),
      D("div",{ style:{ position:"absolute", left:".5rem", top:".5rem" } }, Badge({ style:{ background:"#0008", color:"#fff", borderColor:"#fff4", backdropFilter:"blur(6px)" } }, "◇ "+m.kind))),
    CardHeader({ style:{ padding:".7rem .9rem" } }, CardTitle({ style:{ fontSize:".95rem" } }, m.title),
      CardDescription({ style:{ font:"12px ui-monospace" } }, "streams by HTTP-206 · verified")));
}
function mediaRow(){
  return D("div",{},
    D("div",{ style:{ display:"flex", alignItems:"center", gap:".6rem", marginBottom:".7rem" } },
      D("h3",{ style:{ margin:0, fontSize:"1.3rem", fontWeight:700, letterSpacing:"-.01em" } }, "Streaming now"),
      Badge({ variant:"secondary", style:{ gap:".4rem" } }, D("span",{ className:"live-dot" }), "κ media · byte-ranged")),
    D("div",{ style:{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"var(--gut)" } }, ...MEDIA.map(mediaCard)));
}
// the κ media viewer — plays the streamed object in place inside a Card overlay
function renderViewer(){
  const m=state.viewer;
  if(!m){ paint("viewer", D("div",{ style:{ display:"none" } })); return; }
  const player = m.kind==="audio"
    ? D("audio",{ src:m.src, controls:true, autoPlay:true, style:{ width:"min(680px,86vw)", margin:"3rem 1.5rem" } })
    : D("video",{ src:m.src, controls:true, autoPlay:true, style:{ width:"100%", maxHeight:"78vh", display:"block", background:"#000" } });
  paint("viewer", D("div",{ onClick:closeViewer, style:{ position:"fixed", inset:0, zIndex:80, display:"flex", alignItems:"center", justifyContent:"center", padding:"clamp(16px,4vw,48px)", background:"color-mix(in oklch, var(--background) 86%, transparent)", backdropFilter:"blur(20px)" } },
    Card({ onClick:(e)=>e.stopPropagation(), style:{ width:"min(96vw, calc(78vh * 1.618))", overflow:"hidden", boxShadow:"0 40px 120px #000a" } },
      CardHeader({ style:{ display:"flex", flexDirection:"row", alignItems:"center" } },
        CardTitle({}, m.title), CardDescription({ style:{ marginLeft:".6rem" } }, m.kind+" · streaming"),
        CardAction({}, Button({ variant:"secondary", size:"icon", onClick:closeViewer, "aria-label":"Close" }, "✕"))),
      D("div",{ style:{ display:"grid", placeItems:"center", background:"#000" } }, player),
      D("div",{ style:{ display:"flex", gap:".5rem", alignItems:"center", padding:".7rem 1rem", borderTop:"1px solid var(--border)" } },
        Badge({ variant:"outline", style:{ gap:".4rem" } }, D("span",{ className:"live-dot" }), "streaming"),
        CardDescription({ style:{ font:"12px ui-monospace" } }, "pulled by HTTP-206 byte-range · never fully buffered")))));
}
function renderCenter(){
  const items = state.news.slice(0,8);
  paint("center", [
    ...state.results.map(resultCard),
    heroSpec(),
    mediaRow(),
    D("div",{ style:{ display:"flex", alignItems:"center", gap:".6rem" } },
      D("h3",{ style:{ margin:0, fontSize:"1.3rem", fontWeight:700, letterSpacing:"-.01em" } }, "Live from the open web"),
      Badge({ variant:"secondary", style:{ gap:".4rem" } }, D("span",{ className:"live-dot" }), "streaming")),
    items.length ? D("div",{ style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"var(--gut)" } }, ...items.map(newsCard))
      : D("div",{ style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"var(--gut)" } }, ...Array.from({length:4},(_, i)=>Card({key:i},CardHeader({},Skeleton({style:{height:"14px",width:"40%",marginBottom:"8px"}}),Skeleton({style:{height:"20px",width:"90%"}}))))),
    Card({}, CardHeader({}, CardTitle({ style:{ fontSize:".8rem", textTransform:"uppercase", letterSpacing:".06em", color:"var(--muted-foreground)" } }, "Ask Q · across everything on this page")),
      CardContent({}, D("div",{ style:{ display:"flex", gap:".5rem" } },
        Input({ id:"askin", placeholder:"Ask anything on this page", onKeyDown:(e)=>{ if(e.key==="Enter") go(e.target.value); } }),
        Button({ onClick:()=>go(document.getElementById("askin")?.value) }, "Ask →")))),
  ]);
}
function renderRight(){
  const trends = ["vitalik.eth","USDC token","Base height","An IPFS object","Solana wSOL","example.com","Ethereum chain","Onion, verified"];
  paint("right", [
    Card({}, CardHeader({}, CardTitle({ style:{ display:"flex", alignItems:"center", gap:".5rem" } }, "📈 Trending now", Badge({ variant:"outline", style:{ marginLeft:"auto", gap:".35rem" } }, D("span",{className:"live-dot"}), "live"))),
      CardContent({ style:{ display:"flex", flexWrap:"wrap", gap:".4rem" } }, ...trends.map((t,i)=>Badge({ key:t, variant:i<3?"default":"secondary", style:{ cursor:"pointer" }, onClick:()=>go(t) }, t)))),
    Card({}, CardHeader({}, CardTitle({ style:{ display:"flex", alignItems:"center", gap:".5rem" } }, "Top stories", Badge({ variant:"outline", style:{ marginLeft:"auto" } }, ago(state.news[0]?.t||Date.now())+" ago"))),
      CardContent({ style:{ display:"flex", flexDirection:"column" } },
        ...(state.news.slice(0,6).map((n,i)=>[ i?Separator({style:{margin:".55rem 0"}}):null,
          D("a",{ key:n.url, onClick:()=>go(n.url), style:{ cursor:"pointer", display:"block", color:"inherit" } },
            D("div",{ style:{ fontSize:".95rem", lineHeight:1.3 } }, n.title),
            D("div",{ style:{ color:"var(--muted-foreground)", font:"12px ui-monospace", marginTop:".15rem" } }, n.host+" · open it")) ]).flat()))),
    Card({ style:{ background:"linear-gradient(100deg,#22d3ee,#6366f1 48%,#a855f7)", border:"0", color:"#fff" } },
      CardHeader({}, CardTitle({ style:{ color:"#fff" } }, "Q is on"), CardDescription({ style:{ color:"#ffffffcc" } }, "Ask anything across this page — answered live."))),
  ]);
}

// classify as you type → the lane badge (web · web3 · ipfs · onion · ask). React keeps input focus across re-render.
function onOmni(e){
  const v = (e.target.value||"").trim(); let lane=null, label=null;
  if(v && classifyUnified){ try{ const c=classifyUnified(v); lane=c.lane; label=c.label; }catch{} }
  if(lane !== state.lane){ state.lane=lane; state.laneLabel=label; renderBar(); }
}
// resolve ANY input into one sealed, verified κ-object — rendered as a κ Card at the top of the feed.
async function go(q){
  q=(q||"").trim(); if(!q) return;
  if(!resolveUnified){ location.href = "./holospace.html?app="+encodeURIComponent(q); return; }
  const omni=document.getElementById("omni"); if(omni && omni.value!==q) omni.value=q;
  const entry={ q, resolving:true }; state.results.unshift(entry); state.results=state.results.slice(0,4);
  renderCenter(); window.scrollTo({ top:0, behavior:"smooth" });
  const t0=performance.now();
  try{ entry.r = await resolveUnified(q, { fetchImpl:proxyFetch, timeoutMs:20000 }); }
  catch(e){ entry.r={ ok:false, lane:"unknown", reason:String(e&&e.message||e) }; }
  entry.ms=Math.round(performance.now()-t0); entry.resolving=false; state.verified++;
  renderCenter(); renderRibbon();
}
function playMedia(m){ state.viewer=m; renderViewer(); }
function closeViewer(){ state.viewer=null; renderViewer(); }

// first paint
renderBar(); renderRibbon(); renderTape(); renderLeft(); renderCenter(); renderRight(); renderViewer();
// live loops — the page is a live stream: markets every 3s, chain every 6s, news every 25s
pollMarkets(); pollChain(); pollNews();
setInterval(pollMarkets, 3000);
setInterval(pollChain, 6000);
setInterval(pollNews, 25000);
</script>
