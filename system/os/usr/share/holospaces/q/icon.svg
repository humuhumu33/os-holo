<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Holo Q">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7df3df"/>
      <stop offset="1" stop-color="#7cc7ff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0c1110"/>
  <!-- the Q ring — the living mind -->
  <circle cx="29" cy="30" r="15" fill="none" stroke="url(#g)" stroke-width="4"/>
  <!-- the tail, ending in a content-address node (κ): the answer, sealed -->
  <line x1="37" y1="38" x2="49" y2="50" stroke="url(#g)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="50" cy="51" r="4.6" fill="#5eead4"/>
  <!-- the verified core -->
  <circle cx="29" cy="30" r="3.6" fill="#5eead4"/>
</svg>
