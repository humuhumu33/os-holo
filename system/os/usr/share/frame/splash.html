<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Holo Splash Hologram OS</title>
    <meta name="description" content="Holo Splash the hologram-native Plymouth: real .plymouth themes (script · two-step · text · details), a faithful Plymouth-script interpreter, boot progress, messages and password prompts content-addressed and κ-verified, running entirely in the browser. No server." />
    <!-- The mobile conformance layer every shipped holospace adopts (the enforce-witnesses gate). -->
    <link rel="stylesheet" href="_shared/holo-mobile.css" />
    <link rel="stylesheet" href="_shared/holo-phi.css" />
    <style>
      :root {
        color-scheme: dark; --bg: var(--holo-bg); --dim: var(--holo-ink-dim);
        /* Golden-ratio scale (φ = 1.618) — one harmonic spacing/size system for the gallery. */
        /* golden-ratio proportion: canonical --holo-phi / --holo-size-* from _shared/holo-phi.css (ADR-028) */
        --card: 13.6rem;            /* φ-derived card min width; the grid reflows from this */
        --sheet: 61.8rem;           /* φ-proportioned sheet max width */
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      /* Dark base so the FIRST paint is black — no white flash when the boot gateway (also #000) hands
         off, before the #stage canvas paints. The studio's Light mode flips it back (body.bg-light). */
      body { background: #000; color: var(--holo-ink); display: flex; flex-direction: column;
        font: 13px/1.4 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      body.bg-light { background: #f0eee8; }

      /* Thin holospace chrome — identity · κ-address · Law-L5 · mode · theme — the
         same vocabulary as os.html / winamp.html / boot.html (ADR-026). */
      #bar { flex: 0 0 auto; display: flex; align-items: center; gap: 0.7rem; position: relative; z-index: 30;
        padding: 0.3rem 0.8rem; background: var(--holo-surface); border-bottom: 1px solid var(--holo-border);
        font: 12px ui-monospace, "Cascadia Code", Menlo, Consolas, monospace; user-select: none; flex-wrap: wrap; }
      #bar .name { color: var(--holo-ink); font-weight: 600; letter-spacing: 0.02em; }
      #bar .tag { color: var(--dim); }
      #bar .k { color: var(--holo-accent); word-break: break-all; max-width: 34vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #bar .ver { color: var(--dim); } #bar .ver.ok { color: var(--holo-ok); } #bar .ver.bad { color: var(--holo-danger); }
      #bar .sp { margin-left: auto; }
      #bar .stat { color: var(--dim); font-variant-numeric: tabular-nums; max-width: 30vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #bar .dot { color: var(--holo-warn); } #bar .dot.on { color: var(--holo-ok); } #bar .dot.off { color: var(--holo-danger); }
      #bar button, #bar select { font: inherit; color: var(--dim); background: var(--holo-surface); border: 1px solid var(--holo-border);
        border-radius: 5px; padding: 0.15rem 0.5rem; cursor: pointer; }
      #bar button:hover, #bar select:hover { color: var(--holo-ink); border-color: var(--holo-border); }

      /* The stage holds three independent layers: the BACKGROUND (a render-time choice —
         Immersive shows the theme's own backdrop + the wave field; Dark / Light are clean solid
         fills), the centre ANIMATION (#screen / its GPU present, sizeable via --center-scale), and
         the wave field. Background and centre scale independently, so resizing the centre animation
         never disturbs the backdrop, and a clean fill leaves no seam. */
      #stage { position: relative; flex: 1 1 auto; min-height: 0; overflow: hidden; background: var(--holo-bg); }
      body.bg-dark #stage { background: #000000; }
      body.bg-light #stage { background: #f0eee8; }
      #screen, #gpuScreen { position: absolute; inset: 0; width: 100%; height: 100%; display: block;
        transform: scale(var(--center-scale, 1)); transform-origin: center center; transition: transform .14s ease; }
      /* WebGPU present canvas sits over #screen while presenting (#screen keeps rendering as
         its source); hidden otherwise. */
      #gpuScreen { display: none; z-index: 2; }
      body.gpu-on #gpuScreen { display: block; }
      body.gpu-on #screen { visibility: hidden; }   /* the GPU canvas is the visible present */
      /* The soulbis wave field — the living holographic backdrop, the "existing background image"
         of Immersive mode: a glowing dual-lattice manifold + constellation whose focal orb is the
         centred boot logo. Hidden in the clean Dark / Light modes; never scaled by --center-scale
         (it is backdrop, not the centre animation). Sits above #screen and #gpuScreen. */
      #field { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 3;
        pointer-events: none; mix-blend-mode: screen; opacity: 0.92; }
      /* the field is shown only as the Immersive backdrop of a built-in theme (see applyBackground) */
      body.field-off #field { display: none; }
      #hint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        color: #2b3640; font: 600 14px ui-monospace, monospace; pointer-events: none; transition: opacity .4s; }
      #hint.gone { opacity: 0; }
      #pw { position: absolute; opacity: 0; pointer-events: none; left: -9999px; }

      /* The "plymouth client" dock — the boot commands made tangible (show/hide,
         update --status, message, ask-for-password, change-mode, system-update). */
      #dock { flex: 0 0 auto; display: flex; align-items: center; flex-wrap: wrap; gap: 0.4rem 0.55rem;
        padding: 0.4rem 0.7rem calc(0.4rem + env(safe-area-inset-bottom, 0px)); background: var(--holo-surface); border-top: 1px solid var(--holo-border);
        font: 12px ui-monospace, monospace; }
      #dock .grp { display: flex; align-items: center; gap: 0.35rem; }
      #dock .lbl { color: var(--dim); }
      #dock button, #dock select, #dock input[type="range"], #dock input[type="number"] { font: inherit; color: #c9d4de; background: var(--holo-surface-2);
        border: 1px solid #283039; border-radius: 6px; padding: 0.25rem 0.55rem; cursor: pointer; }
      #dock button:hover { border-color: var(--holo-ok); color: var(--holo-ink); }
      #dock input[type="range"] { width: 120px; padding: 0; }
      #dock .spacer { flex: 1 1 auto; }
      /* the background segmented control — Dark · Light · Immersive */
      #dock .seg { display: inline-flex; border: 1px solid #283039; border-radius: 6px; overflow: hidden; }
      #dock .seg button { border: 0; border-right: 1px solid #283039; border-radius: 0; padding: 0.3rem 0.9rem; background: var(--holo-surface-2); color: var(--dim); }
      #dock .seg button:last-child { border-right: 0; }
      #dock .seg button:hover { color: var(--holo-ink); }
      #dock .seg button.on { background: var(--holo-accent); color: var(--holo-bg); font-weight: 600; }
      #dock #sizeRange { width: 220px; }
      #dock #sizeVal { min-width: 3.2em; text-align: right; font-variant-numeric: tabular-nums; color: var(--holo-ink); }
      #dock #durNum { width: 3.4em; text-align: right; cursor: text; color: var(--holo-ink); font-variant-numeric: tabular-nums; -moz-appearance: textfield; }
      #dock #durNum::-webkit-inner-spin-button, #dock #durNum::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
      #dock .gap { width: 1.4rem; }
      /* the loading bar — the single, canonical boot-progress readout under the centre animation,
         shown in BOTH the studio and a real handoff (the theme's own bar is suppressed so there is
         never a double bar). Precise + linear; adapts to the background (white on Dark/Immersive,
         ink on Light). */
      #loadbar { position: absolute; left: 50%; bottom: 10%; transform: translateX(-50%); z-index: 4;
        width: min(440px, 52%); display: flex; flex-direction: column; align-items: center; gap: 0.55rem;
        pointer-events: none; --lb: rgba(255,255,255,.92); --lb-track: rgba(255,255,255,.13); }
      body.bg-light #loadbar { --lb: rgba(10,10,15,.86); --lb-track: rgba(10,10,15,.12); }
      #loadbarTrack { width: 100%; height: 2px; border-radius: 2px; background: var(--lb-track); overflow: hidden; }
      #loadbarFill { height: 100%; width: 0%; background: var(--lb); border-radius: 2px; }
      body.bg-dark #loadbarFill, body.bg-immersive #loadbarFill { box-shadow: 0 0 10px rgba(255,255,255,.45); }
      #loadbarMeta { font: 600 11px ui-monospace, monospace; letter-spacing: .14em; color: var(--dim); font-variant-numeric: tabular-nums; display: inline-flex; gap: .7em; align-items: center; }
      #loadbarSpin { color: var(--lb); opacity: .9; letter-spacing: normal; }
      /* During a real boot handoff (Holo Boot → splash → OS) the plymouth client dock is
         hidden for an authentic full-screen splash; a hint to skip is shown instead. */
      body.handoff #dock { display: none; }
      body.handoff #skip { display: none; }   /* no "Press F2…" hint — a sovereign boot just powers on (skip/F2 still work silently) */
      body.handoff #impBtn { display: none; }   /* a boot splash is not interactive */
      body.handoff #bar { display: none; }       /* hide the dev chrome → a clean, full-screen boot splash */
      #skip kbd { display: inline-block; border: 1px solid #3a4570; border-radius: 4px; padding: 1px 7px; color: #cdd6ff; background: rgba(139,92,246,.14); margin: 0 2px; }
      #skip { display: none; position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%);
        color: #46525c; font: 12px ui-monospace, monospace; pointer-events: none; }
      /* boot handoff veil — the SAME #000 rise the gateway uses to hand off INTO this splash, now used
         to hand this splash OFF into the login glass: every stage transitions through one shared black,
         and login rises back out of it. No hard cut, no flash. */
      body.leaving::after { content: ""; position: fixed; inset: 0; background: #000; z-index: 60; pointer-events: none; animation: bootVeil .18s linear forwards; }
      @keyframes bootVeil { from { opacity: 0; } to { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) { body.leaving::after { animation-duration: .01s; } }

      /* ── BOOT BEATS — the diegetic security confirmations (handoff only). Calm, certain, fast:
         each step ticks to a sure teal check as the boot proceeds; the last is the serverless reveal.
         Sits in the lower third, clear of the centred mark and the loading bar. */
      /* the sovereign line — ONE row: a STATIC "Own your" and a single word that materialises out of
         scrambling braille (the OS's own κ glyphs) and resolves, cycling compute → data → intelligence
         → future (see scrambleWord). Type matches the LOGIN greeter — same family, weight (300) and size
         (u·φ) — so the boot and sign-in read as one piece. The seam between "Own your" and the word is
         pinned to screen centre by two absolute halves (.own right-aligned to it, .word left-aligned from
         it), so it is font-independent and "Own your" never moves as the word changes. */
      #bootbeats { position: absolute; left: 50%; top: 73.8%; z-index: 5; display: none; pointer-events: none;
        white-space: pre; font-family: "Segoe UI", system-ui, -apple-system, "Oxygen", sans-serif; }
      body.handoff #bootbeats { display: block; }
      #bootbeats .own, #bootbeats .word { position: absolute; top: 0; line-height: 1; color: #ffffff; font-weight: 300; }
      #bootbeats .own { right: 0; }    /* "Own your " ends at the centre seam */
      #bootbeats .word { left: 0; }     /* the word begins at the centre seam */
      #bootbeats .word.final { text-shadow: 0 0 16px rgba(125,239,201,.6), 0 0 42px rgba(125,239,201,.32); }
      body.bg-light #bootbeats .own, body.bg-light #bootbeats .word { color: #0a0c12; }

      /* ── BOOT HANDOFF COMPOSITION — a calm, golden-ratio, hyper-real power-on. ONE progress bar,
         no small type, generous rhythm: a real computer powering up, unhurried and certain. Scoped
         to a real handoff so the Plymouth studio is left exactly as it was. φ = 1.618; --u is the
         rhythm unit AND the readability floor — never below 16px, like the greeter.

         Vertical order, top → bottom, anchored on the two golden lines (38.2% · 61.8%):
           the breathing mark (upper golden line) → the progress bar (lower golden line) →
           the system-status confirmations → the firmware hint. Nothing overlaps; everything balances. */
      body.handoff { --phi: 1.618; --u: clamp(16px, 1.7vmin, 19px);
        --g1: calc(var(--u) * 1.618); --g2: calc(var(--u) * 2.618); --g3: calc(var(--u) * 4.236); }
      /* no-flash handoff: from the FIRST paint the stage wears the SAME wallpaper as the login greeter
         (its radial aurora gradient), and the "starting plymouthd…" hint is suppressed — so the gateway's
         black veil flows into the splash, and the splash flows into login, over one continuous backdrop. */
      body.handoff #stage { background: radial-gradient(120% 120% at 20% 0%, #1b2a4a 0%, #0d1117 60%, #05070c 100%); }
      body.handoff #hint { display: none; }
      body.handoff #field { display: none; }   /* the soulbis wave field is never part of a real boot — never flash it */
      /* the greeter aurora blobs — identical to login.html .wall, screen-blended over the dark canvas so
         the teal/blue light glows in the open field while the bright mark stays crisp. Soft like the
         greeter's acrylic. Handoff only. */
      #aurora { position: absolute; inset: 0; z-index: 1; display: none; pointer-events: none; mix-blend-mode: screen; }
      body.handoff #aurora { display: block; }
      #aurora i { position: absolute; border-radius: 50%; filter: blur(60px); opacity: .5; }
      #aurora .a { left: 8%; top: 12%; width: 42vw; height: 42vw; background: radial-gradient(circle, rgba(52,211,166,.5), transparent 62%); }
      #aurora .b { right: 6%; bottom: 4%; width: 46vw; height: 46vw; background: radial-gradient(circle, rgba(64,99,214,.45), transparent 62%); }
      #aurora .c { left: 44%; top: 48%; width: 30vw; height: 30vw; background: radial-gradient(circle, rgba(125,239,201,.26), transparent 62%); }
      /* the centre animation — scaled DOWN to 1/φ² of the stage and lifted onto the upper golden line,
         so it reads as a poised mark with room to breathe (was filling the field and colliding with the
         status text). Downscale only → razor sharp. */
      body.handoff #screen, body.handoff #gpuScreen { transform: translateY(-11.8%) scale(0.46); }
      /* ONE clean line bar — golden width, sitting ON the lower golden line, ABOVE the status text.
         The braille blocks + % readout are removed (a real boot shows a single bar). */
      body.handoff #loadbar { top: 61.8%; bottom: auto; width: min(38.2vw, 30rem); gap: var(--u); }
      body.handoff #loadbarTrack { height: 2px; }
      body.handoff #loadbarMeta { display: none; }
      /* the sovereign line — at the golden point below the bar, sized like the login greeter's name
         (u·φ, weight 300) so boot and sign-in feel identical. */
      body.handoff #bootbeats { font-size: calc(var(--u) * var(--phi)); letter-spacing: .005em; }
      /* a quiet boot label ABOVE the progress bar — login type, smaller and calmer than the manifesto */
      #bootlabel { position: absolute; left: 50%; transform: translateX(-50%); z-index: 5; display: none;
        pointer-events: none; white-space: nowrap; color: rgba(255,255,255,.78); font-weight: 400;
        font-family: "Segoe UI", system-ui, -apple-system, "Oxygen", sans-serif; }
      #bootlabel b { font-weight: 600; color: #ffffff; letter-spacing: .16em; }
      body.handoff #bootlabel { display: block; top: calc(61.8% - var(--g3)); font-size: var(--u); letter-spacing: .08em; }
      /* the firmware hint — readable and quiet, on a golden inset */
      body.handoff #skip { bottom: var(--g2); font-size: var(--u); color: rgba(231,237,250,.42); letter-spacing: .03em; }
      body.handoff #skip kbd { font-size: .9em; padding: .12em .65em; border-color: rgba(125,239,201,.4); color: #cdeee2; background: rgba(125,239,201,.1); }
      /* no toast during a real boot — keep the field uncluttered */
      body.handoff #toast { display: none; }
      @media (max-width: 640px) {
        #bar .k { max-width: 60vw; } #bar .stat { order: 9; flex-basis: 100%; max-width: 96vw; }
        #bar button, #bar select, #dock button, #dock select { min-height: 44px; }
      }
      #toast { position: fixed; bottom: 4.2rem; left: 50%; transform: translateX(-50%); background: var(--holo-surface-2);
        border: 1px solid var(--holo-border); border-radius: 8px; padding: 0.45rem 0.8rem; font-size: 12px; opacity: 0;
        transition: opacity 0.2s; z-index: 40; pointer-events: none; }
      #toast.show { opacity: 1; }

      /* ── Import gallery — browse adi1090x/plymouth-themes, tap to preview, Keep to save.
         Golden-ratio proportions throughout; every colour is a Holo Theme token so the
         whole surface re-themes live. Fully responsive: the grid reflows from --card. ── */
      #imp { position: absolute; inset: 0; z-index: 50; display: none; }
      #imp.open { display: block; }
      .imp-scrim { position: absolute; inset: 0; background: color-mix(in srgb, var(--holo-bg) 78%, transparent);
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
      .imp-sheet { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: min(96vw, var(--sheet)); height: min(90vh, 51rem); display: flex; flex-direction: column;
        background: var(--holo-surface); border: 1px solid var(--holo-border); border-radius: var(--holo-size-m);
        box-shadow: 0 1.618rem 4.236rem rgba(0,0,0,0.55); overflow: hidden; transition: opacity .22s, transform .22s; }
      /* previewing: retract the sheet so the live splash behind shows through; keep the action bar. */
      #imp.previewing .imp-scrim { background: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; pointer-events: none; }
      #imp.previewing .imp-sheet { opacity: 0; transform: translate(-50%, -42%) scale(0.985); pointer-events: none; }

      .imp-head { flex: 0 0 auto; display: flex; align-items: center; gap: var(--holo-size-s); flex-wrap: wrap;
        padding: var(--holo-size-s) var(--holo-size-m); border-bottom: 1px solid var(--holo-border); }
      .imp-title { font: 600 1.05rem ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--holo-ink);
        letter-spacing: 0.01em; display: flex; align-items: baseline; gap: var(--holo-size-xs); }
      .imp-title .src { font: 11px ui-monospace, monospace; color: var(--dim); }
      .imp-search { flex: 1 1 14rem; min-width: 8rem; font: 13px ui-sans-serif, system-ui, sans-serif; color: var(--holo-ink);
        background: var(--holo-surface-2); border: 1px solid var(--holo-border); border-radius: var(--holo-size-m);
        padding: var(--holo-size-xs) var(--holo-size-s); outline: none; }
      .imp-search:focus { border-color: var(--holo-accent); }
      .imp-x { font: 16px ui-monospace, monospace; color: var(--dim); background: transparent; border: 1px solid var(--holo-border);
        border-radius: 50%; width: 2rem; height: 2rem; line-height: 1; cursor: pointer; }
      .imp-x:hover { color: var(--holo-ink); border-color: var(--holo-accent); }

      .imp-chips { flex: 0 0 auto; display: flex; gap: var(--holo-size-xs); flex-wrap: wrap; padding: var(--holo-size-xs) var(--holo-size-m); }
      .imp-chip { font: 12px ui-monospace, monospace; color: var(--dim); background: var(--holo-surface-2);
        border: 1px solid var(--holo-border); border-radius: var(--holo-size-m); padding: var(--holo-size-2xs) var(--holo-size-s); cursor: pointer; }
      .imp-chip.on { color: var(--holo-bg); background: var(--holo-accent); border-color: var(--holo-accent); }

      .imp-grid { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: var(--holo-size-s) var(--holo-size-m) var(--holo-size-l);
        display: grid; gap: var(--holo-size-s); align-content: start;
        grid-template-columns: repeat(auto-fill, minmax(min(100%, var(--card)), 1fr)); }
      .imp-empty { padding: var(--holo-size-xl) var(--holo-size-m); text-align: center; color: var(--dim);
        font: 13px ui-monospace, monospace; grid-column: 1 / -1; }

      /* A card: a φ-aspect panel — name + a faint hologram motif + a meta footer. */
      .card { position: relative; aspect-ratio: var(--holo-phi); display: flex; flex-direction: column; justify-content: space-between;
        padding: var(--holo-size-s); border: 1px solid var(--holo-border); border-radius: var(--holo-size-s); cursor: pointer; overflow: hidden;
        background:
          radial-gradient(120% 120% at 82% 12%, color-mix(in srgb, var(--holo-accent) 16%, transparent), transparent 60%),
          linear-gradient(155deg, var(--holo-surface-2), var(--holo-surface));
        transition: transform .14s, border-color .14s, box-shadow .14s; }
      .card:hover, .card:focus-visible { transform: translateY(-2px); border-color: var(--holo-accent);
        box-shadow: 0 0.618rem 1.618rem rgba(0,0,0,0.4); outline: none; }
      /* live theme preview: a rendered still of the theme fills the card, with a legibility
         veil (built from --holo-bg so it adapts to the theme) so the labels stay readable. */
      .card .thumb { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 0;
        opacity: 0; transition: opacity .35s; pointer-events: none; }
      .card.has-thumb .thumb { opacity: 1; }
      .card .veil { position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0; transition: opacity .35s;
        background: linear-gradient(to bottom, color-mix(in srgb, var(--holo-bg) 66%, transparent), transparent 26%, transparent 72%, color-mix(in srgb, var(--holo-bg) 80%, transparent)); }
      .card.has-thumb .veil { opacity: 1; }
      .card .ring { position: absolute; right: -1.2rem; top: -1.2rem; width: 5.2rem; height: 5.2rem; border-radius: 50%;
        border: 1px solid color-mix(in srgb, var(--holo-accent) 38%, transparent); opacity: 0.5; transition: opacity .35s; }
      .card .ring.b { right: -0.2rem; top: -0.2rem; width: 3.2rem; height: 3.2rem; border-style: dashed; }
      .card.has-thumb .ring { opacity: 0; }
      .card .nm { position: relative; z-index: 2; font: 600 clamp(0.95rem, 2.2vw, 1.2rem) ui-sans-serif, system-ui, sans-serif;
        color: var(--holo-ink); line-height: 1.15; word-break: break-word; text-transform: capitalize; text-shadow: 0 1px 3px color-mix(in srgb, var(--holo-bg) 80%, transparent); }
      .card .meta { position: relative; z-index: 2; display: flex; align-items: center; gap: var(--holo-size-xs); flex-wrap: wrap;
        font: 11px ui-monospace, monospace; color: var(--dim); }
      .card .pack { color: var(--holo-bg); background: var(--holo-accent); border-radius: var(--holo-size-m); padding: 0 var(--holo-size-xs); }
      .card .kept { color: var(--holo-ok); border: 1px solid color-mix(in srgb, var(--holo-ok) 40%, transparent);
        border-radius: var(--holo-size-m); padding: 0 var(--holo-size-xs); }
      .card .trash { margin-left: auto; color: var(--dim); background: transparent; border: 0; cursor: pointer; font-size: 13px; }
      .card .trash:hover { color: var(--holo-danger); }
      .card.busy { pointer-events: none; }
      .card .prog { position: absolute; left: 0; bottom: 0; height: 3px; background: var(--holo-accent); width: 0; transition: width .12s; }

      /* The preview console — a clean, golden-ratio-spaced two-row panel: identity + actions
         on top, the cinema transport · frequency spectrum · present telemetry below. */
      .imp-action { position: absolute; left: 50%; bottom: calc(var(--holo-size-m) + env(safe-area-inset-bottom, 0px)); transform: translateX(-50%);
        z-index: 55; display: none; flex-direction: column; gap: var(--holo-size-s); width: min(94vw, 44rem);
        padding: var(--holo-size-s) var(--holo-size-m); background: var(--holo-surface); border: 1px solid var(--holo-border);
        border-radius: var(--holo-size-m); box-shadow: 0 var(--holo-size-xs) var(--holo-size-l) rgba(0,0,0,0.5); font: 12px ui-monospace, monospace; }
      #imp.previewing .imp-action { display: flex; }

      const SIZE_PREF = "holo-splash:size";

      // ── boot status sequence (the realistic plymouthd status stream) ────────────────

        "Verifying κ-store", "Starting Hologram Platform Manager", "Reaching graphical target"];

      let be = null, plugin = null, eng = null, curTheme = null, themes = [], rafId = 0;
      let asking = false, statusIdx = -1;

      // ?label is its name. Without ?next the page is a standalone, looping demo.
      const NEXT = params.get("next") || "";
      const LABEL = params.get("label") || "";
      const LOGO = params.get("logo") || "";
      // Boot time — how long the loading bar takes to fill (eng.duration). A real handoff is brisk;

      const DUR_PREF = "holo-splash:duration";

      // Modelled on holo-rtc.js deviceProfile(): cores × memory × mobile × dpr × screen pick a

      // 8K. The splash engine draws at ANY resolution natively, so this is just choosing it.
      const GPU_OK = typeof navigator !== "undefined" && !!navigator.gpu;
      function renderProfile() {

      const PROFILE = renderProfile();
      // ── the soulbis wave field — a living holographic backdrop over the boot theme ──────
      // A from-spec port of github.com/mitchuski/soulbis: a two-lattice manifold + drifting
      // constellation + soul-orb glass lens, coral (Swordsman) ⇄ cyan (Mage), composited via
      // `screen` blend so only its light reaches the boot. It renders at the device's tier
      // resolution (PROFILE.maxDim — up to 8K), strokes vector-crisp, the centred boot logo
      // its focal orb. Pure garnish: a failure here must never block the boot, hence the try.
      let field = null;
      // The soul orb tracks the ACTIVE theme's logo: the backend draws in stage CSS px (the
      // same space the field renders in), so we pick the largest square-ish visible sprite —
      // the logo reads bigger in its smallest dimension than a thin progress bar or a small
      // throbber — and centre the manifold's focal well on it. Falls back to centre-ish.

      if (!NEXT) {

      let PREVIEW = null;   // { id, theme } — a fetched-but-not-yet-kept theme, in memory

          asset: (name) => fetchVerified(base + name),

      async function loadTheme(id, { keepProgress = false } = {}) {

      // ── the rAF boot loop ───────────────────────────────────────────────────────────

      addEventListener("keydown", (e) => {

        // splash shortcuts (f/r/space) are suppressed (typing in search still works).
        if ($("imp") && $("imp").classList.contains("open")) {
          if (e.key === "Escape") { e.preventDefault(); closeGallery(); return; }
          if (e.key === " " && $("imp").classList.contains("previewing") && !/^(INPUT|TEXTAREA|SELECT|BUTTON)$/.test(e.target.tagName)) { e.preventDefault(); if (eng) { eng.paused ? eng.resume() : eng.pause(); reflectCine(); } }
          return;
        }
        if (asking || (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName))) return;
        // during a boot handoff: F2 opens the boot menu (rEFInd); any other key continues to the OS
        if (NEXT && e.key === "F2" && MENU) { e.preventDefault(); gotoMenu(); return; }
        if (NEXT && (e.key === "Enter" || e.key === "Escape" || e.key === " ")) { e.preventDefault(); gotoNext(); return; }
        if (e.key === "f") $("fsBtn").click();
        else if (e.key === "r") client.replay();
        else if (e.key === " ") { e.preventDefault(); client.pause(); }
      });
      if (NEXT) $("stage").addEventListener("click", () => gotoNext());

      // resize: rebuild the theme at the new size, preserving boot progress.
      let rT; addEventListener("resize", () => { clearTimeout(rT); rT = setTimeout(() => { if (field) field.resize(); if (curTheme) loadTheme(curTheme.id, { keepProgress: true }); }, 160); });

      // ── nestability: a parent holospace can drive the splash over postMessage ────────
      addEventListener("message", (e) => {
        const m = e.data; if (!m || typeof m !== "object" || !eng) return;
        if (m.type === "holo-splash" && m.theme) { loadTheme(m.theme, { keepProgress: false }); if (m.mode) setTimeout(() => client.mode(m.mode), 50); }
        else if (m.type === "holo-splash-control" && m.action) {
          ({ show: () => client.show(), hide: () => client.hide(), update: () => client.status(m.status || ""),
             status: () => client.status(m.status || ""), message: () => client.message(m.text || ""),
             password: () => client.password(m.prompt || "Password", m.bullets || 0), question: () => client.question(m.prompt || "", m.entry || ""),
             progress: () => client.progress(m.progress ?? 0), mode: () => client.mode(m.mode || "boot"),
             quit: () => client.quit(), pause: () => eng.pause(), resume: () => eng.resume() }[m.action] || (() => {}))();
        }
      });

      // public handle (witness / parent automation)
      window.holoSplash = {
        get engine() { return eng; }, get backend() { return be; }, get plugin() { return plugin; },
        get theme() { return curTheme; }, get verified() { return ver; }, get themes() { return themes; },
        get progress() { return eng ? eng.progress : 0; }, get mode() { return be ? be.mode() : ""; },
        get sprites() { return be ? be.sprites.length : 0; }, get callbacks() { return plugin && plugin.callbackNames ? plugin.callbackNames() : []; },
        get next() { return NEXT; }, get label() { return LABEL; }, get logo() { return LOGO; }, get brandVerified() { return brandVer; },
        get profile() { return PROFILE; }, get gpuAvailable() { return GPU_OK; }, get field() { return field; },
        get gpu() { return { on: !!gpu.ctrl, available: GPU_OK, fx: gpu.fx, lutKappa: gpu.ctrl ? gpu.ctrl.lutKappa : "", adapter: gpu.ctrl ? gpu.ctrl.adapter : null, present: gpu.ctrl ? [$("gpuScreen").width, $("gpuScreen").height] : null, fps: gpu.ctrl ? gpu.ctrl.fps : 0 }; },
        setSpeed: (s) => { if (eng) eng.speed = s; }, stepFrame: () => { if (eng) { eng.pause(); eng.stepFrame(); reflectCine(); } },
        setTheme: (id) => loadTheme(id, { keepProgress: false }), client, startAsk, MODES, last: null,
      };

      // (Re)build the theme picker: built-in (manifest-pinned) + imported (OPFS) groups.
      function rebuildThemeSelect() {
        const sel = $("themeSel"), cur = curTheme && curTheme.id; sel.innerHTML = "";
        const gB = document.createElement("optgroup"); gB.label = "Built-in";
        for (const t of themes) { const o = document.createElement("option"); o.value = t.id; o.textContent = `${t.name} · ${t.module}`; gB.appendChild(o); }
        sel.appendChild(gB);
        const imp = [...IMPORTED.values()];
        if (imp.length) { const gI = document.createElement("optgroup"); gI.label = "Imported"; for (const t of imp) { const o = document.createElement("option"); o.value = t.id; o.textContent = `${t.name} · ${t.module}`; gI.appendChild(o); } sel.appendChild(gI); }
        if (cur) sel.value = cur;
      }
      const knownTheme = (id) => !!id && (themes.some((t) => t.id === id) || IMPORTED.has(id));

      // ── Import gallery: browse adi1090x/plymouth-themes, tap → live preview, Keep to save ──
      let CATALOG = null, galPack = "all", galQuery = "", galBusy = false, galState = null;
      // live theme previews: render ONE representative still per card, lazily + cached.
      const THUMBS = new Map();   // id → dataURL (session cache; also persisted in OPFS)
      let thumbActive = 0; const thumbQ = [], thumbScanGuard = { t: 0 };
      // hologram-native GPU present (holo-gpu.js): Lanczos super-res + the O(1) content-addressed
      // LUT grade, fed by the splash canvas. null controller ⇒ no WebGPU (we stay on the 2D path).
      const gpu = { ctrl: null, video: null, stream: null, hudT: 0, fx: false };
      const esc = (s) => { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; };
      const emptyMsg = (s) => { const d = document.createElement("div"); d.className = "imp-empty"; d.textContent = s; return d; };
      const prettyLoader = (f) => ({ "os.html": "Hologram OS", "home.html": "Home" }[f] || f.replace(/\.html$/, "").replace(/(^|[-_])(\w)/g, (_, a, b) => (a ? " " : "") + b.toUpperCase()));

      function initGallery() {
        $("impBtn").addEventListener("click", openGallery);
        $("impClose").addEventListener("click", closeGallery);
        $("impScrim").addEventListener("click", closeGallery);
        $("impBoot").addEventListener("click", toggleBootPanel);
        $("impSearch").addEventListener("input", (e) => { galQuery = e.target.value.trim().toLowerCase(); renderGrid(); });
        $("impGrid").addEventListener("scroll", () => { clearTimeout(thumbScanGuard.t); thumbScanGuard.t = setTimeout(scanThumbs, 80); }, { passive: true });
        $("aKeep").addEventListener("click", () => keepPreview(false));
        $("aBoot").addEventListener("click", () => keepPreview(true));
        $("aDiscard").addEventListener("click", discardPreview);
        // cinema controls: granular speed + frame-by-frame step + play/pause + the FX toggle
        $("cSpeed").addEventListener("input", (e) => { const val = +e.target.value; setSpeed(val <= -2 ? 0 : Math.pow(10, val)); });
        $("cStepF").addEventListener("click", () => { if (eng) { if (!eng.paused) { eng.pause(); reflectCine(); } eng.stepFrame(); } });
        $("cStepB").addEventListener("click", async () => { if (!curTheme) return; await loadTheme(curTheme.id, { keepProgress: false }); if (eng) { eng.speed = Math.pow(10, +$("cSpeed").value); eng.pause(); reflectCine(); } });
        $("cPlay").addEventListener("click", () => { if (!eng) return; eng.paused ? eng.resume() : eng.pause(); reflectCine(); });
        $("cFx").addEventListener("click", toggleFx);
      }

      async function openGallery() {
        $("imp").classList.add("open"); renderChips(); renderGrid();
        if (CATALOG === null) { try { CATALOG = await loadCatalog(GH); } catch { CATALOG = false; } renderChips(); renderGrid(); }
        $("impSearch").focus();
      }
      async function closeGallery() {
        if ($("imp").classList.contains("previewing")) await discardPreview();
        $("imp").classList.remove("open", "show-boot");
      }

      function renderChips() {
        const el = $("impChips"); el.innerHTML = "";
        const mk = (val, label) => { const b = document.createElement("button"); b.className = "imp-chip" + (galPack === val ? " on" : ""); b.textContent = label; b.onclick = () => { galPack = val; renderChips(); renderGrid(); }; return b; };
        el.appendChild(mk("all", "All"));
        for (const p of (CATALOG && CATALOG.packs) || []) el.appendChild(mk(p, p.replace("pack_", "Pack ")));
      }
      function renderGrid() {
        const grid = $("impGrid"); grid.innerHTML = "";
        if (CATALOG === null) return grid.appendChild(emptyMsg("Loading the live catalog…"));
        if (CATALOG === false) return grid.appendChild(emptyMsg("Couldn't reach the catalog check the connection and reopen."));
        let list = CATALOG.themes;
        if (galPack !== "all") list = list.filter((t) => t.pack === galPack);
        if (galQuery) list = list.filter((t) => t.name.toLowerCase().includes(galQuery));
        if (!list.length) return grid.appendChild(emptyMsg("No themes match “" + galQuery + "”."));
        for (const t of list) grid.appendChild(card(t));
        requestAnimationFrame(scanThumbs); setTimeout(scanThumbs, 250); setTimeout(scanThumbs, 700);
      }
      function card(t) {
        const el = document.createElement("div"); el.className = "card"; el.tabIndex = 0; el.setAttribute("role", "button");
        el.innerHTML = `<canvas class="thumb" aria-hidden="true"></canvas><div class="veil"></div><div class="ring"></div><div class="ring b"></div>
          <div class="nm">${esc(t.name.replace(/_/g, " "))}</div>
          <div class="meta"><span class="pack">${esc(t.pack.replace("pack_", "P"))}</span><span>${t.pngCount} frames</span></div>
          <div class="prog"></div>`;
        el._entry = t; if (THUMBS.has(t.id)) { el._thumbQ = true; drawThumbUrl(el, THUMBS.get(t.id)); }
        if (IMPORTED.has(t.id)) {
          const meta = el.querySelector(".meta");
          const kept = document.createElement("span"); kept.className = "kept"; kept.textContent = "✓ kept"; meta.appendChild(kept);
          const tr = document.createElement("button"); tr.className = "trash"; tr.title = "remove"; tr.textContent = "🗑"; meta.appendChild(tr);
          tr.onclick = (e) => { e.stopPropagation(); removeImported(t.id); };
        }
        const go = () => previewTheme(t, el);
        el.onclick = go; el.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); } };
        return el;
      }

      // ── live card thumbnails ─────────────────────────────────────────────────────────
      // Render a single representative frame of a theme without fetching all its (sometimes
      // 300+) PNGs: PROBE it headlessly to see which images are on screen at mid-boot, fetch
      // only those, then render at a virtual size and downscale onto the card. Cached.
      // Render at a compact virtual size so the theme's (fixed-pixel) logo/spinner fills more
      // of the card, at a progress point where the bar + animation are well under way.
      const VW = 360, VH = Math.round(360 / 1.618), STILL_STEPS = 70, STILL_PROGRESS = 0.66, THUMB_VERSION = 3;
      function queueThumb(el) { thumbQ.push(el); pumpThumbs(); }
      function pumpThumbs() { while (thumbActive < 3 && thumbQ.length) { const el = thumbQ.shift(); thumbActive++; renderThumb(el).catch(() => {}).finally(() => { thumbActive--; pumpThumbs(); }); } }
      // Render thumbnails for cards near the visible scroll region (robust everywhere —
      // IntersectionObserver is unreliable in some headless/automation contexts).
      function maybeQueueThumb(el) {
        if (!el._entry || el._thumbQ || el.classList.contains("has-thumb")) return;
        if (THUMBS.has(el._entry.id)) { el._thumbQ = true; drawThumbUrl(el, THUMBS.get(el._entry.id)); return; }
        const grid = el.parentElement; if (!grid) return;
        const gr = grid.getBoundingClientRect(), r = el.getBoundingClientRect();
        if (r.bottom >= gr.top - 260 && r.top <= gr.bottom + 260) { el._thumbQ = true; queueThumb(el); }
      }
      function scanThumbs() { const grid = $("impGrid"); if (!grid) return; for (const el of grid.querySelectorAll(".card")) maybeQueueThumb(el); }

      function drawThumbUrl(el, url) {
        const canvas = el.querySelector(".thumb"); if (!canvas) return;
        const img = new Image();
        img.onload = () => { const dpr = PROFILE.thumbDpr; const r = canvas.getBoundingClientRect(); const w = Math.max(1, Math.round(r.width || el.clientWidth)), h = Math.max(1, Math.round(r.height || w / 1.618)); canvas.width = Math.round(w * dpr); canvas.height = Math.round(h * dpr); const c = canvas.getContext("2d"); c.imageSmoothingQuality = "high"; c.drawImage(img, 0, 0, canvas.width, canvas.height); el.classList.add("has-thumb"); };
        img.src = url;
      }

      async function renderThumb(el) {
        const t = el._entry; if (!t || !el.isConnected) return;
        if (THUMBS.has(t.id)) return drawThumbUrl(el, THUMBS.get(t.id));
        // OPFS thumbnail cache → instant on revisit / next session
        const cached = await thumbCacheGet(t.id);
        if (cached) { const url = await blobToDataURL(new Blob([cached], { type: "image/png" })); THUMBS.set(t.id, url); return drawThumbUrl(el, url); }
        const off = await computeThumb(t);
        if (!off) return;
        const url = off.toDataURL("image/png");
        THUMBS.set(t.id, url); drawThumbUrl(el, url);
        try { thumbCachePut(t.id, await (await fetch(url)).blob()); } catch {}
      }

      // Drive a script theme to a representative still and return an offscreen canvas (or null).
      async function computeThumb(t) {
        const plyRel = t.files.find((f) => /\.plymouth$/i.test(f)); if (!plyRel) return null;
        const conf = parsePlymouth(new TextDecoder().decode(await GH.bytes(rawUrl(t.dir + "/" + plyRel))));
        if (conf.moduleName !== "script") return null;          // thumbnails: script themes (≈ all of adi1090x)
        const sfRel = (conf.module.ScriptFile || "").split("/").pop();
        const scriptRel = (sfRel && t.files.find((f) => f.split("/").pop() === sfRel)) || t.files.find((f) => /\.script$/i.test(f));
        if (!scriptRel) return null;
        const source = new TextDecoder().decode(await GH.bytes(rawUrl(t.dir + "/" + scriptRel)));
        const need = probeFrames(source, t);
        const assets = {};
        await Promise.all(need.map(async (name) => {
          try { const b = await GH.bytes(rawUrl(t.dir + "/" + name)); const bmp = await createImageBitmap(new Blob([b], { type: "image/png" })); assets[name] = { bitmap: bmp, width: bmp.width, height: bmp.height }; assets[name.split("/").pop()] = assets[name]; } catch {}
        }));
        const off = document.createElement("canvas");
        const be = new CanvasBackend(off, assets); be.resize(VW, VH, 1);
        const plugin = makePlugin("script", be, { source });
        plugin.start(); if (plugin.bootProgress) plugin.bootProgress(STILL_PROGRESS, STILL_PROGRESS);
        for (let k = 0; k < STILL_STEPS; k++) if (plugin.refresh) plugin.refresh();
        be.dirty(); be.paint();
        return off;
      }

      // Headlessly run the theme and collect the image filenames visible at the still — so we
      // fetch ~a handful of PNGs instead of the whole sequence. Derived images trace to source.
      function probeFrames(source, t) {
        const seen = new Set();
        try {
          const sizes = {}; for (const f of t.files) if (/\.png$/i.test(f)) { sizes[f] = { width: 64, height: 64 }; sizes[f.split("/").pop()] = { width: 64, height: 64 }; }
          const probe = new HeadlessBackend(VW, VH, sizes);
          const pp = makePlugin("script", probe, { source });
          pp.start(); if (pp.bootProgress) pp.bootProgress(STILL_PROGRESS, STILL_PROGRESS);
          for (let k = 0; k < STILL_STEPS; k++) if (pp.refresh) pp.refresh();
          for (const s of probe.sprites) {
            if (!s.image || s.opacity <= 0) continue;
            let img = s.image, g = 0; while (img && img.kind === "derived" && img.from && g++ < 8) img = img.from;
            if (img && img.name) seen.add(img.name.split("/").pop());
          }
        } catch {}
        // Expand each numeric frame to a small neighbourhood: the headless probe and the live
        // render can land a frame or two apart, and themes size from frame 0 — so we fetch the
        // shown frame ±3 plus frames 0/1 of each sequence. Non-numeric art (logo) is kept as-is.
        const fileSet = new Set(t.files.map((f) => f.split("/").pop()));
        const out = new Set();
        const add = (n) => { if (fileSet.has(n)) out.add(n); };
        for (const n of seen) {
          const m = /^(.*?)(\d+)(\.\w+)$/.exec(n);
          if (!m) { out.add(n); continue; }
          const base = m[1], num = +m[2], ext = m[3];
          for (let d = -3; d <= 3; d++) if (num + d >= 0) add(base + (num + d) + ext);
          add(base + "0" + ext); add(base + "1" + ext);   // sizing frames
        }
        for (const f of t.files) { const b = f.split("/").pop(); if (/\.png$/i.test(b) && /^(logo|watermark|background|bg|header)\b/i.test(b)) out.add(b); }
        return [...out];
      }

      // OPFS thumbnail cache (splash-import/thumbs/<id>.png)
      const blobToDataURL = (blob) => new Promise((res) => { const fr = new FileReader(); fr.onload = () => res(fr.result); fr.readAsDataURL(blob); });
      // Content-addressed thumbnail cache key: theme id + the device's size tier. Retrieval is
      // O(1) regardless of how many frames the theme has (a 328-frame theme is as fast as a 30).
      const thumbFile = (id) => safeName(id) + "." + PROFILE.tier + ".v" + THUMB_VERSION + ".png";
      async function thumbCacheGet(id) { try { const d = await (await impRoot(false)).getDirectoryHandle("thumbs"); return await (await (await d.getFileHandle(thumbFile(id))).getFile()).arrayBuffer(); } catch { return null; } }
      async function thumbCachePut(id, blob) { try { const d = await (await impRoot(true)).getDirectoryHandle("thumbs", { create: true }); const fh = await d.getFileHandle(thumbFile(id), { create: true }); const w = await fh.createWritable(); await w.write(blob); await w.close(); } catch {} }
      const safeName = (s) => String(s).replace(/[^a-z0-9_-]/gi, "_");

      // Tap a card → fetch + content-address + run it live in the splash (not yet persisted).
      async function previewTheme(t, el) {
        if (galBusy) return; galBusy = true; el.classList.add("busy");
        const prog = el.querySelector(".prog");
        const prevId = curTheme ? curTheme.id : BUILTIN_DEFAULT;
        try {
          let theme;
          if (IMPORTED.has(t.id)) { PREVIEW = null; await loadTheme(t.id, { keepProgress: false }); const e = IMPORTED.get(t.id); theme = { id: t.id, name: e.name, kappa: e.kappa }; galState = { prevId, theme, kept: true }; }
          else {
            theme = await fetchTheme(t, { transport: GH, onProgress: (d, tot) => { if (prog) prog.style.width = Math.round((d / tot) * 100) + "%"; } });
            PREVIEW = { id: theme.id, theme }; await loadTheme(theme.id, { keepProgress: false }); galState = { prevId, theme, kept: false };
          }
          enterPreview(theme);
        } catch (e) {
          PREVIEW = null; toast("couldn’t run this theme: " + String(e.message || e).slice(0, 56));
          try { await loadTheme(prevId, { keepProgress: false }); } catch {}
        } finally { el.classList.remove("busy"); if (prog) prog.style.width = "0"; galBusy = false; }
      }
      function enterPreview(theme) {
        $("imp").classList.add("previewing");
        $("aName").textContent = (theme.name || theme.id).replace(/_/g, " ");
        const hex = (theme.kappa || "").replace("sha256:", "");
        $("aK").textContent = hex ? "holo://sha256:" + hex.slice(0, 10) + "…" : "";
        $("aK").title = theme.kappa ? "holo://" + theme.kappa : "";
        $("aVer").textContent = ver.ok ? `✓ κ·${ver.total}` : "✗ κ";
        $("aVer").className = "a-v" + (ver.ok ? "" : " bad");
        $("aKeep").style.display = galState.kept ? "none" : "";
        $("aBoot").textContent = galState.kept ? "Set as boot splash" : "Keep + boot";
        $("cSpeed").value = "0"; setSpeed(1); reflectCine();
        startGpuPresent();   // present this preview through the hologram-native GPU layer
      }
      async function keepPreview(asBoot) {
        let id = galState.theme.id;
        if (!galState.kept && PREVIEW) {
          const entry = await saveImport(PREVIEW.theme); id = entry.id; galState.kept = true; PREVIEW = null;
          rebuildThemeSelect(); $("themeSel").value = id; if (curTheme) curTheme.imported = true;
          toast("kept · " + entry.name);
        }
        if (asBoot) {
          // confirm + close — do NOT bounce back to the import grid; leave the theme showing.
          setDefaultPref(id); toast("boot splash set · " + (galState.theme.name || id));
          stopGpuPresent(); if (eng) eng.speed = 1;
          $("imp").classList.remove("previewing", "open", "show-boot"); galState = null; return;
        }
        await exitPreview(false); renderGrid(); if ($("imp").classList.contains("show-boot")) renderBootPanel();
      }
      async function discardPreview() { PREVIEW = null; await exitPreview(true); }
      async function exitPreview(revert) {
        $("imp").classList.remove("previewing");
        stopGpuPresent(); if (eng) eng.speed = 1;
        if (revert && galState) { try { await loadTheme(galState.prevId, { keepProgress: false }); } catch {} }
        galState = null;
      }

      // ── cinema controls: frame-by-frame speed + the hologram-native GPU present ─────────
      // map a (log) frequency to a spectrum hue: slow = warm, fast = violet — like a spectrum.
      const freqColor = (s) => `hsl(${Math.round(28 + Math.max(0, Math.min(1, (Math.log10(Math.max(s, 0.01)) + 2) / 6)) * 252)} 92% 66%)`;
      const fmtSpeed = (s) => (s >= 100 ? Math.round(s) + "×" : s >= 10 ? s.toFixed(1) + "×" : s.toFixed(2) + "×");
      function setSpeed(s) {
        if (eng) eng.speed = s;
        const v = $("cSpeedV");
        if (s <= 0) { v.textContent = "frozen"; v.style.color = "var(--dim)"; }
        else { v.textContent = fmtSpeed(s); v.style.color = freqColor(s); }
        // The high-frequency "energy" enriches the O(1) content-addressed LUT grade on the GPU
        // present — one trilinear fetch per pixel, so the cost stays CONSTANT however high the
        // frequency climbs; the spectrum just gets hotter. (Stepping the animation is bounded
        // work per frame, not O(1) — only the per-pixel present grade is.)
        if (gpu.ctrl) { const e = Math.max(0, Math.min(1, Math.log10(Math.max(s, 1)) / 4)); gpu.ctrl.setGrade(0.35 + 0.4 * e); }
      }
      function reflectCine() { $("cPlay").textContent = eng && eng.paused ? "▶" : "⏸"; }

      // Present the splash through holo-gpu: capture the 2D canvas as a live video and run it
      // through the Lanczos-SR + O(1)-LUT pipeline, presenting at the device's native pixels
      // (capped by the hardware tier). No WebGPU ⇒ we stay on the already-sharp 2D canvas.
      async function startGpuPresent() {
        stopGpuPresent();
        if (!GPU_OK || !(window.HoloGPU && window.HoloGPU.available && window.HoloGPU.available())) { updateHud(); return; }
        try {
          const src = $("screen");
          if (!src.captureStream) { updateHud(); return; }
          const stream = src.captureStream(60);
          const video = document.createElement("video");
          video.muted = true; video.playsInline = true; video.autoplay = true; video.srcObject = stream;
          try { await video.play(); } catch {}
          const rect = $("stage").getBoundingClientRect();
          const longest = Math.max(rect.width, rect.height) || 1;
          const maxDpr = Math.max(1, Math.min(PROFILE.dpr, PROFILE.maxDim / longest));   // cap present at the hardware tier
          document.body.classList.add("gpu-on");   // #gpuScreen must be visible BEFORE holo-gpu measures it
          const ctrl = await window.HoloGPU.attach(video, $("gpuScreen"), { sr: 1, grade: 0.35, fx: gpu.fx ? 0.6 : 0, maxDpr });
          if (!ctrl) { document.body.classList.remove("gpu-on"); try { stream.getTracks().forEach((t) => t.stop()); } catch {} updateHud(); return; }
          gpu.ctrl = ctrl; gpu.video = video; gpu.stream = stream;
          gpu.hudT = setInterval(updateHud, 700); updateHud();
        } catch { stopGpuPresent(); }
      }
      function stopGpuPresent() {
        document.body.classList.remove("gpu-on");
        if (gpu.hudT) { clearInterval(gpu.hudT); gpu.hudT = 0; }
        try { gpu.ctrl && gpu.ctrl.dispose(); } catch {}
        try { gpu.stream && gpu.stream.getTracks().forEach((t) => t.stop()); } catch {}
        if (gpu.video) { try { gpu.video.srcObject = null; } catch {} }
        gpu.ctrl = null; gpu.video = null; gpu.stream = null; updateHud();
      }
      function updateHud() {
        const hud = $("cHud"); if (!hud) return;
        if (gpu.ctrl) {
          const a = gpu.ctrl.adapter || {}, name = String(a.description || a.vendor || a.architecture || "WebGPU").slice(0, 20);
          const k = (gpu.ctrl.lutKappa || "").replace("sha256:", "").slice(0, 10);
          const g = $("gpuScreen");
          hud.innerHTML = `<span class="gpu">GPU ${esc(name)}</span> · present ${g.width}×${g.height} · <span class="lut">LUT holo://sha256:${k}…</span> · SR${gpu.fx ? " · FX" : ""} · ${Math.round(gpu.ctrl.fps)}fps`;
          $("cFx").classList.toggle("on", gpu.fx);
        } else {
          const w = be ? be.canvas.width : 0, h = be ? be.canvas.height : 0;
          hud.innerHTML = `<span class="soft">2D</span> · ${PROFILE.tier} · render ${w}×${h} · ${GPU_OK ? "GPU idle" : "no WebGPU"}`;
          $("cFx").classList.remove("on");
        }
        hud.title = hud.textContent;   // the full telemetry on hover (the row truncates)
      }
      function toggleFx() { gpu.fx = !gpu.fx; if (gpu.ctrl) gpu.ctrl.setFx(gpu.fx ? 0.6 : 0); updateHud(); }
      async function removeImported(id) {
        await removeImport(id); rebuildThemeSelect();
        if (getDefaultPref() === id) setDefaultPref("");
        if (curTheme && curTheme.id === id) { try { await loadTheme(BUILTIN_DEFAULT, { keepProgress: false }); } catch {} }
        toast("removed · " + id); renderGrid(); if ($("imp").classList.contains("show-boot")) renderBootPanel();
      }

      // Boot-splash preferences: a default + a per-Hologram-OS-instance assignment, both
      // honoured by Holo Boot at handoff. Instances come from the boot manifest (no drift).
      async function toggleBootPanel() { $("imp").classList.toggle("show-boot"); if ($("imp").classList.contains("show-boot")) renderBootPanel(); }
      async function bootLoaders() {
        try { if (BOOT_MANIFEST === null) BOOT_MANIFEST = await fetch("boot/boot-manifest.json", { cache: "no-store" }).then((r) => r.json()).catch(() => ({})); return Object.keys((BOOT_MANIFEST && BOOT_MANIFEST.loaders) || {}); } catch { return []; }
      }
      async function renderBootPanel() {
        const el = $("impBootPanel"); el.innerHTML = "";
        const all = [...themes.map((t) => ({ id: t.id, label: `${t.name} · ${t.module}` })), ...[...IMPORTED.values()].map((t) => ({ id: t.id, label: `${t.name} · imported` }))];
        const mkSelect = (value, withInherit, onchange) => {
          const s = document.createElement("select");
          if (withInherit) { const o = document.createElement("option"); o.value = ""; o.textContent = "(default)"; s.appendChild(o); }
          for (const a of all) { const o = document.createElement("option"); o.value = a.id; o.textContent = a.label; s.appendChild(o); }
          s.value = value || ""; s.onchange = () => onchange(s.value); return s;
        };
        const row = (label, title, sel) => { const r = document.createElement("div"); r.className = "bt-row"; const l = document.createElement("span"); l.className = "lbl"; l.textContent = label; if (title) l.title = title; r.appendChild(l); r.appendChild(sel); return r; };
        el.appendChild(row("Default boot splash", "used when an instance has no explicit assignment", mkSelect(getDefaultPref(), false, (v) => { setDefaultPref(v); toast("default · " + (v || BUILTIN_DEFAULT)); })));
        const per = getPerInstance();
        for (const f of await bootLoaders()) {
          if (f === "splash.html") continue;
          el.appendChild(row(prettyLoader(f), f, mkSelect(per[f] || "", true, (v) => { const m = getPerInstance(); if (v) m[f] = v; else delete m[f]; setPerInstance(m); toast(prettyLoader(f) + " · " + (v || "default")); })));
        }
      }

      // ── boot ──────────────────────────────────────────────────────────────────────────
      let BUILTIN_DEFAULT = "holo-logo";
      (async () => {
        MANIFEST = await fetch("splash/splash-manifest.json", { cache: "no-store" }).then((r) => r.json()).catch(() => ({ files: {} }));
        const index = await fetch("splash/themes/themes.json", { cache: "no-store" }).then((r) => r.json()).catch(() => ({ themes: [], default: "holo-logo" }));
        themes = index.themes || []; BUILTIN_DEFAULT = index.default || (themes[0] && themes[0].id) || "holo-logo";
        try { for (const e of await readIndex()) IMPORTED.set(e.id, e); } catch {}   // persisted imports
        rebuildThemeSelect();
        applyBackground();   // restore the saved background mode (Dark · Light · Immersive)
        applySize();         // restore the saved centre-animation size
        // chosen theme: explicit ?theme → saved default preference → built-in default
        const pref = getDefaultPref();
        const want = (knownTheme(params.get("theme")) && params.get("theme")) || (knownTheme(pref) && pref) || BUILTIN_DEFAULT;
        try { await loadTheme(want, { keepProgress: false }); }
        catch (e) {
          // a saved/imported theme that won't load must never dead-end the boot — fall back.
          if (want !== BUILTIN_DEFAULT) { try { await loadTheme(BUILTIN_DEFAULT, { keepProgress: false }); } catch (e2) { return refuse(e2); } }
          else return refuse(e);
        }
        const qmode = params.get("mode"); if (qmode && MODES.includes(qmode) && eng) client.mode(qmode);   // ?mode= → plymouth change-mode
        if (!bool(params.get("autoplay"), true)) eng.pause();
        reflectState();
        if (field) field.resize();   // the stage now has its final layout — match the field to it
        initGallery();
      })();
      function refuse(e) { $("hint").classList.remove("gone"); $("hint").textContent = "theme refused: " + e.message; setState("refused", "off"); ver.ok = false; renderVer(); }
    </script>
      <script src="_shared/holo-theme.js"></script>
      <!-- #loadbarSpin renders a faithful braille FILL of the boot progress (Holo FX progress),
           driven each frame from eng.progress by the boot loop above — denser + sharper than the line. -->
</body>
</html>
