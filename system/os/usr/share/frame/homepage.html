<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Hologram, one door to every internet</title>
<!--
  homepage.html — the Hologram Homepage. A familiar portal (the Yahoo/Chrome web everyone knows),
  secretly powered by the unified, self-verifying κ-addressable substrate. ONE omnisearch door resolves
  ANYTHING — a web URL, an ipfs:// CID, an ENS/0x/Solana/CAIP token, a .onion address, a κ-app/file, or a
  plain question — into the SAME primitive: a streamable, content-addressed κ-object that blooms as a card.
  Every section's content is a κ-object pulled from a scene manifest of κ-references: it streams in
  (skeleton → bytes → verified) and its κ-fingerprint settles only once the bytes re-derive to their own
  hash (Law L5). Personalization is a κ-swap — swap the manifest's κ-roots, the same surface becomes yours.
  Nothing is trusted because of where it came from. It is trusted because the bytes hash to what they claim.
    omnisearch backbone:  /sbin/holo-omni-unified.mjs → { holo-omni.mjs · holo-omni-web3.mjs · holo-omni-onion.mjs }
    Q (model-free recall): /usr/lib/holo/q/holo-q-corpus.js + holo-q-recall.js
    native fidelity:       web → /webview/w/<url> · ipfs → /ipfs/<cid> · κ → ./holospace.html (the real bytes, re-derived)
  Golden ratio (φ = 1.618) governs every proportion: column widths, gutters, the type scale, vertical rhythm.
-->
<link rel="stylesheet" href="/_shared/holo-theme.css" data-holo-shared="holo-theme.css" />
<link rel="stylesheet" href="/_shared/holo-mobile.css" data-holo-shared="holo-mobile.css" />
<style>
  /* ── golden constants ─────────────────────────────────────────────────────────────────────────── */
  :root{
    --phi: 1.618;
    --phi2: 2.618;                       /* φ²  */
    /* modular type scale, base = the readability floor (16px), each step ×/÷ φ. rem-based → never a sub-floor px hardcode. */
    --t-base: max(var(--holo-font-min, 16px), 1.0625rem);   /* 17px body — comfortable on any screen */
    --t-meta: max(var(--holo-font-min, 16px), 1rem);        /* 16px floor — never smaller, always readable */
    --t-lg:   calc(1rem * var(--phi));               /* ~26px section titles            */
    --t-xl:   calc(1rem * var(--phi) * 1.27);        /* ~33px hero dek                  */
    --t-hero: clamp(1.7rem, 2.2vw + 1rem, calc(1rem * var(--phi2)));  /* up to ~42px hero headline */
    /* golden spacing ramp */
    --s1: .382rem; --s2: .618rem; --s3: 1rem; --s4: 1.618rem; --s5: 2.618rem; --s6: 4.236rem;
    --gut: clamp(var(--s3), 1.5vw, var(--s5));       /* inter-column gutter — scales with the viewport */
    --pagepad: clamp(16px, 2.4vw, 64px);             /* fluid edge breathing room                       */
    --maxw: none;                                    /* FULL-BLEED — use the entire screen              */
    --radius: 16px; --radius-sm: 11px;
    /* the holographic self-verification signal */
    --holo-verify: linear-gradient(100deg,#22d3ee, #6366f1 48%, #a855f7);
    --rail: color-mix(in srgb, var(--holo-surface) 100%, transparent);
    --hair: var(--holo-border);
    --ink: var(--holo-ink); --dim: var(--holo-ink-dim); --subtle: var(--holo-ink-subtle);
    --mono: var(--holo-font-mono, ui-monospace, "Cascadia Code", Menlo, Consolas, monospace);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    background:
      radial-gradient(1200px 600px at 78% -10%, color-mix(in srgb, var(--holo-accent) 12%, transparent), transparent 60%),
      radial-gradient(1000px 520px at 12% -6%, color-mix(in srgb,#a855f7 10%, transparent), transparent 55%),
      var(--holo-bg);
    color:var(--ink);
    font:var(--t-base)/1.55 var(--holo-font-sans, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif);
    min-height:100vh; min-height:100dvh;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; text-decoration:none; }
  ::selection{ background: color-mix(in srgb, var(--holo-accent) 30%, transparent); }
  /* honor the OS motion preference — the fidelity engine sets data-motion, and the OS query is respected too */
  html[data-motion="reduced"] *, html[data-motion="reduced"] *::before, html[data-motion="reduced"] *::after{ animation-duration:.001ms !important; transition-duration:.001ms !important; }
  @media (prefers-reduced-motion: reduce){ *,*::before,*::after{ animation-duration:.001ms !important; transition-duration:.001ms !important; } }

  /* ── top utility bar ──────────────────────────────────────────────────────────────────────────── */
  .top{
    position:sticky; top:0; z-index:30;
    display:grid; grid-template-columns: auto minmax(0,1fr) auto;
    align-items:center; gap:var(--gut);
    padding: var(--s2) var(--pagepad);
    background: color-mix(in srgb, var(--holo-bg) 78%, transparent);
    backdrop-filter: blur(18px) saturate(1.2);
    border-bottom:1px solid var(--hair);
  }
  .brand{ display:flex; align-items:center; gap:var(--s2); font-weight:760; letter-spacing:-.02em; min-height:var(--holo-tap,48px); }
  .brand .mark{
    width:34px;height:34px;border-radius:10px;flex:none;display:grid;place-items:center;color:#fff;font-weight:800;
    background:var(--holo-verify); box-shadow:0 6px 22px color-mix(in srgb, var(--holo-accent) 36%, transparent);
  }
  .brand b{ font-size:var(--t-base); }
  .brand .tag{ color:var(--dim); font-weight:500; font-size:var(--t-meta); margin-left:.2rem; }

  .omni{ position:relative; max-width: clamp(360px, 44vw, 900px); justify-self:center; width:100%; }
  .omnibar{
    display:flex; align-items:center; gap:var(--s2);
    background:var(--holo-surface); border:1px solid var(--hair); border-radius:999px;
    padding: .4rem .4rem .4rem 1.1rem; min-height:var(--holo-tap,48px);
    box-shadow: 0 1px 0 color-mix(in srgb, var(--holo-ink) 4%, transparent), 0 12px 40px color-mix(in srgb, var(--holo-ink) 7%, transparent);
    transition: box-shadow .18s, border-color .18s;
  }
  .omnibar:focus-within{
    border-color: transparent;
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--holo-accent) 60%, transparent),
                0 0 0 6px color-mix(in srgb, var(--holo-accent) 16%, transparent),
                0 16px 50px color-mix(in srgb, var(--holo-accent) 18%, transparent);
  }
  .omnibar .ico{ color:var(--dim); font-size:var(--t-lg); line-height:1; flex:none; }
  #omni{ flex:1; min-width:0; border:0; background:transparent; color:var(--ink); outline:none;
         font:var(--t-base) var(--holo-font-sans, system-ui); }
  #omni::placeholder{ color:var(--subtle); }
  .lane{ flex:none; font:var(--t-meta) var(--mono); color:var(--dim); padding:.22rem .7rem; border:1px solid var(--hair);
         border-radius:999px; opacity:0; transform:scale(.9); transition:.16s; white-space:nowrap; }
  .lane.show{ opacity:1; transform:none; }
  .lane.web3{ color:#a855f7; border-color:color-mix(in srgb,#a855f7 40%,var(--hair)); }
  .lane.object{ color:var(--holo-accent); border-color:color-mix(in srgb,var(--holo-accent) 40%,var(--hair)); }
  .lane.onion{ color:#f59e0b; border-color:color-mix(in srgb,#f59e0b 40%,var(--hair)); }
  .lane.nl{ color:#10b981; border-color:color-mix(in srgb,#10b981 40%,var(--hair)); }
  .lane.unknown{ color:var(--holo-danger); border-color:color-mix(in srgb,var(--holo-danger) 40%,var(--hair)); }
  #omnigo{ flex:none; border:0; border-radius:999px; padding:0 1.3rem; min-height:40px; cursor:pointer;
           background:var(--holo-accent); color:#fff; font-weight:650; font-size:var(--t-meta); }
  #omnigo:disabled{ opacity:.5; cursor:default; }
  .ident{ display:flex; align-items:center; gap:var(--s2); justify-self:end; }
  .ident .ibtn{ display:flex; align-items:center; gap:.45rem; padding:.4rem .8rem; min-height:var(--holo-tap,48px);
                border-radius:999px; color:var(--dim); cursor:pointer; }
  .ident .ibtn:hover{ color:var(--ink); background:var(--holo-surface-2); }
  .ident .av{ width:30px;height:30px;border-radius:50%;background:var(--holo-verify); flex:none; }

  /* ── nav ribbon ───────────────────────────────────────────────────────────────────────────────── */
  .ribbon{
    position:sticky; top:0; z-index:20;
    display:flex; gap:.1rem; align-items:center; overflow-x:auto; scrollbar-width:none;
    padding: var(--s1) var(--pagepad); border-bottom:1px solid var(--hair);
    background: color-mix(in srgb, var(--holo-bg) 70%, transparent); backdrop-filter: blur(14px);
  }
  .ribbon::-webkit-scrollbar{ display:none; }
  .ribbon a{ flex:none; padding:.5rem .85rem; min-height:var(--holo-tap,48px); display:inline-flex; align-items:center;
             color:var(--dim); font-weight:550; font-size:var(--t-meta); border-radius:9px; }
  .ribbon a:hover{ color:var(--ink); background:var(--holo-surface-2); }
  .ribbon a.on{ color:var(--ink); }
  .ribbon a.on::after{ content:""; }
  /* the ambient κ-stream meter — the page IS a set of streaming, self-verified κ-objects */
  .ribbon-right{ margin-left:auto; flex:none; display:inline-flex; align-items:center; gap:.5rem; }
  .fidchip{ flex:none; display:inline-flex; align-items:center; gap:.45rem; padding:.3rem .8rem; cursor:pointer;
            font:var(--t-meta) var(--mono); color:var(--dim); border:1px solid var(--hair); border-radius:999px;
            background:color-mix(in srgb,#22d3ee 6%, var(--holo-surface)); white-space:nowrap; transition:border-color .15s; }
  .fidchip:hover{ border-color:#22d3ee; color:var(--ink); }
  .fidchip .fgem{ width:9px;height:9px;border-radius:50%; background:var(--holo-verify); flex:none; box-shadow:0 0 9px color-mix(in srgb,#22d3ee 70%,transparent); animation:pulse 2.6s infinite; }
  .fidpop{ position:fixed; z-index:40; top:0; right:0; display:none; max-width:min(92vw,420px); margin:.4rem var(--pagepad) 0 0;
           background:var(--holo-surface); border:1px solid var(--hair); border-radius:var(--radius); padding:var(--s4);
           box-shadow:0 24px 70px rgba(0,0,0,.4); }
  .fidpop.show{ display:block; animation:vfade .18s; }
  .fidpop h5{ margin:0 0 var(--s3); font-size:var(--t-base); font-weight:680; display:flex; align-items:center; gap:.5rem; }
  .fidpop .frow{ display:flex; justify-content:space-between; gap:var(--s3); padding:.35rem 0; border-top:1px solid var(--hair); font-size:var(--t-meta); }
  .fidpop .frow:first-of-type{ border-top:0; } .fidpop .frow .fk{ color:var(--dim); } .fidpop .frow .fv{ font-family:var(--mono); text-align:right; }
  .fidpop .fnote{ margin-top:var(--s3); color:var(--subtle); font-size:var(--t-meta); }
  .kstat{ flex:none; display:inline-flex; align-items:center; gap:.5rem; padding:.3rem .8rem;
          font:var(--t-meta) var(--mono); color:var(--dim); border:1px solid var(--hair); border-radius:999px;
          background:color-mix(in srgb, var(--holo-accent) 5%, var(--holo-surface)); white-space:nowrap; }
  .kstat .gem{ width:9px;height:9px;border-radius:50%; background:var(--holo-verify); flex:none;
               box-shadow:0 0 10px color-mix(in srgb,#22d3ee 70%,transparent); animation:pulse 2.6s infinite; }
  .kstat b{ color:var(--ink); font-weight:700; }

  /* ── portal: three golden columns, FULL-BLEED ───────────────────────────────────────────────────── */
  .portal{
    width:100%; max-width:var(--maxw); margin:0 auto; padding: var(--s4) var(--pagepad) var(--s6);
    min-height: calc(100dvh - 7.2rem);                 /* fill the screen below the chrome — immersive   */
    display:grid; gap:var(--gut);
    /* left : center : right  =  1 : φ² : φ  → the center is the dominant golden block */
    grid-template-columns: minmax(0, 1fr) minmax(0, 2.618fr) minmax(0, 1.618fr);
    align-items:start;
  }
  .col{ min-width:0; display:flex; flex-direction:column; gap:var(--s4); }

  /* left rail — context sections */
  .rail-left{ position:sticky; top:5.4rem; }
  .railhead{ margin:0 0 var(--s2); padding:0 .7rem; font-size:var(--t-meta); font-weight:680; color:var(--dim);
             display:flex; align-items:center; gap:.5rem; text-transform:uppercase; letter-spacing:.05em; }
  .railhead .kappa{ margin-left:auto; }
  .block > h4 .kappa{ margin-left:auto; font-weight:400; }
  .sections{ display:flex; flex-direction:column; gap:.1rem; }
  .sect{ display:flex; align-items:center; gap:var(--s3); padding:.55rem .7rem; min-height:var(--holo-tap,48px);
         border-radius:10px; color:var(--ink); cursor:pointer; }
  .sect:hover{ background:var(--holo-surface-2); }
  .sect .dot{ width:26px;height:26px;border-radius:8px;flex:none;display:grid;place-items:center;font-size:.95rem;
              background:var(--holo-surface-2); color:var(--holo-accent); }
  .sect b{ font-weight:550; font-size:var(--t-base); }
  .rail-left .more{ color:var(--holo-accent); font-size:var(--t-meta); padding:.6rem .7rem; cursor:pointer; }

  /* card primitive (shared by hero, stories, rail items, resolved omnisearch results) */
  .card{ background:var(--holo-surface); border:1px solid var(--hair); border-radius:var(--radius); overflow:hidden;
         opacity:0; transform:translateY(8px); transition: opacity .4s ease, transform .4s ease; }
  .card.in{ opacity:1; transform:none; }
  .card.skel{ opacity:1; transform:none; }

  /* the κ-fingerprint chip — the quiet ambient self-verification signal */
  .kappa{ display:inline-flex; align-items:center; gap:.45rem; font:var(--t-meta) var(--mono); color:var(--dim);
          padding:.2rem .6rem; border-radius:999px; border:1px solid var(--hair); }
  .kappa .gem{ width:9px;height:9px;border-radius:50%; background:var(--subtle); flex:none; transition:.4s; }
  .kappa.live .gem{ background:var(--holo-verify); box-shadow:0 0 0 0 color-mix(in srgb,#22d3ee 60%,transparent);
                    animation: pulse 2.6s infinite; }
  .kappa .src{ color:var(--subtle); }
  @keyframes pulse{ 0%{ box-shadow:0 0 0 0 color-mix(in srgb,#22d3ee 55%,transparent); } 70%{ box-shadow:0 0 0 6px transparent; } 100%{ box-shadow:0 0 0 0 transparent; } }

  /* origin tag */
  .origin{ font:var(--t-meta) var(--mono); text-transform:lowercase; letter-spacing:.02em; padding:.16rem .55rem;
           border-radius:7px; border:1px solid var(--hair); color:var(--dim); flex:none; }
  .origin.web{ color:var(--holo-accent); } .origin.ipfs{ color:#a855f7; } .origin.web3{ color:#a855f7; }
  .origin.onion{ color:#f59e0b; } .origin.ai{ color:#10b981; } .origin.holo{ color:#22d3ee; }

  /* hero card */
  .hero{ position:relative; }
  .hero .media{ position:relative; aspect-ratio: var(--phi); min-height: clamp(320px, 46vh, 760px); background:var(--holo-surface-2); overflow:hidden; }
  .hero .media .scene{ position:absolute; inset:0; display:grid; place-items:center; color:#fff;
     background-size:cover; background-position:center; transition:opacity .6s; }
  .hero .media .veil{ position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.72), rgba(0,0,0,.08) 62%); }
  .hero .cap{ position:absolute; left:0; right:0; bottom:0; padding: clamp(var(--s4), 2.4vw, var(--s6)); color:#fff; }
  .hero .cap .eyebrow{ display:flex; gap:var(--s2); align-items:center; margin-bottom:var(--s3); }
  /* contrast over bright hero media */
  .hero .eyebrow .origin{ color:#fff; border-color:rgba(255,255,255,.3); background:rgba(0,0,0,.34); backdrop-filter:blur(6px); }
  .hero .eyebrow .kappa{ color:rgba(255,255,255,.92); border-color:rgba(255,255,255,.28); background:rgba(0,0,0,.34); backdrop-filter:blur(6px); }
  .hero .eyebrow .kappa .src{ color:rgba(255,255,255,.82); }
  .hero .cap h2{ margin:0; font-size:var(--t-hero); line-height:1.05; letter-spacing:-.02em; font-weight:740; max-width:20ch; text-shadow:0 2px 24px rgba(0,0,0,.4); }
  .hero .cap p{ margin:var(--s2) 0 0; font-size:var(--t-base); color:rgba(255,255,255,.86); max-width:46ch; }
  .hero .dots{ position:absolute; right:var(--s4); bottom:var(--s4); display:flex; gap:.45rem; align-items:center; }
  .hero .dots .d{ width:8px;height:8px;border-radius:50%; background:rgba(255,255,255,.45); cursor:pointer; }
  .hero .dots .d.on{ background:#fff; width:22px; border-radius:99px; }
  .hero .dots .ct{ color:rgba(255,255,255,.8); font:var(--t-meta) var(--mono); margin-left:.5rem; }

  /* thumbnail strip */
  .thumbs{ display:grid; grid-auto-flow:column; grid-auto-columns: minmax(112px, 1fr); gap:var(--s2);
           overflow-x:auto; scrollbar-width:none; padding-bottom:.2rem; }
  .thumbs::-webkit-scrollbar{ display:none; }
  .thumb{ border:1px solid var(--hair); border-radius:var(--radius-sm); overflow:hidden; cursor:pointer; background:var(--holo-surface); }
  .thumb .im{ aspect-ratio: var(--phi); background:var(--holo-surface-2) center/cover; }
  .thumb .lb{ padding:.5rem .6rem; font-size:var(--t-meta); color:var(--ink); line-height:1.25;
              display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  /* story-tab bar */
  .tabs{ display:flex; gap:.1rem; align-items:center; border-bottom:1px solid var(--hair); overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar{ display:none; }
  .tabs button{ flex:none; border:0; background:transparent; color:var(--dim); cursor:pointer; padding:.7rem .9rem;
                min-height:var(--holo-tap,48px); font-size:var(--t-meta); font-weight:600; border-bottom:2px solid transparent; }
  .tabs button.on{ color:var(--ink); border-bottom-color:var(--holo-accent); }
  .tabs button:hover{ color:var(--ink); }

  /* story feed */
  .feed{ display:flex; flex-direction:column; }
  .story{ display:grid; grid-template-columns: minmax(0,1fr) auto; gap:var(--s4); align-items:start;
          padding:var(--s4) 0; border-bottom:1px solid var(--hair); }
  .story:last-child{ border-bottom:0; }
  .story .txt h3{ margin:0 0 .3rem; font-size:var(--t-lg); line-height:1.18; letter-spacing:-.01em; font-weight:650; }
  .story .txt h3 a:hover{ color:var(--holo-accent); }
  .story .txt .dek{ margin:.2rem 0 var(--s3); color:var(--dim); font-size:var(--t-base); max-width:64ch;
                    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .story .meta{ display:flex; gap:var(--s2); align-items:center; flex-wrap:wrap; }
  .story .pic{ width:148px; aspect-ratio:var(--phi); border-radius:var(--radius-sm); background:var(--holo-surface-2) center/cover;
               flex:none; border:1px solid var(--hair); }

  /* right rail blocks */
  .block{ background:var(--holo-surface); border:1px solid var(--hair); border-radius:var(--radius); padding:var(--s4); }
  .block > h4{ margin:0 0 var(--s3); font-size:var(--t-base); font-weight:680; display:flex; align-items:center; gap:.5rem; }
  .block > h4 .sp{ color:var(--holo-accent); }
  .trend{ display:grid; grid-template-columns:1fr 1fr; gap:.1rem .9rem; }
  .trend a{ display:flex; gap:.6rem; align-items:baseline; padding:.45rem .2rem; min-height:var(--holo-tap,48px); border-radius:8px; }
  .trend a:hover{ background:var(--holo-surface-2); }
  .trend .n{ color:var(--holo-accent); font:var(--t-meta) var(--mono); min-width:1.2em; }
  .trend .t{ font-size:var(--t-base); line-height:1.2; }
  .feature{ display:flex; gap:var(--s3); align-items:center; padding:var(--s3) 0; border-top:1px solid var(--hair); }
  .feature:first-of-type{ border-top:0; }
  .feature .fav{ width:46px;height:46px;border-radius:12px;flex:none;background:var(--holo-surface-2) center/cover; border:1px solid var(--hair); }
  .feature .fb h5{ margin:0; font-size:var(--t-base); font-weight:600; line-height:1.2; }
  .feature .fb span{ color:var(--dim); font-size:var(--t-meta); }
  .signals{ display:flex; flex-direction:column; }
  .signals a{ display:flex; gap:.7rem; padding:.6rem 0; border-top:1px solid var(--hair); min-height:var(--holo-tap,48px); align-items:flex-start; }
  .signals a:first-child{ border-top:0; }
  .signals .n{ color:var(--holo-accent); font:var(--t-meta) var(--mono); }
  .signals .s{ font-size:var(--t-base); line-height:1.25; }
  .signals .when{ color:var(--subtle); font-size:var(--t-meta); }
  .banner{ background:var(--holo-verify); color:#fff; border-radius:var(--radius); padding:var(--s4);
           display:flex; align-items:center; gap:var(--s3); }
  .banner .live{ background:rgba(0,0,0,.28); padding:.2rem .6rem; border-radius:7px; font:var(--t-meta) var(--mono); }
  .banner b{ font-size:var(--t-base); }

  /* resolved omnisearch result cards (live-injected at the top of the center column) */
  .results{ display:flex; flex-direction:column; gap:var(--s4); }
  .rcard{ background:var(--holo-surface); border:1px solid var(--hair); border-radius:var(--radius); overflow:hidden;
          opacity:0; transform:translateY(8px); animation:rin .3s forwards; }
  @keyframes rin{ to{ opacity:1; transform:none; } }
  .rcard .rhd{ display:flex; align-items:center; gap:var(--s3); padding:var(--s3) var(--s4); border-bottom:1px solid var(--hair); background:var(--holo-surface-2); }
  .rcard .glyph{ width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;color:#fff;font-weight:700; }
  .rcard .ttl{ font-weight:640; font-size:var(--t-base); word-break:break-all; }
  .rcard .sub{ color:var(--dim); font:var(--t-meta) var(--mono); }
  .rcard .badge{ margin-left:auto; flex:none; font:var(--t-meta) var(--mono); text-transform:uppercase; letter-spacing:.04em;
                 padding:.2rem .55rem; border:1px solid var(--hair); border-radius:7px; color:var(--dim); }

<script type="module">
/* ───────────────────────────────────────────────────────────────────────────────────────────────────
   The Hologram Homepage runtime.
   1) Every content section is rendered from a SCENE MANIFEST of κ-references. Each item's bytes are
      hashed live (crypto.subtle SHA-256) → its κ-fingerprint is REAL (Law L5: re-derive before trust),
      and it streams in skeleton → bytes → verified. Personalization = swap the manifest (swapScene).
   2) The omnisearch bar is the unification: it routes ANY input through resolveUnified → one sealed
      κ-card, injected at the top of the center column.
   ─────────────────────────────────────────────────────────────────────────────────────────────────── */
import { resolveUnified, classifyUnified } from "/sbin/holo-omni-unified.mjs";
import { composePersonalScene } from "/sbin/holo-omni-feed.mjs";   // the omnibar as CONDUCTOR: fuse YOUR private context into a holo-rank-ordered live feed

// holo-rank — your personal PageRank authority over κ (same source as the shell bar + find). Loaded once,
// non-blocking; absent file → graceful {} (the feed still composes by recency × frequency, just unranked).
let HOLO_RANK = {};
fetch("/etc/holo-rank.json").then((r) => r.json()).then((j) => { HOLO_RANK = j.ranks || {}; }).catch(() => {});
// YOUR private memory — the omni-index the one bar writes on every open (localStorage, same origin as the shell).
const omniEntries = () => { try { return JSON.parse(localStorage.getItem("holo:omni-index") || "[]"); } catch { return []; } };
// Q.recall over YOUR resolved corpus (model-free) — additive, loaded without blocking the portal paint.
let askPrivate = null;
import("/sbin/holo-omni-q.mjs").then((m) => { askPrivate = m.askPrivate; }).catch(() => {});

// ── the SEMANTIC orchestrator (the open-web ANSWER leg): a natural-language query → discover (live
//    linked-data ⊕ the pre-built, self-verifying κ-index holo-index.car) → fuse (RRF) → compose a κ-page
//    citing L5-verified source CIDs. Dynamically imported so it never blocks the portal paint; upgrades to
//    also query the κ-index when the asset loads (network-free, re-derived on load). Null until ready →
//    resolveUnified's NL lane falls back to the private Q.recall tag, unchanged. ──
let semantic = null, publishKStore = null;
Promise.all([
  import("/sbin/holo-discover.mjs"), import("/sbin/holo-semantic.mjs"),
  import("/sbin/holo-index.mjs"), import("/sbin/holo-web-snapshot.mjs"), import("/usr/lib/holo/q/holo-q-embed.js"),
]).then(async ([disco, sem, idx, snap, emb]) => {
  publishKStore = snap.publishToKStore;
  const mk = (adapters) => sem.createSemantic({ discovery: disco.createDiscovery({ adapters, fetchImpl: proxyFetch }) });
  semantic = mk([disco.linkedDataAdapter()]);
  try {
    const embedder = await emb.resolveEmbedder();   // ONE embedder for docs + queries; bge-small if it loads, else floor
    const car = new Uint8Array(await (await fetch("/usr/share/frame/holo-index.car")).arrayBuffer());
    const loaded = await idx.loadIndexFromCar(car, { embedder });   // hybrid vector ⊕ BM25 ⊕ RRF over the κ-index
    semantic = mk([idx.indexAdapter(loaded), disco.linkedDataAdapter()]);
  } catch (e) { /* no pre-built index asset → live linked-data discovery only */ }
}).catch(() => {});

// Q recall is additive — load it WITHOUT blocking module init (so the portal always paints even if
// the corpus modules are slow/intercepted). The page degrades to "still indexing" until it arrives.
let corpus = null, recall = null;
Promise.all([
  import("/usr/lib/holo/q/holo-q-corpus.js"),
  import("/usr/lib/holo/q/holo-q-recall.js"),
]).then(([{ createCorpus }, { createRecall }]) => {
  corpus = createCorpus({ embedder: null });
  recall = createRecall({ corpus, synth: null }).recall;   // createRecall → { recall, configure, … }; we want the fn
  if (window.__holoHome) { window.__holoHome.corpus = corpus; window.__holoHome.recall = recall; }

// index every scene leaf into Q's corpus so "Ask Q" retrieves across the whole page (idempotent by κ)
async function seedCorpus(){
  if (!corpus) return;
  const leaves = []
    .concat(SCENE.hero.map(h => ({ o:h, label:h.origin, text:(h.title+" "+h.dek) })))
    .concat(SCENE.stories.map(s => ({ o:s, label:s.origin, text:(s.title+" "+s.dek+" "+s.src) })))

    .concat(SCENE.features.map(f => ({ o:f, label:"holo", text:(f.title+" "+f.who) })));
  for (const l of leaves) { const k = await kappaOf(l.o); corpus.index({ id:k, text:l.label+" — "+l.text, meta:{ path:"scene" } }).catch(()=>{}); }
  // anchor in YOUR universe: index the omni-index history so "Ask Q" recalls across what you've actually opened,
  // not just the page in front of you (private, on-device; the κ is the entry's own address).
  for (const e of omniEntries()) { if (!e || !e.addr) continue; corpus.index({ id:(e.kappa||"did:input:"+e.addr), text:(e.kind||"")+" — "+(e.title||e.addr)+" "+(e.addr||""), meta:{ path:"history" } }).catch(()=>{}); }
}

// ── the real κ: hash the canonical bytes of a content object → did:holo:sha256:<hex> ────────────────
const enc = new TextEncoder();
async function kappaOf(obj){
  const bytes = typeof obj === "string" ? enc.encode(obj) : enc.encode(JSON.stringify(obj));
  const h = await crypto.subtle.digest("SHA-256", bytes);
  const hex = [...new Uint8Array(h)].map(b => b.toString(16).padStart(2,"0")).join("");
  return "did:holo:sha256:" + hex;
}
// a small holographic gradient seed per κ (deterministic art for media tiles)
function tile(seed){
  let h = 0; for (const c of String(seed)) h = (h*31 + c.charCodeAt(0)) >>> 0;
  const a = h % 360, b = (a + 60 + (h>>3)%120) % 360;
  return `linear-gradient(${h%360}deg, hsl(${a} 70% 42%), hsl(${b} 72% 28%))`;
}

/* ── ADAPTIVE FIDELITY ENGINE — detect the device and link on device, emit a live profile, always aim
   for the best the hardware and connection can sustain, step down cleanly, never advertise a quality it
   is not delivering. Honest by construction (Law L5). Surfaced as the fidelity chip in the ribbon. ──── */
const Fidelity = (() => {
  let profile = null; const subs = [];
  async function bestVideo(){
    const mc = navigator.mediaCapabilities;
    if (!mc || !mc.decodingInfo) return { label:"H.264 1080p", codec:"H.264", smooth:true, eff:true };
    const ladder = [
      { label:"AV1 8K60",  codec:"AV1",  video:{ contentType:'video/mp4; codecs="av01.0.16M.10"', width:7680, height:4320, bitrate:60e6, framerate:60 } },
      { label:"AV1 4K60",  codec:"AV1",  video:{ contentType:'video/mp4; codecs="av01.0.12M.10"', width:3840, height:2160, bitrate:25e6, framerate:60 } },
      { label:"HEVC 4K60", codec:"HEVC", video:{ contentType:'video/mp4; codecs="hvc1.1.6.L153.B0"', width:3840, height:2160, bitrate:25e6, framerate:60 } },
      { label:"VP9 4K30",  codec:"VP9",  video:{ contentType:'video/webm; codecs="vp09.00.50.08"', width:3840, height:2160, bitrate:20e6, framerate:30 } },
      { label:"AV1 1080p", codec:"AV1",  video:{ contentType:'video/mp4; codecs="av01.0.08M.08"', width:1920, height:1080, bitrate:6e6, framerate:30 } },
      { label:"H.264 1080p", codec:"H.264", video:{ contentType:'video/mp4; codecs="avc1.640028"', width:1920, height:1080, bitrate:6e6, framerate:30 } },
    ];
    for (const r of ladder){ try { const i = await mc.decodingInfo({ type:"file", video:r.video }); if (i.supported && i.smooth) return { label:r.label, codec:r.codec, smooth:i.smooth, eff:i.powerEfficient }; } catch {} }
    return { label:"H.264 1080p", codec:"H.264", smooth:true, eff:true };
  }
  function bestAudio(){
    const a = document.createElement("audio");
    const flac = a.canPlayType("audio/flac") || a.canPlayType('audio/ogg; codecs="flac"');
    const opus = a.canPlayType('audio/ogg; codecs="opus"') || a.canPlayType('audio/webm; codecs="opus"');
    return { label: flac?"FLAC lossless" : opus?"Opus high rate" : "AAC", flac:!!flac, opus:!!opus };
  }
  function fmtSupport(){ try { return document.createElement("canvas").toDataURL("image/webp").startsWith("data:image/webp") ? "WebP" : "JPEG"; } catch { return "JPEG"; } }
  async function detect(){
    const dpr = Math.min(window.devicePixelRatio || 1, 4);
    const longEdge = Math.round(Math.max(screen.width||0, screen.height||0) * dpr);
    const res = longEdge>=7680?"8K" : longEdge>=3840?"4K" : longEdge>=2560?"2K" : "HD";
    const hdr = matchMedia("(dynamic-range: high)").matches;
    const rec2020 = matchMedia("(color-gamut: rec2020)").matches, p3 = matchMedia("(color-gamut: p3)").matches;
    const gamut = rec2020?"rec2020" : p3?"P3" : "sRGB";
    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    let gpu = { webgpu:false, vendor:null, maxTex:null };
    if (navigator.gpu){ try { const ad = await navigator.gpu.requestAdapter({ powerPreference:"high-performance" });
      if (ad){ gpu.webgpu = true; gpu.maxTex = ad.limits && ad.limits.maxTextureDimension2D;
        const info = ad.info || (ad.requestAdapterInfo ? await ad.requestAdapterInfo() : null); gpu.vendor = info && (info.vendor||info.architecture) || null; } } catch {} }
    const c = navigator.connection || {};
    const net = { type:c.effectiveType||"unknown", down:c.downlink||null, rtt:c.rtt||null, save:!!c.saveData };
    const fast = !net.save && (net.down>=8 || net.type==="4g" || net.type==="unknown");
    const mid  = !net.save && (net.down>=2 || net.type==="3g" || net.type==="4g");
    const tier = net.save?"eco" : fast?"max" : mid?"high" : "eco";
    const imgCap = tier==="max" ? (res==="8K"?7680:res==="4K"?3840:2560) : tier==="high"?1920 : 1280;
    const video = await bestVideo();
    profile = { dpr, longEdge, res, hdr, gamut, reduce, cores:navigator.hardwareConcurrency||0, mem:navigator.deviceMemory||0,
      gpu, net, tier, imgCap, fmt:fmtSupport(), video, audio:bestAudio() };
    subs.forEach(f=>{ try{ f(profile); }catch{} });
    return profile;
  }
  return { detect, get:()=>profile, on:(f)=>{ subs.push(f); if(profile) f(profile); } };

/* ── WebGPU image pipeline — upload, render a fullscreen pass with an unsharp mask, present color managed.
   Reused device + a per-source result cache, so a re-enhance is an O(1) L1 hit. Fully optional + guarded. ── */
const WGSL_SHARPEN = `
@group(0) @binding(0) var samp: sampler;
@group(0) @binding(1) var tex: texture_2d<f32>;
struct VO { @builtin(position) pos: vec4f, @location(0) uv: vec2f };
@vertex fn vs(@builtin(vertex_index) i:u32) -> VO {
  var p = array<vec2f,3>(vec2f(-1.,-1.), vec2f(3.,-1.), vec2f(-1.,3.));
  var o: VO; o.pos = vec4f(p[i], 0., 1.); o.uv = p[i]*vec2f(0.5,-0.5)+vec2f(0.5,0.5); return o;
}
@fragment fn fs(v: VO) -> @location(0) vec4f {
  let d = vec2f(1.0)/vec2f(textureDimensions(tex));
  let c = textureSample(tex, samp, v.uv);
  let n = textureSample(tex,samp,v.uv+vec2f(0.,-d.y)) + textureSample(tex,samp,v.uv+vec2f(0.,d.y))
        + textureSample(tex,samp,v.uv+vec2f(-d.x,0.)) + textureSample(tex,samp,v.uv+vec2f(d.x,0.));
  let amt = 0.35;
  let s = c*(1.0+4.0*amt) - n*amt;
  return vec4f(clamp(s.rgb, vec3f(0.), vec3f(1.)), 1.0);
}`;
let _gpuDev = null; const ENH_L1 = new Map();
async function gpuDevice(){ if (_gpuDev) return _gpuDev; const a = await navigator.gpu.requestAdapter({ powerPreference:"high-performance" }); if (!a) return null; _gpuDev = await a.requestDevice(); return _gpuDev; }
async function gpuEnhance(url, maxW){
  if (ENH_L1.has(url)){ const src = ENH_L1.get(url); const c=document.createElement("canvas"); const im=await createImageBitmap(await (await fetch(src)).blob()); c.width=im.width;c.height=im.height; c.getContext("2d").drawImage(im,0,0); bumpKstat(); return c; }
  const device = await gpuDevice(); if (!device) return null;
  const bmp = await createImageBitmap(await (await fetch(url, { mode:"cors" })).blob());
  const W = Math.min(bmp.width, maxW||bmp.width), H = Math.round(bmp.height*(W/bmp.width));
  const canvas = document.createElement("canvas"); canvas.width=W; canvas.height=H;
  const ctx = canvas.getContext("webgpu"); const format = navigator.gpu.getPreferredCanvasFormat();
  const wide = matchMedia("(color-gamut: p3)").matches;
  try { ctx.configure({ device, format, alphaMode:"opaque", colorSpace: wide?"display-p3":"srgb" }); }
  catch { ctx.configure({ device, format, alphaMode:"opaque" }); }   // colorSpace unsupported on some builds
  const tex = device.createTexture({ size:[bmp.width,bmp.height], format:"rgba8unorm", usage: GPUTextureUsage.TEXTURE_BINDING|GPUTextureUsage.COPY_DST|GPUTextureUsage.RENDER_ATTACHMENT });
  device.queue.copyExternalImageToTexture({ source:bmp, flipY:false }, { texture:tex }, [bmp.width,bmp.height]);
  const sampler = device.createSampler({ magFilter:"linear", minFilter:"linear", mipmapFilter:"linear" });
  const mod = device.createShaderModule({ code: WGSL_SHARPEN });
  const pipeline = device.createRenderPipeline({ layout:"auto", vertex:{ module:mod, entryPoint:"vs" }, fragment:{ module:mod, entryPoint:"fs", targets:[{ format }] }, primitive:{ topology:"triangle-list" } });
  const bind = device.createBindGroup({ layout:pipeline.getBindGroupLayout(0), entries:[{ binding:0, resource:sampler }, { binding:1, resource:tex.createView() }] });
  const enc = device.createCommandEncoder();
  const pass = enc.beginRenderPass({ colorAttachments:[{ view:ctx.getCurrentTexture().createView(), loadOp:"clear", storeOp:"store", clearValue:{r:0,g:0,b:0,a:1} }] });
  pass.setPipeline(pipeline); pass.setBindGroup(0, bind); pass.draw(3); pass.end();
  device.queue.submit([enc.finish()]);
  try { if (canvas.width<=2048) ENH_L1.set(url, canvas.toDataURL("image/webp", 0.95)); } catch {}
  bmp.close && bmp.close();
  return canvas;
}

  card.innerHTML = `<div class="resolving"><span class="spin"></span> Resolving <b style="font-family:var(--mono)">${esc(short(v,26))}</b>…</div>`;
  $("results").prepend(card);
  window.scrollTo({ top:0, behavior:"smooth" });
  const key = v.trim(); const t0 = performance.now();
  let r, cached = false;
  if (L1.has(key)){ r = L1.get(key); cached = true; }
  else {
    try { r = await resolveUnified(key, { fetchImpl: proxyFetch, timeoutMs: 22000, semantic }); }
    catch(e){ r = { ok:false, lane:"unknown", reason:String(e&&e.message||e) }; }
    if (r && r.ok && r.lane!=="nl") L1.set(key, r);
  }
  const ms = Math.round(performance.now() - t0);
  try {
    if (r.kind==="semantic") await renderSemantic(card, r);
    else if (r.lane==="nl") await renderNL(card, r);
    else if (!r.ok) card.innerHTML = `<div class="rhd"><div class="glyph" style="background:var(--holo-danger)">✕</div><div><div class="ttl">Could not resolve</div><div class="sub">${esc(v)}</div></div><span class="badge">${esc(r.lane||"")}</span></div><div class="rerr">${esc(r.reason||"unknown")}</div>${onionHint(r,v)}`;
    else if (r.lane==="web3") renderWeb3(card, r);
    else renderObject(card, r, v);
    if (r.ok && r.lane!=="nl" && corpus) indexResolved(r, v);
    latencyBadge(card, cached, ms);
  } catch(e){ card.innerHTML = `<div class="rerr">render error: ${esc(e&&e.message||e)}</div>`; }
}
function latencyBadge(card, cached, ms){
  const hd = card.querySelector(".rhd"); if (!hd) return;
  const b = document.createElement("span"); b.className = "lat" + (cached?" hit":"");
  b.textContent = cached ? `O(1) · L1 hit · ${ms} ms · 0 network` : `resolved · ${ms} ms`;
  hd.appendChild(b);
}

function glyph(bg, ch){ return `<div class="glyph" style="background:${esc(bg)}">${esc(ch)}</div>`; }
function sealStrip(r, openHtml){
  const k = r.kappa||""; const cid = r.cid?` · cid <b>${esc(short(r.cid,7))}</b>`:"";
  const rc = r.receipt?` · <span class="ok">✓ receipt ${esc(short(r.receipt.id,6))}</span>`:"";
  return `<div class="seal"><span class="kappa live"><span class="gem"></span><span class="src">${esc(short((k.split(":").pop()||""),7))}</span></span> κ ${cid}${rc} <span class="ok">· L5 sealed</span><span class="open">${openHtml||""}</span></div>`;
}
function qStripHtml(t){ return `<div class="qstrip"><span class="qm">Q</span><div class="qt">${t} <span class="tag">· local facts</span></div></div>`; }

function renderWeb3(card, r){
  const c=r.card, accent=c["holo:accent"]||"#a855f7", chain=c["holo:chain"]||r.caip, explorer=c["holo:explorer"];
  let body="";
  if (c["@type"]==="holo:Name"){
    const addr=c["holo:address"];
    const av = c["holo:avatar"] ? `<img class="glyph" style="object-fit:cover" src="${esc(c["holo:avatar"])}" onerror="this.style.display='none'">` : glyph(accent, "@");
    body = `<div class="rhd">${av}<div><div class="ttl">${esc(c["holo:name"])}</div><div class="sub">${esc(c["holo:ns"]||"ens")} · ${esc(r.caip)}</div></div><span class="badge">name</span></div>
      <div class="rbody">${addr?`<div class="rrow"><div class="k">resolves to</div><div class="v"><a href="#" data-q="${esc(addr)}" style="color:var(--holo-accent)">${esc(addr)}</a></div></div>`:`<div class="rrow"><div class="k">resolves to</div><div class="v" style="color:var(--dim)">no address record</div></div>`}</div>`;
  } else if (c["@type"]==="holo:Asset"){
    body = `<div class="rhd">${glyph(accent,"◈")}<div><div class="ttl">${esc(c["holo:name"]||"Token")}${c["holo:symbol"]?" · "+esc(c["holo:symbol"]):""}</div><div class="sub">${esc(c["holo:standard"])} · ${esc(chain)}</div></div><span class="badge">asset</span></div>
      <div class="rbody"><div class="rrow"><div class="k">contract</div><div class="v">${esc(c["holo:address"])}</div></div><div class="rrow"><div class="k">decimals</div><div class="v">${esc(c["holo:decimals"])}</div></div>${c["holo:totalSupply"]?`<div class="rrow"><div class="k">total supply</div><div class="v">${esc(c["holo:totalSupply"])} ${esc(c["holo:symbol"]||"")}</div></div>`:""}</div>`;
  } else if (c["@type"]==="holo:Chain"){
    body = `<div class="rhd">${glyph(accent,(chain||"?")[0])}<div><div class="ttl">${esc(chain)} chain</div><div class="sub">${esc(r.caip)}</div></div><span class="badge">chain</span></div>
      <div class="rbody"><div class="rrow"><div class="k">native</div><div class="v">${esc(c["holo:symbol"])}</div></div>${c["holo:height"]!=null?`<div class="rrow"><div class="k">height</div><div class="v">${esc(c["holo:height"])}</div></div>`:""}</div>`;
  } else if (c["@type"]==="holo:Transaction"){
    body = `<div class="rhd">${glyph(accent,"⇄")}<div><div class="ttl">Transaction · ${esc(c["holo:status"])}</div><div class="sub">${esc(chain)}</div></div><span class="badge">tx</span></div>
      <div class="rbody">${c["holo:from"]?`<div class="rrow"><div class="k">from</div><div class="v">${esc(c["holo:from"])}</div></div>`:""}${c["holo:to"]?`<div class="rrow"><div class="k">to</div><div class="v">${esc(c["holo:to"])}</div></div>`:""}</div>`;
  } else {
    const nat=c["holo:native"], toks=c["holo:tokens"]||[];
    body = `<div class="rhd">${glyph(accent,(chain||"?")[0])}<div><div class="ttl">${esc(short(c["holo:address"],8))}</div><div class="sub">${esc(c["@type"]==="holo:Contract"?"contract":"account")} · ${esc(chain)}</div></div><span class="badge">account</span></div>
      <div class="rbody">${nat?`<div class="big">${esc(nat["holo:amount"])}<small>${esc(nat["holo:symbol"])}</small></div>`:""}<div class="rrow"><div class="k">address</div><div class="v">${esc(c["holo:address"])}</div></div>${toks.length?`<div class="rrow"><div class="k">tokens</div><div class="v">${toks.length} held</div></div>`:""}</div>`;
  }
  const open = explorer?`<a class="open" href="${esc(explorer)}" target="_blank" rel="noopener">Explorer ↗</a>`:"";
  card.innerHTML = body + sealStrip(r, open) + qStripHtml(captionWeb3(r));
  wire(card);
}

function sniff(b){ const x=b.subarray(0,4); if(x[0]===0x89&&x[1]===0x50)return"image/png"; if(x[0]===0xff&&x[1]===0xd8)return"image/jpeg"; if(x[0]===0x47&&x[1]===0x49)return"image/gif"; if(x[0]===0x3c)return"text/html";
  let p=0; for(const c of b.subarray(0,200)) if(c===9||c===10||c===13||(c>=32&&c<127))p++; return p>b.subarray(0,200).length*0.85?"text/plain":"application/octet-stream"; }
function previewHtml(r){
  const content=r.content, bytes=r.bytes;
  if (content && content.type==="directory") return `<div class="pv"><div class="dir">${content.entries.map(e=>`<button class="de" data-q="ipfs://${esc(e.cid)}"><span>${esc(e.name||"(unnamed)")}</span><span style="margin-left:auto;color:var(--subtle)">${esc(short(e.cid,8))}</span></button>`).join("")}</div></div>`;
  const b=(content&&content.type==="file"&&content.bytes)?content.bytes:bytes; if(!b||!b.length) return "";
  const mime=sniff(b);
  if (mime.startsWith("image/")){ const u=URL.createObjectURL(new Blob([b],{type:mime})); return `<div class="pv"><img class="full" style="padding:var(--s3) var(--s4)" src="${u}"></div>`; }
  if (mime==="text/html"){ const u=URL.createObjectURL(new Blob([b],{type:"text/html"})); return `<div class="pv"><iframe sandbox="allow-scripts" src="${u}"></iframe></div>`; }
  if (mime==="text/plain") return `<div class="pv"><pre>${esc(new TextDecoder().decode(b.subarray(0,3000)))}${b.length>3000?"\n… +"+(b.length-3000)+" bytes":""}</pre></div>`;
  return `<div class="pv"><pre>verified ${b.length} bytes · binary</pre></div>`;
}
function renderObject(card, r, v){
  const kind = r.kind==="web"?"web":r.kind==="cid"?"ipfs":"κ";
  const accent = r.kind==="web"?"var(--holo-accent)":r.kind==="cid"?"#a855f7":"#22d3ee";
  const size = r.bytes?(r.bytes.length>=1024?(r.bytes.length/1024).toFixed(1)+" KB":r.bytes.length+" B"):"";
  // native-fidelity open: real engine via the existing routes (served when the SW is registered in-shell)
  let open="";
  if (r.kind==="web") open = `<a class="open" href="/webview/w/${btoa(unescape(encodeURIComponent(v))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"")}" target="_blank" rel="noopener">Open as tab ↗</a>`;
  else if (r.kind==="cid"){ const cid=(r.cid||v).replace(/^ipfs:\/\//,""); open = `<a class="open" href="/ipfs/${esc(cid)}/" target="_blank" rel="noopener">Open natively ↗</a>`; }
  else if (r.kind==="kappa"){ const hex=(r.kappa||"").split(":").pop(); open = `<a class="open" href="./holospace.html#holo://sha256/${esc(hex)}" target="_blank" rel="noopener">Open holospace ↗</a>`; }
  card.innerHTML = `<div class="rhd">${glyph(accent, kind==="κ"?"κ":kind[0].toUpperCase())}<div><div class="ttl">${esc(short(v,30))}</div><div class="sub">${esc(r.label||kind)} · via ${esc(r.via||"-")}${size?" · "+size:""}</div></div><span class="badge">${esc(kind)}</span></div>`
    + previewHtml(r) + sealStrip(r, open) + qStripHtml(captionObject(r));
  wire(card);
}
async function renderNL(card, r){
  const out = await runRecall(r.query);
  card.innerHTML = `<div class="rhd">${glyph("#10b981","Q")}<div><div class="ttl">${esc(r.query)}</div><div class="sub">natural language → Q.recall</div></div><span class="badge">ask Q</span></div><div class="rbody">${out.html}</div>`;
}
// NL → SEMANTIC: a discovered, fused, sealed κ-page citing L5-verified source CIDs (the open-web answer leg).
async function renderSemantic(card, r){
  if (!r.ok){ const out = await runRecall(r.query); card.innerHTML = `<div class="rhd">${glyph("#10b981","Q")}<div><div class="ttl">${esc(r.query)}</div><div class="sub">no public source · Q.recall fallback</div></div><span class="badge">ask Q</span></div><div class="rbody">${out.html}</div>`; return; }
  try { if (publishKStore) await publishKStore(r.blocks); } catch {}   // publish the composed page + sources → /ipfs/<cid>/ resolves
  const srcRows = (r.sources||[]).map((s,i)=>`<div class="rrow"><div class="k">[${i+1}] ${esc(s.source||"")}</div><div class="v"><a href="#" data-q="ipfs://${esc(s.cid)}">${esc(s.title||s.entityId||"")}</a> · <span style="color:var(--subtle)">${esc(short(s.cid,8))}</span></div></div>`).join("");
  const ans = r.answer ? `<div class="rrow"><div class="k">answer</div><div class="v">${esc(r.answer)}</div></div>` : "";
  const preview = r.html ? `<div class="pv"><iframe sandbox="allow-same-origin" src="${URL.createObjectURL(new Blob([r.html],{type:"text/html"}))}"></iframe></div>` : "";
  const open = `<a class="open" href="/ipfs/${esc(r.cid)}/" target="_blank" rel="noopener">Open κ-page ↗</a>`;
  card.innerHTML = `<div class="rhd">${glyph("#10b981","Q")}<div><div class="ttl">${esc(r.query)}</div><div class="sub">semantic web → ${r.sources.length} verified source${r.sources.length===1?"":"s"} · ${esc((r.probes||[]).join(" ⊕ "))}</div></div><span class="badge">semantic</span></div>`
    + `<div class="rbody">${ans}${srcRows}</div>` + preview + sealStrip(r, open);
  wire(card);
  try { if (corpus) corpus.index({ id:r.cid, text:`${r.query}\n${(r.sources||[]).map(s=>s.title).join("\n")}\n${r.answer||""}`, meta:{ path:"semantic" } }).catch(()=>{}); } catch {}
}
function onionHint(r,v){ return /\.onion\b/i.test(v) ? `<div class="qstrip"><span class="qm" style="color:#f59e0b">⧉</span><div class="qt">The address verified itself offline. Fetching its bytes needs a Tor transport, opened from the shell browser, with the egress pinned in a receipt.</div></div>` : ""; }

function captionWeb3(r){ const c=r.card;
  if (c["@type"]==="holo:Name") return c["holo:address"]?`<b>${esc(c["holo:name"])}</b> resolves to ${esc(short(c["holo:address"],6))}.`:`<b>${esc(c["holo:name"])}</b> has no address record.`;
  if (c["@type"]==="holo:Asset") return `<b>${esc(c["holo:name"]||c["holo:symbol"])}</b> — ${esc(c["holo:standard"])} on ${esc(c["holo:chain"])}.`;
  if (c["@type"]==="holo:Chain") return `${esc(c["holo:chain"])}${c["holo:height"]!=null?`, at block ${esc(c["holo:height"])}`:""}.`;
  const nat=c["holo:native"]; return `Holds <b>${esc(nat?nat["holo:amount"]:"0")} ${esc(nat?nat["holo:symbol"]:"")}</b> on ${esc(c["holo:chain"])}.`;
}
function captionObject(r){ if(r.content&&r.content.type==="directory") return `An IPFS directory with ${r.content.entries.length} entries, verified to its CID.`;
  const sz=r.bytes?r.bytes.length:0; return `A ${esc(r.label||r.kind)} object, ${sz} bytes, verified to its κ before it was shown.`; }
function wire(card){ card.querySelectorAll("[data-q]").forEach(a=>a.onclick=(e)=>{ e.preventDefault(); a.dataset.q && runResolve(a.dataset.q); }); }

function indexResolved(r, v){ const t = cardText(r, v); if (t && corpus) corpus.index({ id:r.kappa||("did:input:"+v), text:t, meta:{ path:r.lane } }).catch(()=>{}); }
function cardText(r, v){
  if (r.lane==="web3"){ const c=r.card; const flat=Object.entries(c).filter(([k])=>k.startsWith("holo:")).map(([k,val])=>`${k.slice(5)}: ${typeof val==="object"?JSON.stringify(val):val}`).join("\n"); return `${c["@type"]} ${r.caip}\nquery: ${v}\n${flat}`; }
  let body=""; const b=(r.content&&r.content.type==="file"&&r.content.bytes)||r.bytes;
  if (b && sniff(b).startsWith("text")){ try{ body=new TextDecoder().decode(b.subarray(0,1500)); }catch{} }
  if (r.content&&r.content.type==="directory") body=r.content.entries.map(e=>e.name).join(" ");
  return `${r.label||r.kind} ${v}\nκ ${r.kappa}\n${body}`;
}

// ── Ask Q (model-free recall over everything streamed + resolved) ──
async function runRecall(query){
  if (!corpus || !corpus.size()) return { html:`<div style="color:var(--dim);font-size:var(--t-meta)">Nothing indexed yet — the page is still streaming, or recall is offline.</div>`, n:0 };
  let res; try { res = await recall(query, { k:6 }); } catch(e){ return { html:`<div class="rerr">${esc(e.message)}</div>`, n:0 }; }
  if (!res.ok || !res.results.length) return { html:`<div style="color:var(--dim);font-size:var(--t-meta)">No match for “${esc(query)}”.</div>`, n:0 };
  const ev = res.results.map(x=>`<div class="ev"><span class="rk">#${x.rank} · ${esc((x.via||[]).join("⊕")||"bm25")}</span>${esc((x.text||"").slice(0,260))}<span class="src">${esc(short(x.kappa,12))}</span></div>`).join("");
  return { html:`<div style="color:var(--dim);font:var(--t-meta) var(--mono);margin-bottom:.3rem">retrieved ${res.results.length} · receipt ${esc(short(res.receipt?.id||"",8))}</div>${ev}`, n:res.results.length };
}
async function ask(){ const v=$("askin").value.trim(); if(!v) return; const out=await runRecall(v); const a=$("answer"); a.className="answer show"; a.innerHTML=`<div style="font-size:var(--t-meta);color:var(--ink);margin-bottom:.4rem"><span style="color:#10b981;font-weight:800">Q</span> · ${esc(v)}</div>${out.html}`; }
$("askgo").onclick = ask; $("askin").addEventListener("keydown", e=>{ if(e.key==="Enter") ask(); });

// ── nav ribbon ──
function ribbonTo(nav){
  $("ribbon").querySelectorAll("a").forEach(a=>a.classList.toggle("on", a.dataset.nav===nav));
  const seed = { web:"https://example.com/", web3:"vitalik.eth", ipfs:"https://example.com/", onion:"pg6mmjiyjmcrsslvykfwnntlaru7p5svn6y2ymmju6nubxndf4pscryd.onion", q:"what is a κ-object?", recall:"what did I just resolve?" }[nav];
  if (nav==="q"||nav==="recall"){ $("askin").focus(); }
  else if (seed){ $("omni").value=seed; $("omni").dispatchEvent(new Event("input")); $("omni").focus(); }
}
$("ribbon").querySelectorAll("a").forEach(a=> a.onclick=(e)=>{ e.preventDefault(); ribbonTo(a.dataset.nav); });
$("signin").onclick = ()=>{ try { location.href="./login.html"; } catch{} };

/* ── the omnibar as CONDUCTOR — compose a holo-rank-ordered, private-context-FIRST feed into the canvas ──
   On boot (idle) the feed becomes YOUR universe ordered by authority; on bar intent it re-steers toward what
   you typed. The composed leaves flow through the SAME render → stream → settleKappa(L5) → viewer pipeline as
   the demo scene, so every card still verifies to its own hash and every media type still plays in place. If
   your history is thin, the demo scene stays (honest — never invents a personal feed you don't have).        */
let DEMO = null, isPersonal = false, composeSeq = 0;
function markPersonal(count, intent){
  const s = $("kstate"); if (!s) return;
  s.textContent = intent ? `for you · steered by “${esc(intent.slice(0,22))}”` : `for you · ${count} κ from your context`;
}
// compose YOUR feed. {feedOnly} re-steers stories+thumbs WITHOUT thrashing the hero — the live-as-you-type path
// (the hero is the flagship "now"; it only changes on Enter/boot). A monotonic seq drops stale renders so the
// latest keystroke always wins, no flicker races — low latency because askPrivate is model-free + on-device.
async function personalizeFeed(intent="", { feedOnly=false } = {}){
  const my = ++composeSeq;
  if (!DEMO) DEMO = { hero:[...SCENE.hero], thumbs:[...SCENE.thumbs], stories:[...SCENE.stories] };   // capture the demo once, before any swap
  const entries = omniEntries();
  let recallHits = [];
  if (intent && askPrivate){ try { const r = await askPrivate(intent, { k:8 }); recallHits = r.results || []; } catch {} }
  if (my !== composeSeq) return false;                  // a newer intent superseded this one → drop the stale render
  const p = composePersonalScene({ entries, recallHits, rank:HOLO_RANK, intent, rotate, fallback:DEMO });
  if (!p._personal){ isPersonal = false; renderGuide(intent); return false; }   // thin history → keep the rich demo, honestly
  isPersonal = true;
  SCENE.thumbs = p.thumbs; SCENE.stories = p.stories; if (!feedOnly) SCENE.hero = p.hero;
  markPersonal(p._count, intent);
  if (!feedOnly) renderHero();
  renderThumbs(); renderTabs(); renderFeed();            // re-stream just the feed (markets/rss keep ticking)
  renderGuide(intent, [...p.hero, ...p.stories].map(x=>({ origin:x.origin, title:x.title||x.t, addr:(x.media?x.media.src:x.query)||"" })));   // Q's GUIDE, intent-aware even on a feedOnly steer
  return true;
}
// the bar steers the feed AND resolves the precise card — one intent, both surfaces.
function conduct(v){ if (!v) return; personalizeFeed(v); runResolve(v); }
// the feed BREATHES as you type — a debounced re-steer toward the intent (feed-only; the hero stays stable).
let steerT = null;
$("omni").addEventListener("input", ()=>{
  clearTimeout(steerT); const v = $("omni").value.trim(); scheduleIdle();   // typing defers the idle refresh
  steerT = setTimeout(()=>{ if (!v) personalizeFeed("", { feedOnly:true }); else if (v.length>=2) personalizeFeed(v, { feedOnly:true }); }, 280);
});

/* ── Q as a GUIDE — one calm line over YOUR feed. Model-free + honest: names the origins you've been in and
   points at REAL items by their own titles (retrieval + a template, never generation, never an invented fact).
   Clicking it conducts the feed + opens the suggested object. ── */
function buildGuide(items, intent){
  if (!items || !items.length) return null;
  const top = items[0], second = items[1];
  if (intent) return { text:`Closest in your world to “${esc(intent.slice(0,30))}”: <b>${esc(top.title)}</b>.`, go:top.addr };
  const origins = [...new Set(items.slice(0,6).map(i=>i.origin))].slice(0,3);
  return { text:`You've been across ${esc(origins.join(", "))}. Pick up <b>${esc(top.title)}</b>${second?` — or revisit <b>${esc(second.title)}</b>`:""}.`, go:top.addr };
}
function renderGuide(intent="", items=null){
  const el = document.getElementById("qguide"); if (!el) return;
  const f = items ? { personal:true, items } : window.HoloHomeAgent.feed();   // prefer the freshly composed items → intent-aware even when the hero stays put
  const g = (f.personal && f.items.length) ? buildGuide(f.items, intent) : null;
  if (!g){ el.style.display="none"; return; }
  el.style.display=""; el.innerHTML = `<span class="qm">Q</span><span class="gt">${g.text}</span><span class="ggo">open ›</span>`;
  el.onclick = ()=> g.go && conduct(g.go);
}
// idle auto-refresh — when the bar is empty, gently rotate the mid-tier so the feed keeps DISCOVERING (the top
// anchors stay put). Deterministic exploration; paused whenever you type or steer.
let rotate = 0, idleT = null;
function scheduleIdle(){
  clearTimeout(idleT);
  idleT = setTimeout(()=>{ if (document.getElementById("omni").value.trim()==="" && isPersonal){ rotate++; personalizeFeed("", { feedOnly:true }); } scheduleIdle(); }, 22000);
}

/* ── personalization is a κ-swap: replace the scene manifest, re-render, same surface becomes yours ── */
function swapScene(partial){ Object.assign(SCENE, partial||{}); boot(); }

async function boot(){
  Fidelity.on(applyFidelity); bindFidUI();
  await Fidelity.detect();          // profile ready first, so every image requests the right resolution
  watchFidelity();
  renderSections(); renderTabs(); renderTrend(); renderBanner(); renderFeatures(); renderSignals();
  renderMarkets(); renderRss();
  await Promise.all([ renderHero(), renderThumbs(), renderFeed() ]);
}
boot().then(()=> { personalizeFeed(); scheduleIdle(); });   // demo paints instantly, then the feed becomes YOURS (private-first) + keeps discovering while idle

// harness + personalization hooks
window.__holoHome = { SCENE, swapScene, runResolve, conduct, personalizeFeed, resolveUnified, classifyUnified, kappaOf, kappaBytes, openViewer, Fidelity, gpuEnhance, corpus, recall, agent: window.HoloHomeAgent };
</script>
