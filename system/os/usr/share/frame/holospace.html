<!doctype html>
<html lang="en" data-holo-boot="off">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Holospace</title>
<!-- The projection (engine: docs/08 §Projection) — a single did:holo / holo:// link boots an
     ISOLATED, capability-bounded, serverless holospace app directly in any browser, desktop or
     mobile. No server: the app is resolved from the content-addressed index and mounted in its
     own W3C-sandboxed frame with only its declared capabilities. The launcher logic is
     holo-launch.mjs (witnessed: A28). Delivered from any cold-start gateway; the browser is the peer. -->
<style>
  html, body { margin: 0; height: 100%; background: #0b071e; color: #e8e6f0;
    font: var(--holo-text-sm, 1rem)/1.6 system-ui, -apple-system, sans-serif; overflow: hidden; }
  #frame { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; background: #0b071e; }
  #msg { position: fixed; inset: 0; display: grid; place-items: center; text-align: center; padding: 2rem; }
  #msg code { color: #8b5cf6; } a { color: #2dd4bf; text-decoration: none; } a:hover { text-decoration: underline; }
  .apps { margin-top: 1rem; line-height: 2.4; }
  #bootfx { font: 600 1.05rem/1 ui-monospace, Menlo, Consolas, monospace; }
  #bootfx .hfx-s { color: #8b5cf6; font-size: 1.15em; }
  #bootfx .hfx-t { color: #9b95c4; }
</style>
</head>
<body>
<div id="msg"><div id="bootfx">Resolving holospace…</div></div>
<!-- Holo FX (the OS's faithful unicode-animations adoption): a sharp `scan` sweep replaces the
     static boot text. Classic script → window.HoloFX is ready before the deferred module runs. -->
<script src="_shared/holo-fx.js"></script>
<!-- Holo governance (core, host-enforced): Holo Terms (MyTerms / IEEE 7012) is the capability GATE —
     the projection intersects the app's declared capabilities with the user's standing term + signed
     agreement before granting anything. Holo Privacy is the disclosure gate — this host owns the
     wallet/keys; the mounted app holds nothing and must ask the host (holo-gov.js brokers it, stamping
     the recipient from what it mounted). holo-gov.js SURFACES one shield per app — Terms · Privacy —
     so enforcement is visible. window.HoloTerms is defined synchronously; gate() does its work lazily. -->
<script src="_shared/holo-terms.js"></script>
<script src="_shared/holo-privacy.js"></script>
<script src="_shared/holo-gov.js"></script>
<!-- Share-to-Run chrome (ADR-064): the OS-level guest journey (run · remix · share · save), laid
     OVER the app's sandboxed frame on a SHARED landing only. Loaded defer so window.HoloShareChrome
     is defined before the projection finishes mounting; renders nothing unless asked. -->
<script src="_shared/holo-share-chrome.js" defer></script>
<script type="module">
import { mount, parseLink } from "./holo-launch.mjs";
import { sealConstitution } from "./_shared/holo-admit.mjs";

const msg = document.getElementById("msg");
// Sharp `scan` sweep while we resolve + mount the holospace (Holo FX / unicode-animations).
const bootFx = window.HoloFX ? window.HoloFX.loader(document.getElementById("bootfx"), { name: "scan", label: "Resolving holospace…" }) : null;
const die = (html) => { if (bootFx) bootFx.stop(""); msg.innerHTML = html; };

// Sovereign delivery (ADR-026): when enabled (?sovereign=1), the OS-wide κ Service Worker
// (holo-boot-sw.js, brought up by the guarded module below) serves the WHOLE OS by content from
// cache/peers/origin — so we skip the per-app worker here to avoid a double registration. Default
// off → the proven per-app path (A29) is untouched.
const sovereign = (() => { try { return new URLSearchParams(location.search).get("sovereign") === "1" || localStorage.getItem("holoSovereign") === "1"; } catch { return false; } })();

// The per-app κ Service Worker (A29 — serve subresources by content, from anywhere) is ON in
// production and OFF by default on localhost, so iterating files never leaves a stale SW serving
// old bytes. Force it on with ?sw=1, off with ?sw=0. In dev (off) the package path-loads directly.
const swEnabled = (() => {
  try {
    const v = new URLSearchParams(location.search).get("sw");
    if (v === "1") return true; if (v === "0") return false;
    const h = location.hostname;
    return h !== "" && !/^(localhost$|127\.|0\.0\.0\.0$|\[?::1)/.test(h);   // production host → on; localhost → off
  } catch { return false; }
})();

// The single LINK: ?app=<did:holo | id>  or  #holo://<hex>. Identity is content (Law L1).
const params = new URLSearchParams(location.search);
// the PRETTY share route /~<app>#k=<cid>: the app id comes from the path (a human hint) — the server
// injects <meta name="holo:app"> for the OG crawler; the #k= CID is the shareable content handle and
// the served app bytes still re-derive to their κ (Law L5, the runtime worker). Path id is tried after
// an explicit ?app= but before the bare-hash fallback.
const pathApp = (location.pathname.match(/^\/~([a-z0-9._-]{1,40})/i) || [])[1]
  || ((document.querySelector('meta[name="holo:app"]') || {}).content || "");
const raw = params.get("app") || pathApp || decodeURIComponent(location.hash.replace(/^#/, "")) || "";
const link = parseLink(raw);

async function boot() {
  // Seal the Constitution (ADR-033) before mounting anything: re-derive its principles (Law L5).
  // mount() is fail-closed — until this resolves, it refuses every holospace. Governance is not optional.
  await sealConstitution().catch(() => {});
  // Resolve from the content-addressed index (the lean store: { did:holo → metadata }).
  const index = await fetch("./apps/index.jsonld").then((r) => r.json()).catch(() => null);
  if (!index) return die("No app index yet run <code>node tools/build-app.mjs</code>.");
  const apps = index["dcat:dataset"] || [];
  let app = link ? apps.find((a) => a["@id"] === link.did)
          : raw  ? apps.find((a) => a["schema:identifier"] === raw || a["@id"] === raw)
          : null;
  // Lenient fallback for a bare app reference — e.g. a Share-to-Run link built from an app's served
  // path (apps/<folder>/…) by an in-app surface that doesn't know the did (ADR-064). Match by the
  // folder id, then by an identifier suffix. Additive: only runs when the strict match found nothing,
  // so it never changes an existing resolution.
  if (!app && raw && !link) {
    const r = String(raw).toLowerCase();
    app = apps.find((a) => String((a["dcat:landingPage"] || "").split("/")[1] || "").toLowerCase() === r)
       || apps.find((a) => String(a["schema:identifier"] || "").toLowerCase().endsWith(r));
  }
  if (!app) return die(`<b>Hologram OS</b> pick a holospace:<div class="apps">` +
    apps.map((a) => `<a href="?app=${encodeURIComponent(a["@id"])}">${a["schema:name"]}</a>`).join(" · ") + `</div>`);

  // Fetch the app's definition + content-address lock. A "lean" OS-image catalogue carries only
  // @id · identifier · fhs and omits dcat:landingPage — so when it's absent, fall back to the app
  // REFERENCE as the folder id (the launcher / launchApp pass apps/<id>, and every app's files live
  // at apps/<id>/). This also guards the old `landing.split` crash on a lean index.
  const landingDecl = app["dcat:landingPage"];             // apps/<id>/index.html (full catalogue)
  const id = landingDecl ? landingDecl.split("/")[1] : String(raw || "").replace(/[^a-z0-9._-]/gi, "");
  if (!id) return die("Couldn't resolve which app to open.");
  const def = await fetch(`./apps/${id}/holospace.json`).then((r) => r.json());
  const lock = await fetch(`./apps/${id}/holospace.lock.json`).then((r) => r.json());
  // the page to mount: the index's landing, else reconstructed from the app's own entry (def.entry).
  const landing = landingDecl || ("apps/" + id + "/" + (def.entry || "index.html"));
  // Holo Terms enforcement: derive the EFFECTIVE capabilities (declared ∩ the user's grant under
  // their standing term) — opening a consent dialog for sensitive/egress requests — and spawn the
  // app with only those. Fail-closed: no HoloTerms ⇒ undefined ⇒ mount falls back to declared.
  const grant = window.HoloTerms ? await window.HoloTerms.gate(def) : undefined;
  const m = mount({ def, lock, grant });

  // Bring up the ONE Holo Runtime delivery worker BEFORE mounting, so a SHARED app runs on the SAME
  // ultra-low-latency runtime as the rest of the OS (Law L2 — one canonical delivery wire, not a
  // separate share-path worker). holo-fhs-sw.js content-verifies every byte (Law L5; app bytes too —
  // it lazily folds each app's own lock into its L5 index), serves verified bytes from a κ-keyed
  // CacheStorage (the 2nd open is network-free + deduped), and stamps COI headers. It SELF-LOADS the
  // OS closure + app locks, so no closure handshake is needed (unlike the older A29 per-app worker);
  // clients.claim() on activate controls this page without a reload. No `serviceWorker.ready` await
  // (it can hang); wait on statechange→activated with a timeout fallback so the app still loads cold.
  if ("serviceWorker" in navigator && !sovereign && swEnabled) {
    await Promise.race([(async () => {
      const reg = await navigator.serviceWorker.register("/holo-fhs-sw.js", { type: "module" });
      if (reg.active) return;
      await new Promise((res) => {
        const w = reg.installing || reg.waiting; if (!w) return res();
        w.addEventListener("statechange", function h() { if (this.state === "activated") { w.removeEventListener("statechange", h); res(); } });
      });
    })().catch(() => {}), new Promise((r) => setTimeout(r, 2500))]);
  } else if ("serviceWorker" in navigator && !swEnabled) {
    // dev / SW-off: actively unregister any stale delivery SW so iterating never leaves one
    // controlling — the package path-loads from the origin instead. (Re-enable with ?sw=1.)
    try { for (const r of await navigator.serviceWorker.getRegistrations()) if (/holo-(fhs-)?sw\.js/.test(((r.active || r.installing || r.waiting) || {}).scriptURL || "")) await r.unregister(); } catch {}
  }

  // Mount it in an ISOLATED, capability-bounded frame: a WHATWG <iframe sandbox> in its own realm
  // with a W3C Permissions-Policy `allow` that grants ONLY the declared features (default-deny).
  const f = document.createElement("iframe");
  f.id = "frame";
  f.setAttribute("sandbox", m.sandbox);
  if (m.allow) f.setAttribute("allow", m.allow);
  f.setAttribute("title", m.name);
  f.src = "./" + landing;                                   // (the κ-service-worker resolver — serve every
                                                            //  subresource by content, from anywhere — is the next step)
  document.title = `${m.name} · holospace`;
  if (bootFx) bootFx.stop("");
  msg.remove();
  document.body.appendChild(f);
  // Holo governance (holo-gov.js): bind the VERIFIED identity of what we mounted so the host privacy
  // broker stamps disclosures AS this app (un-forgeable) and the Terms · Privacy shields reflect it.
  const govId = { did: m.id || null, id: (def && (def.id || def["schema:identifier"])) || null, name: m.name || "app" };
  f.addEventListener("load", () => { try { if (window.HoloGov && f.contentWindow) { window.HoloGov.register(f.contentWindow, govId); window.HoloGov.focus(govId); } } catch (e) {} });
  // Hand the share-to-run chrome (ADR-064) the verified identity of what we just mounted.
  return { name: m.name, kappa: m.id, link: m.link, raw };
}
// Unified experience (everything is an object): by default a single link opens the app INSIDE the
// World shell — a fully editable holospace object. But a SHARED link is someone handing a guest a
// running app: it carries #k= provenance (the teleport convention), so it lands FULLSCREEN with the
// share-to-run chrome (ADR-064) — run it, remix it, share it, save it. ?bare=1 keeps the standalone
// fullscreen mount (embedding one app, or a minimal kiosk; no chrome unless ?chrome=1).
const hashParams = new URLSearchParams((location.hash || "").replace(/^#/, ""));
const shared = !!hashParams.get("k") || params.get("shared") === "1";
const wantChrome = shared || params.get("chrome") === "1";
// A shared holospace can carry its WIDGET overlay in the fragment (&w=<board>) — the sender's clock,
// quote, tasks, … laid over this app. Bring up the widget runtime ONLY when a board is present, and
// mount EXACTLY that board, session-only (persist:false → it never touches this guest's own storage).
function restoreSharedWidgets() {
  const enc = hashParams.get("w"); if (!enc) return;
  let board; try { board = JSON.parse(enc); } catch (e) { return; }
  if (!Array.isArray(board) || !board.length) return;
  const s = document.createElement("script"); s.src = "_shared/holo-widgets.js"; s.defer = true;
  s.onload = () => { let tries = 0; (function go() { const h = window.HoloWidgets; if (h && h.setBoard) return h.setBoard(board, { persist: false }); if (++tries < 60) setTimeout(go, 80); })(); };
  document.body.appendChild(s);
}
if (params.get("bare") === "1" || shared) {
  boot().then((ctx) => { if (wantChrome && ctx && window.HoloShareChrome) window.HoloShareChrome.mount(ctx); restoreSharedWidgets(); })
        .catch((e) => die("Boot failed: <code>" + (e && e.message || e) + "</code>"));
} else {
  // Normal link → the ONE canonical shell (os/usr/share/frame/shell.html), which hosts the app in its
  // canvas. (?bare / shared #k= stay above as standalone mounts — the deliberate kiosk / guest mode.)
  const p = new URLSearchParams();
  if (raw) p.set("open", raw);
  if (params.get("sw")) p.set("sw", params.get("sw"));
  location.replace("/shell.html" + (p.toString() ? "?" + p : ""));
}
</script>
<!-- Sovereign delivery (ADR-026), guarded: a no-op unless ?sovereign=1 / localStorage.holoSovereign,
     when it boots the OS-wide κ Service Worker so EVERY holospace's bytes resolve by content from
     cache → peers → origin, re-derived (Law L5). Ramp-gated by holo-boot-sw-browser-witness.mjs. -->
<script type="module" src="./holo-boot-sw-register.mjs"></script>
<!-- Autonomous self-healing (ADR-0067): keep the OS whole with no user action — on idle, re-verify
     every κ-object (Law L5) and recover any that drifted from a non-origin source (IPFS · mesh); the
     sealed anchor is never auto-healed. Guarded end-to-end: it can never block or break boot. -->
<script type="module" src="./holo-heal-boot.mjs"></script>
</body>
</html>
