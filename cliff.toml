# git-cliff — generate CHANGELOG.md from Conventional Commits, in Keep a Changelog form.
# Chosen over semantic-release/standard-version (Node, npm-publish oriented) and Changie
# (human-written fragments): git-cliff is a single fast Rust binary with no runtime deps,
# config-driven, and emits Keep a Changelog output straight from git history — the lowest-
# friction fit for this repo (which already builds Rust) and its "no heavy build" rule.
#
# Standards: Keep a Changelog (sections + [Unreleased]) · Conventional Commits (the grammar
# the sections are derived from) · Semantic Versioning (vMAJOR.MINOR.PATCH tags).

[changelog]
header = """
# Changelog

All notable changes to Hologram OS are recorded here, newest first. The format follows
[Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and the project follows
[Semantic Versioning](https://semver.org/spec/v2.0.0.html). Entries are generated
automatically from [Conventional Commits](https://www.conventionalcommits.org/) by
[git-cliff](https://git-cliff.org/) — do not edit this file by hand.

"""
# One Keep a Changelog block per release. Groups are already the canonical section names
# (Added / Changed / Deprecated / Removed / Fixed / Security), set by the commit parsers below.
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat=":") | last | trim | upper_first }}\
{% endfor %}
{% endfor %}
"""
footer = """
{% for release in releases -%}
    {% if release.version -%}
        {% if release.previous.version -%}
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/humuhumu33/os-holo/compare/{{ release.previous.version }}...{{ release.version }}
        {% else -%}
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/humuhumu33/os-holo/releases/tag/{{ release.version }}
        {% endif -%}
    {% else -%}
[unreleased]: https://github.com/humuhumu33/os-holo/commits/main
    {% endif -%}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false   # keep history: unmatched commits fall through to "Changed"
split_commits = false
protect_breaking_commits = true
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"

# Conventional Commit type -> Keep a Changelog section. Order matters (first match wins).
# Noise types (docs/style/test/chore/ci/build) are dropped; a catch-all maps anything else
# to "Changed" so pre-Conventional history is never silently lost.
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Changed" },
  { message = "^refactor", group = "Changed" },
  { message = "^revert", group = "Changed" },
  { message = "(?i)deprecat", group = "Deprecated" },
  { message = "(?i)^remove", group = "Removed" },
  { message = "(?i)^sec(urity)?", group = "Security" },
  { body = "(?i)security", group = "Security" },
  { message = "^docs", skip = true },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
  # Anything that is not a Conventional Commit is skipped, so the changelog is clean and
  # purely commit-driven from adoption onward (pre-adoption freeform history is not dumped in).
  { message = ".*", skip = true },
]
